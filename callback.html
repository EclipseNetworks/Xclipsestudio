<!DOCTYPE html>
<html lang="en">
<body onload="relay()">
    <script>
        async function relay() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            
            if (code) {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: 'ee9cf7fe920d4280804730690b3fb4e8',
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: 'https://xclipsestudio.xclipsenetworks.com.au/callback.html',
                        code_verifier: localStorage.getItem('sp_verifier')
                    })
                });
                const data = await response.json();
                if (data.access_token) localStorage.setItem('sp_token', data.access_token);
            } else if (window.opener) {
                window.opener.SC.connectCallback();
                localStorage.setItem('sc_linked', 'true');
            }
            
            window.location.href = localStorage.getItem('return_to') || 'index.html';
        }
    </script>
</body>
</html>
