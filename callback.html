<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X-CLIPSE | VALIDATING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { background: #020202; color: white; font-family: monospace; }
        .loader { width: 100px; height: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .bar { width: 0%; height: 100%; background: white; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen space-y-4">
    
    <div class="text-[10px] tracking-[0.5em] text-white/40 uppercase" id="msg">Intercepting_Auth_Code</div>
    <div class="loader"><div id="bar" class="bar"></div></div>

    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');

            if (code) {
                document.getElementById('msg').innerText = "CODE_VERIFIED_PROCEEDING";
                // Store the code for your SoundCloud module to use
                localStorage.setItem('spotify_auth_code', code);
                
                gsap.to("#bar", { width: "100%", duration: 2, ease: "power4.inOut", onComplete: () => {
                    // Redirect to your soundcloud destination
                    window.location.href = 'https://xclipsestudio.xclipsenetworks.com.au/soundcloud';
                }});
            } else {
                document.getElementById('msg').innerText = "AUTH_ERROR: " + (error || "NO_CODE");
                document.getElementById('msg').classList.add('text-red-500');
            }
        };
    </script>
</body>
</html>
