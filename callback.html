<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | NEURAL_HANDSHAKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a855f7;
            --spotify: #1DB954;
            --bg: #010101;
        }
        body { 
            background: var(--bg); color: var(--primary); 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        /* Grain Overlay */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 99;
        }
        .handshake-container {
            position: relative; padding: 60px;
            border: 1px solid rgba(168, 85, 247, 0.1);
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
            text-align: center; z-index: 10;
        }
        .glitch-header {
            font-family: 'Montserrat', sans-serif;
            font-style: italic; font-weight: 900; font-size: 2.5rem;
            letter-spacing: -0.05em; color: #fff;
            text-shadow: 2px 0 var(--primary), -2px 0 var(--spotify);
        }
        .data-stream {
            width: 300px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 25px auto; position: relative; overflow: hidden;
        }
        .stream-particle {
            position: absolute; height: 100%; width: 50px;
            background: #fff; box-shadow: 0 0 10px #fff;
            animation: stream 1.5s infinite linear;
        }
        @keyframes stream { 0% { left: -50px; } 100% { left: 350px; } }
    </style>
</head>
<body>
    <div class="handshake-container">
        <div class="text-[8px] opacity-40 tracking-[0.5em] mb-2">ACCESS_GATEWAY_v22.8</div>
        <div id="main-status" class="glitch-header">INITIALIZING</div>
        <div class="data-stream"><div class="stream-particle"></div></div>
        <div id="sub-status" class="text-[9px] tracking-[0.3em] uppercase opacity-60">Awaiting secure signal...</div>
        <div id="error-log" class="hidden mt-6 p-4 border border-red-500/30 text-red-500 text-[8px] text-left max-w-xs"></div>
    </div>

    <script>
        const CONFIG = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            clientSecret: 'a81883efd2db4e1484c192222c91599f',
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/callback'
        };

async function start() {
    const status = document.getElementById('main-status');
    const sub = document.getElementById('sub-status');
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state') || 'hmm.html'; // <--- Get the origin page

    if (!code) {
        if (localStorage.getItem('sp_access_token')) {
            status.innerText = "RESTORED";
            sub.innerText = "Session active. Redirecting...";
            setTimeout(() => window.location.href = state, 1000); // Redirect to state
        } else {
            fail("MISSING_CODE", "No uplink signal from gateway.");
        }
        return;
    }

    status.innerText = "NEGOTIATING";
    sub.innerText = "Exchanging session keys...";

    const verifier = localStorage.getItem('code_verifier');
    if (!verifier) {
        fail("VERIFIER_LOST", "Security key missing.");
        return;
    }

    try {
        const res = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Authorization': 'Basic ' + btoa(CONFIG.clientId + ':' + CONFIG.clientSecret)
            },
            body: new URLSearchParams({
                grant_type: 'authorization_code',
                code: code,
                redirect_uri: CONFIG.redirectUri,
                code_verifier: verifier
            })
        });

        const data = await res.json();
        
        if (data.access_token) {
            localStorage.setItem('sp_access_token', data.access_token);
            localStorage.setItem('sp_refresh_token', data.refresh_token);
            localStorage.setItem('sp_expiry', Date.now() + (data.expires_in * 1000));
            
            status.innerText = "SUCCESS";
            sub.innerText = "Handshake verified. Entering OS...";
            
            // REDIRECT TO THE PAGE SAVED IN STATE
            setTimeout(() => window.location.href = state, 1500);
        } else { 
            throw new Error(data.error_description || "Handshake Rejected"); 
        }
    } catch (e) { 
        fail("PROTOCOL_ERR", e.message); 
    }
}

        function fail(type, msg) {
            document.getElementById('main-status').innerText = type;
            document.getElementById('main-status').style.color = "#ff4444";
            const err = document.getElementById('error-log');
            err.innerText = `[LOG]: ${msg.toUpperCase()}`;
            err.classList.remove('hidden');
        }

        window.onload = start;
    </script>
</body>
</html>
