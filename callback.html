<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XCLIPSE | SYNC_PENDING</title>
    <style>
        body { background: #000; color: #fff; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; font-family: monospace; overflow: hidden; }
        .loader { width: 40px; height: 2px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .loader::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: white; animation: drift 1.5s infinite; }
        @keyframes drift { 100% { left: 100%; } }
    </style>
</head>
<body onload="process()">
    <div style="text-align: center;">
        <div class="loader" style="margin-bottom: 20px;"></div>
        <div style="font-[8px]; letter-spacing: 5px; opacity: 0.5;">FINALIZING_HANDSHAKE</div>
    </div>

    <script>
        async function process() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            // SoundCloud Handshake
            if (window.opener && !code) {
                window.opener.SC.connectCallback();
                setTimeout(() => window.close(), 600);
                return;
            }

            // Spotify Handshake[cite: 3]
            if (code) {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: 'ee9cf7fe920d4280804730690b3fb4e8',
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: 'https://xclipsestudio.xclipsenetworks.com.au/callback.html',
                        code_verifier: localStorage.getItem('sp_verifier')
                    })
                });
                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('sp_token', data.access_token);
                    window.location.href = 'index.html'; 
                }
            }
        }
    </script>
</body>
</html>
