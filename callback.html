<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XCLIPSE | DUAL_SYNC_HANDLER</title>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: monospace; letter-spacing: 2px; font-size: 10px; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: s 0.6s linear infinite; margin-bottom: 10px; }
        @keyframes s { to { transform: rotate(360deg); } }
        .box { text-align: center; }
    </style>
</head>
<body onload="handleAuth()">
    <div class="box">
        <div class="spinner"></div>
        <p>FINALIZING_HANDSHAKE</p>
    </div>

    <script>
        async function handleAuth() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            // --- Case A: SoundCloud Popup Handshake ---
            if (window.opener && !code) {
                try {
                    window.opener.SC.connectCallback();[cite: 2]
                    setTimeout(() => window.close(), 500);[cite: 3]
                } catch (e) { console.error("Handshake Failed"); }
                return;
            }

            // --- Case B: Spotify Redirect Exchange ---
            if (code) {
                const verifier = localStorage.getItem('sp_verifier');
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: 'ee9cf7fe920d4280804730690b3fb4e8',
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: 'https://xclipsestudio.xclipsenetworks.com.au/callback.html',
                        code_verifier: verifier
                    })
                });
                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('sp_token', data.access_token);
                    window.location.href = '/index.html'; // Return to main
                }
            }
        }
    </script>
</body>
</html>
