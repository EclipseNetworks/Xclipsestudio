<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XCLIPSE | NEURAL_HANDSHAKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a855f7;
            --spotify: #1DB954;
            --bg: #010101;
        }
        body { 
            background: var(--bg); 
            color: var(--primary); 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        
        /* Deep Tech Visuals */
        .handshake-container {
            position: relative;
            padding: 60px;
            border: 1px solid rgba(168, 85, 247, 0.1);
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
            text-align: center;
        }

        .glitch-header {
            font-family: 'Montserrat', sans-serif;
            font-style: italic; font-weight: 900; font-size: 2.5rem;
            letter-spacing: -0.05em; color: #fff;
            text-shadow: 2px 0 var(--primary), -2px 0 var(--spotify);
            animation: pulse 2s infinite;
        }

        .data-stream {
            width: 300px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 25px auto; position: relative; overflow: hidden;
        }

        .stream-particle {
            position: absolute; height: 100%; width: 50px;
            background: #fff; box-shadow: 0 0 10px #fff;
            animation: stream 1.5s infinite linear;
        }

        @keyframes stream {
            0% { left: -50px; }
            100% { left: 350px; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
    </style>
</head>
<body>

    <div class="handshake-container">
        <div id="cmd-prefix" class="text-[8px] opacity-40 tracking-[0.5em] mb-2">ACCESS_GATEWAY_v22.0</div>
        <div id="main-status" class="glitch-header">INITIALIZING</div>
        
        <div class="data-stream">
            <div class="stream-particle"></div>
        </div>

        <div id="sub-status" class="text-[9px] tracking-[0.3em] uppercase opacity-60">
            Waiting for secure signal...
        </div>
        
        <div id="error-log" class="hidden mt-6 p-4 border border-red-500/30 text-red-500 text-[8px] text-left max-w-xs">
            </div>
    </div>

    <script>
        const AUTH_CONFIG = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            clientSecret: 'a81883efd2db4e1484c192222c91599f', // ROTATE THIS IN PROD
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/callback'
        };

        async function initiateHandshake() {
            const mainStatus = document.getElementById('main-status');
            const subStatus = document.getElementById('sub-status');
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (!code) {
                failHandshake("MISSING_AUTH_CODE", "No uplink signal detected from Spotify.");
                return;
            }

            mainStatus.innerText = "EXCHANGING";
            subStatus.innerText = "Negotiating secure session keys...";

            try {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': 'Basic ' + btoa(`${AUTH_CONFIG.clientId}:${AUTH_CONFIG.clientSecret}`)
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: AUTH_CONFIG.redirectUri
                    })
                });

                const data = await response.json();

                if (data.access_token) {
                    // Injecting successful state
                    mainStatus.innerText = "WELCOME BACK";
                    mainStatus.style.textShadow = "0 0 20px var(--primary)";
                    subStatus.innerText = "Uplink verified. Synchronizing Architect OS...";
                    
                    // Persistent Storage for OS Node
                    localStorage.setItem('spotify_token', data.access_token);
                    localStorage.setItem('spotify_token_expiry', Date.now() + (data.expires_in * 1000));

                    // Final transition
                    setTimeout(() => {
                        window.location.href = 'https://xclipsestudio.xclipsenetworks.com.au/';
                    }, 2200);
                } else {
                    throw new Error(data.error_description || "Handshake Refused");
                }
            } catch (err) {
                failHandshake("PROTOCOL_ERROR", err.message);
            }
        }

        function failHandshake(type, msg) {
            const mainStatus = document.getElementById('main-status');
            const subStatus = document.getElementById('sub-status');
            const errorLog = document.getElementById('error-log');

            mainStatus.innerText = type;
            mainStatus.style.color = "#ff4444";
            subStatus.innerText = "Handshake Terminated";
            
            errorLog.innerText = `[LOG]: ${msg.toUpperCase()}`;
            errorLog.classList.remove('hidden');
        }

        window.onload = initiateHandshake;
    </script>
</body>
</html>
