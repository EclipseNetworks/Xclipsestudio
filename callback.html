<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XCLIPSE | SYNC_AUTH</title>
    <style>
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 10px; letter-spacing: 2px; }
        .loader { border-left: 2px solid #fff; padding-left: 20px; }
    </style>
</head>
<body>
    <div class="loader" id="status">INITIATING_EXCHANGE_PROTOCOL...</div>

    <script>
        const clientId = 'ee9cf7fe920d4280804730690b3fb4e8';
        const redirectUri = 'https://xclipsestudio.xclipsenetworks.com.au/callback.html';

        async function initExchange() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const verifier = localStorage.getItem('sp_verifier');

            if (!code) {
                document.getElementById('status').innerText = "FAULT: AUTH_CODE_NOT_FOUND";
                return;
            }

            try {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: clientId,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: redirectUri,
                        code_verifier: verifier
                    })
                });

                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('sp_token', data.access_token);
                    document.getElementById('status').innerText = "SUCCESS // TOKEN_ACQUIRED // REDIRECTING...";
                    setTimeout(() => window.location.href = 'shh.html', 1000);
                } else {
                    document.getElementById('status').innerText = "FAULT: TOKEN_DENIED";
                }
            } catch (err) {
                document.getElementById('status').innerText = "SYSTEM_ERROR: CONNECTION_REFUSED";
            }
        }

        initExchange();
    </script>
</body>
</html>
