<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XCLIPSE | ARCHITECT_SYNC_v84</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--primary); font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.2; z-index: 0; }
        .main-ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .status-header { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 2em; text-transform: uppercase; margin-bottom: 50px; opacity: 0.5; animation: pulse 2s infinite; }
        #terminal { width: 100%; max-width: 900px; height: 400px; background: rgba(5,5,5,0.9); border: 1px solid var(--border); padding: 30px; font-size: 9px; line-height: 2.2; overflow-y: auto; scroll-behavior: smooth; }
        .log-row { display: flex; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.03); animation: slideIn 0.3s ease-out; }
        .ts { opacity: 0.2; }
        .tag { font-weight: 800; min-width: 80px; }
        .tag-sys { color: #5b5bff; }
        .tag-auth { color: #1DB954; }
        .tag-err { color: #ff3333; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }
        @keyframes slideIn { from { transform: translateX(10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <main class="main-ui">
        <div class="status-header">Protocol_Synchronizing</div>
        <div id="terminal"></div>
        <div class="mt-20 text-[8px] tracking-[3em] opacity-10 font-black">ARCHITECT_OS_CORE_v84</div>
    </main>

    <script>
        /**
         * --- MASTER SYNC CLASS ---
         * Provides unified authentication for all future Xclipse Modules.
         */
        class SyncProtocol {
            constructor() {
                this.config = {
                    clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
                    redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/callback.html'
                };
                this.term = document.getElementById('terminal');
            }

            log(tag, msg, type = "sys") {
                const row = document.createElement('div');
                row.className = "log-row";
                const now = new Date().toLocaleTimeString('en-GB', { hour12: false });
                row.innerHTML = `<span class="ts">${now}</span><span class="tag tag-${type}">[${tag}]</span><span>${msg}</span>`;
                this.term.prepend(row);
            }

            async execute() {
                this.log("SYS", "Initializing Xclipse_Exchange_Protocol...");
                
                // Aesthetic Memory Sweep
                for(let i=0; i<300; i+=20) {
                    await new Promise(r => setTimeout(r, 10));
                    this.log("HW", `Validating Registry Sector 0x${i.toString(16).toUpperCase()}... OK`);
                }

                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const verifier = localStorage.getItem('sp_verifier');

                if (!code || !verifier) {
                    this.log("ERR", "FAULT: PKCE_CHAIN_BROKEN or TIMEOUT.", "err");
                    return;
                }

                this.log("AUTH", "Chain Verified. Attempting Token Exchange...");

                try {
                    const response = await fetch('https://accounts.spotify.com/api/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            client_id: this.config.clientId,
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: this.config.redirectUri,
                            code_verifier: verifier
                        })
                    });

                    const data = await response.json();

                    if (data.access_token) {
                        this.log("AUTH", "SUCCESS: Token_Acquired // Global_State_Active", "auth");
                        localStorage.setItem('sp_token', data.access_token);
                        localStorage.setItem('sp_refresh', data.refresh_token);
                        localStorage.removeItem('sp_verifier'); // Cleanup

                        setTimeout(() => { window.location.href = 'shh.html'; }, 1500);
                    } else {
                        this.log("ERR", `DENIED: ${data.error_description || data.error}`, "err");
                    }
                } catch (e) {
                    this.log("ERR", "NETWORK_FAULT: Protocol Connection Refused.", "err");
                }
            }
        }

        // AUTO-INITIATE
        window.onload = () => { new SyncProtocol().execute(); };
    </script>
</body>
</html>
