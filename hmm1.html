<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a855f7; --spotify: #1DB954; --bg: #010101; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        #bg-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.12; pointer-events: none; }
        
        .box { background: rgba(255,255,255,0.03); border: 1px solid rgba(168, 85, 247, 0.3); padding: 15px; backdrop-filter: blur(10px); }
        .btn { background: var(--primary); color: #000; font-weight: 900; padding: 10px 20px; font-size: 10px; text-transform: uppercase; cursor: pointer; border: none; }
        .btn-spotify { background: var(--spotify) !important; color: #fff !important; box-shadow: 0 0 15px rgba(29, 185, 84, 0.3); }
        
        .panel { position: absolute; top: 80px; right: 40px; width: 350px; background: #050505; border: 1px solid var(--primary); padding: 25px; display: none; flex-direction: column; z-index: 1000; }
        #big-clock { font-family: 'Montserrat', sans-serif; font-size: 18vw; font-weight: 900; font-style: italic; color: #fff; opacity: 0.05; pointer-events: none; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; }
        
        /* Spotify Status Bar */
        #spotify-mini { display: flex; align-items: center; gap: 10px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 20px; margin-left: 20px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="auth-screen" class="fixed inset-0 bg-black flex items-center justify-center z-[2000]">
        <div class="box w-80">
            <h2 class="text-lg font-black mb-4 uppercase tracking-tighter">System Access</h2>
            <input type="email" id="email" class="w-full bg-black border border-white/10 p-3 text-[10px] mb-2 outline-none focus:border-purple-500" placeholder="Email">
            <input type="password" id="pass" class="w-full bg-black border border-white/10 p-3 text-[10px] mb-4 outline-none focus:border-purple-500" placeholder="Password">
            <div class="grid grid-cols-2 gap-2">
                <button id="login-btn" class="btn">Login</button>
                <button id="reg-btn" class="btn !bg-white">Register</button>
            </div>
        </div>
    </div>

    <header class="fixed top-8 left-10 right-10 flex justify-between items-start z-50">
        <div id="user-ui" class="hidden box flex items-center">
            <div class="flex items-center gap-3 pr-4">
                <div class="w-8 h-8 bg-purple-900 border border-purple-500" id="user-pfp"></div>
                <div>
                    <div class="text-[10px] font-black" id="user-name">USER</div>
                    <div class="text-[7px] text-purple-400 uppercase" id="user-rank">Member</div>
                </div>
            </div>
            
            <div id="spotify-mini">
                <button id="spot-auth-btn" class="btn-spotify text-[8px] py-1 px-3 font-bold rounded">Connect Spotify</button>
                <div id="now-playing" class="hidden flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="track-text" class="text-[8px] font-black uppercase truncate max-w-[120px]">Loading...</span>
                </div>
            </div>
        </div>

        <div class="flex gap-2">
            <button class="btn" onclick="toggle('spot-panel')">Music</button>
            <button class="btn" onclick="toggle('prof-panel')">Profile</button>
        </div>
    </header>

    <div id="spot-panel" class="panel">
        <h3 class="text-xs font-black border-b border-green-500/30 pb-2 mb-4 text-green-500 uppercase">Spotify Player</h3>
        <div id="player-mount">
            <p class="text-[9px] opacity-40">Connect your account to enable the player.</p>
        </div>
        <button id="refresh-spot" class="btn-spotify w-full mt-4 py-2 text-[9px] font-bold hidden">Refresh Track</button>
    </div>

    <div id="prof-panel" class="panel">
        <h3 class="text-xs font-black border-b border-white/10 pb-2 mb-4 uppercase">User Settings</h3>
        <input type="text" id="name-edit" class="w-full bg-black border border-white/10 p-2 text-[10px] mb-4" placeholder="Update Name">
        <button id="save-btn" class="btn w-full">Save Profile</button>
        <button id="out-btn" class="text-[8px] opacity-20 hover:opacity-100 mt-10 uppercase block text-center">Terminate Session</button>
    </div>

    <div id="big-clock">00:00</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
            authDomain: "xclipse-security.firebaseapp.com",
            projectId: "xclipse-security",
            appId: "1:161353959200:web:d0b36f7817b31842cff945"
        };
        
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // YOUR SPOTIFY CREDENTIALS
        const SPOT_CID = 'ee9cf7fe920d4280804730690b3fb4e8';
        const REDIRECT = window.location.href.split('#')[0];
        const SCOPES = 'user-read-currently-playing user-read-playback-state';

        // SPOTIFY KERNEL
        window.initSpotify = async (token) => {
            try {
                const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 200) {
                    const data = await res.json();
                    document.getElementById('spot-auth-btn').classList.add('hidden');
                    document.getElementById('now-playing').classList.remove('hidden');
                    document.getElementById('track-text').innerText = data.item.name;
                    document.getElementById('refresh-spot').classList.remove('hidden');
                    document.getElementById('player-mount').innerHTML = `<iframe src="https://open.spotify.com/embed/track/${data.item.id}" width="100%" height="152" frameBorder="0" allow="encrypted-media"></iframe>`;
                } else if (res.status === 204) {
                    document.getElementById('track-text').innerText = "Nothing Playing";
                }
            } catch (e) { localStorage.removeItem('sp_t'); }
        };

        // UI ACTIONS
        window.toggle = (id) => {
            const el = document.getElementById(id);
            const isVisible = el.style.display === 'flex';
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'flex';
        };

        document.getElementById('spot-auth-btn').onclick = () => {
            const url = `https://accounts.spotify.com/authorize?client_id=${SPOT_CID}&redirect_uri=${encodeURIComponent(REDIRECT)}&scope=${encodeURIComponent(SCOPES)}&response_type=token&show_dialog=true`;
            window.location.href = url;
        };

        // Handle Spotify Redirect
        const hash = window.location.hash.substring(1).split('&').reduce((acc, item) => {
            if (item) { let parts = item.split('='); acc[parts[0]] = decodeURIComponent(parts[1]); }
            return acc;
        }, {});

        if (hash.access_token) {
            localStorage.setItem('sp_t', hash.access_token);
            window.location.hash = "";
            initSpotify(hash.access_token);
        }

        // FIREBASE ACTIONS
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        };
        
        document.getElementById('reg-btn').onclick = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).then(u => {
                setDoc(doc(db, "users", u.user.uid), { name: "New User" });
            });
        };

        document.getElementById('out-btn').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('user-ui').classList.remove('hidden');
                
                if (user.uid === "36w9DzWqsGU6URy0xGh9KztazBp1") {
                    document.getElementById('user-name').innerText = "LEEROY MATUTUVA";
                    document.getElementById('user-rank').innerText = "Owner";
                }
                
                const token = localStorage.getItem('sp_t');
                if (token) initSpotify(token);
            }
        });

        // SYSTEM CLOCK
        setInterval(() => {
            const d = new Date();
            document.getElementById('big-clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
        }, 1000);

        // MATRIX CANVAS
        const c = document.getElementById('bg-canvas'); const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(100).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#a855f7";
            drops.forEach((y, i) => {
                ctx.fillText("X", i*20, y*20);
                if(y*20 > c.height && Math.random() > 0.95) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    </script>
</body>
</html>
