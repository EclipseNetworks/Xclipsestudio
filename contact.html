<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 Contact Us | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="description" content="Secure communication channel for Xclipse Studio mastering and support.">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="network-core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ec4899', 
              secondary: '#a855f7',
              accent: '#10b981',
              dark: '#050811',
              'dark-light': '#0f172a',
              'glass': 'rgba(255, 255, 255, 0.012)'
            },
            fontFamily: { 
                sans: ['Montserrat', 'sans-serif'],
                display: ['Syncopate', 'sans-serif'],
                mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --p-glow: #ec4899;
        --transition-master: cubic-bezier(0.16, 1, 0.3, 1);
      }

      html { 
        scroll-behavior: smooth; 
        cursor: none; 
        overflow-x: hidden; 
        background: #050811;
        font-size: 13px;
      }
      
      body { color: white; -webkit-font-smoothing: antialiased; }

      /* UI ARCHITECTURE */
      #cursor { width: 8px; height: 8px; background: var(--p-glow); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000000; transition: transform 0.05s linear; mix-blend-mode: difference; }
      #cursor-blur { width: 150px; height: 150px; background: rgba(236, 72, 153, 0.1); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999999; filter: blur(50px); transition: transform 0.2s var(--transition-master); }

      .mesh-gradient { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0c1021 0%, #050811 100%); }
      .blob { position: absolute; width: 450px; height: 450px; background: rgba(236, 72, 153, 0.03); filter: blur(100px); border-radius: 50%; animation: morph 20s infinite alternate; }
      @keyframes morph { 0% { border-radius: 50%; } 50% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; } 100% { border-radius: 50%; } }

      .glass-card { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s var(--transition-master); }
      .reveal-text { background: linear-gradient(to right, #fff, #ec4899, #fff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 6s linear infinite; }
      
      input, textarea { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; transition: 0.3s !important; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
      input:focus, textarea:focus { border-color: #ec4899 !important; outline: none !important; box-shadow: 0 0 15px rgba(236, 72, 153, 0.1) !important; }

      .no-select { user-select: none; }
    </style>
  </head>

  <body class="no-select">

    <div id="cursor"></div>
    <div id="cursor-blur"></div>
    <div class="mesh-gradient">
        <div class="blob" style="top: 10%; left: 5%;"></div>
        <div class="blob" style="bottom: 10%; right: 5%; background: rgba(168, 85, 247, 0.03); animation-delay: -5s;"></div>
    </div>

    <header class="fixed top-0 w-full z-[10000] px-8 py-6 md:px-14 flex justify-between items-center mix-blend-exclusion">
        <div class="flex items-center gap-4 group">
            <div class="w-9 h-9 border border-primary rounded flex items-center justify-center rotate-45 group-hover:rotate-[225deg] transition-all duration-1000">
                <span class="font-display text-primary text-xl -rotate-45 group-hover:rotate-[-225deg] transition-all">X</span>
            </div>
            <a href="index.html" class="font-display text-lg md:text-xl font-bold tracking-tighter uppercase italic text-white">XCLIPSE<span class="text-primary">STUDIO</span></a>
        </div>
        <nav class="hidden lg:flex items-center gap-12 font-medium text-[9px] uppercase tracking-[0.4em]">
            <a href="index.html" class="hover:text-primary transition py-1 text-white">Portal</a>
            <a href="upcoming.html" class="hover:text-primary transition py-1 text-white">Masters</a>
            <a href="gallery.html" class="hover:text-primary transition py-1 text-white">Gallery</a>
            <a href="#" class="px-5 py-2 rounded-full border border-primary/50 text-primary bg-primary/5">Contact</a>
        </nav>
    </header>

    <main class="pt-32 pb-20 px-6">
      <section class="text-center mb-16" data-aos="fade-up">
        <h1 class="reveal-text text-5xl md:text-7xl font-black italic tracking-tighter uppercase mb-4 text-white">Contact <span class="text-primary">Studio</span></h1>
        <p class="text-gray-400 font-mono text-[10px] tracking-widest uppercase italic">Secure Communication Channel v6.0</p>
      </section>

      <section class="max-w-4xl mx-auto">
        <div class="glass-card p-8 md:p-12 rounded-[3rem]" data-aos="fade-up">
          
          <form action="https://formspree.io/f/mvzbyvyj" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2 italic">Identify Name</label>
                <input type="text" name="name" placeholder="OPERATOR_NAME" class="w-full px-6 py-4 rounded-2xl" required>
              </div>
              <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2 italic">Return Email</label>
                <input type="email" name="email" placeholder="contact@domain.com" class="w-full px-6 py-4 rounded-2xl" required>
              </div>
            </div>

            <div>
              <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2 italic">Transmission Subject</label>
              <input type="text" name="subject" placeholder="Mastering Inquiry / License Request" class="w-full px-6 py-4 rounded-2xl" required>
            </div>

            <div>
              <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2 italic">Encrypted Message</label>
              <textarea name="message" rows="5" placeholder="Enter transmission details..." class="w-full px-6 py-4 rounded-3xl" required></textarea>
            </div>

            <input type="text" name="_gotcha" style="display:none">
            <input type="hidden" name="_subject" value="URGENT: Xclipse Studio Submission">

            <div class="text-center pt-4">
              <button type="submit" class="px-16 py-5 bg-white text-black font-black text-[10px] uppercase tracking-[0.4em] rounded-full hover:bg-primary hover:text-white transition-all transform hover:scale-105 active:scale-95 shadow-2xl">
                  Send Transmission
              </button>
            </div>
          </form>

        </div>
      </section>

      <section class="max-w-6xl mx-auto mt-24 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <div class="glass-card p-6 rounded-[2rem] text-center group" data-aos="fade-up">
              <img src="circle.png" class="w-16 h-16 mx-auto rounded-full border border-primary/20 mb-4 group-hover:rotate-45 transition-transform" alt="Leeroy">
              <h3 class="text-white font-bold italic uppercase tracking-tighter">Leeroy M</h3>
              <p class="text-primary text-[9px] font-black uppercase tracking-widest">Studio Owner</p>
          </div>
      </section>
    </main>

    <div id="mgmt-popup" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100000] w-auto transition-all duration-1000 transform translate-y-20 opacity-0">
      <div class="glass-card px-8 py-3 rounded-full shadow-2xl flex items-center gap-6 group/mgmt">
        <div class="flex items-center gap-3 border-r border-white/5 pr-6">
          <div class="w-2 h-2 bg-accent rounded-full animate-ping"></div>
          <span class="text-[9px] font-black uppercase tracking-[0.3em] text-white">Verified Management</span>
        </div>
        <div class="flex items-center gap-6">
          <p class="text-[10px] font-medium text-gray-500 italic">Ecosystem: <span class="text-white font-bold text-primary italic">Xclipse Studio</span></p>
        </div>
        <button id="close-mgmt" class="ml-2 w-5 h-5 rounded-full bg-white/5 hover:bg-primary/20 flex items-center justify-center transition-all opacity-30 group-hover/mgmt:opacity-100">
            <i class="fas fa-times text-[10px]"></i>
        </button>
      </div>
    </div>

    <footer class="py-16 border-t border-white/5 text-center opacity-30 text-gray-400">
      <p class="text-[9px] tracking-[0.8em] uppercase font-black italic">© 2026 XCLIPSE STUDIO | SECURE TRANSMISSION</p>
    </footer>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
          // Cursor Logic
          const c = document.getElementById('cursor'), cb = document.getElementById('cursor-blur');
          document.addEventListener('mousemove', (e) => {
              window.requestAnimationFrame(() => {
                  c.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
                  cb.style.transform = `translate3d(${e.clientX - 70}px, ${e.clientY - 70}px, 0)`;
              });
          });

          // Management Popup
          const mgmt = document.getElementById('mgmt-popup');
          setTimeout(() => mgmt.classList.remove('translate-y-20', 'opacity-0'), 2000);
          document.getElementById('close-mgmt').addEventListener('click', () => {
              mgmt.classList.add('opacity-0');
              setTimeout(() => mgmt.remove(), 600);
          });

          // AOS Init
          const aosScript = document.createElement('script');
          aosScript.src = "https://unpkg.com/aos@2.3.1/dist/aos.js";
          aosScript.onload = () => AOS.init({ duration: 1200, once: true });
          document.head.appendChild(aosScript);
      });
    </script>
  </body>
</html>
