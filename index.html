    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945",
        databaseURL: "https://xclipse-security-default-rtdb.firebaseio.com" 
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      async function runSecurityGate() {
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          const cleanIP = data.ip.replaceAll('.', '_');

          // 1. INSTANT BAN LISTENER
          // Forces redirect the moment the IP is added to the blacklist in Firebase
          db.ref('blacklisted_ips/' + cleanIP).on('value', (snapshot) => {
            if (snapshot.exists()) {
              window.location.href = "/404.html";
            }
          });

          // 2. LIVE TRAFFIC REPORTING
          const userRef = db.ref('live_traffic/' + cleanIP);
          userRef.set({
            ip: data.ip,
            page: window.location.pathname,
            last_seen: Date.now(),
            platform: navigator.platform
          });
          userRef.onDisconnect().remove();

        } catch (e) { console.warn("Security Link: Offline Mode"); }
      }

      // 3. GLOBAL LOCKDOWN LISTENER
      // Forces redirect for all users if lockdown_active is toggled to true
      function initLockdownListener() {
          db.ref('lockdown_active').on('value', (snapshot) => {
              if (snapshot.val() === true) {
                  window.location.href = "/404.html";
              }
          });
      }

      runSecurityGate();
      initLockdownListener();
    </script>

    <style>
      :root {

      html {

        overflow-x: hidden; 
        font-size: var(--base-font-size);
        background: #050811;
      }
      
      body { color: white; -webkit-font-smoothing: antialiased; }

      @keyframes morphBlob {
        0% { border-radius: 40% 60% 60% 40% / 70% 30% 70% 30%; transform: scale(1); }
        50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; transform: scale(1.05); }
        100% { border-radius: 40% 60% 60% 40% / 70% 30% 70% 30%; transform: scale(1); }
      }
      @keyframes floatHeader { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
      @keyframes floatHero { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-12px) rotate(0.5deg); } }
      @keyframes shine { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

      .floating-nav { animation: floatHeader 6s ease-in-out infinite; }
      .floating-hero { animation: floatHero 8s ease-in-out infinite; }

      #cursor { width: 8px; height: 8px; background: var(--primary-glow); border-radius: 50%; position: fixed; pointer-events: none; z-index: 99999999; transition: transform 0.08s ease-out; mix-blend-mode: difference; }
      #cursor-blur { width: 140px; height: 140px; background: rgba(236, 72, 153, 0.08); border-radius: 50%; position: fixed; pointer-events: none; z-index: 99999998; filter: blur(45px); transition: transform 0.2s var(--transition-fluid); }

      .mesh-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #0a0d1a 0%, #050811 100%); }
      .blob { position: absolute; width: 450px; height: 450px; background: rgba(236, 72, 153, 0.04); filter: blur(100px); border-radius: 50%; animation: morphBlob 25s infinite alternate linear; }

      .reveal-text { background: linear-gradient(to right, #fff 20%, #ec4899 40%, #ec4899 60%, #fff 80%); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 8s linear infinite; }
      .glass-card { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.04); transition: 0.4s var(--transition-fluid); }
      .glass-card:hover { border-color: rgba(236, 72, 153, 0.25); }

      .music-bar { background: rgba(5, 8, 17, 0.97); backdrop-filter: blur(40px); border-top: 1px solid rgba(236, 72, 153, 0.12); box-shadow: 0 -10px 50px rgba(0,0,0,0.5); }
      input[type=range] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.05); border-radius: 10px; height: 3px; outline: none; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #ec4899; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px rgba(236, 72, 153, 0.5); border: 1px solid white; }

      .no-select { user-select: none; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 10px; }
    </style>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
          AOS.init({ duration: 1200, once: true });
          initAudio();
          initCursor();
          initSecurityUI();
      });

      function initAudio() {
          const audio = new Audio();
          const pBtn = document.getElementById('play-btn');
          const tL = document.getElementById('track-selector');
          const pS = document.getElementById('progress-slider');
          const vS = document.getElementById('volume-slider');
          const vT = document.getElementById('vol-display');
          const cL = document.getElementById('current-time');
          const dL = document.getElementById('duration-time');

          tL.addEventListener('change', (e) => {
              const opt = e.target.options[e.target.selectedIndex];
              audio.src = opt.value;
              document.getElementById('player-title').innerText = opt.getAttribute('data-title');
              document.getElementById('player-cover').src = opt.getAttribute('data-cover');
              audio.play();
              pBtn.innerHTML = '<i class="fas fa-pause text-xs"></i>';
          });

          pBtn.addEventListener('click', () => {
              if(!audio.src) return;
              if(audio.paused) { audio.play(); pBtn.innerHTML = '<i class="fas fa-pause text-xs"></i>'; }
              else { audio.pause(); pBtn.innerHTML = '<i class="fas fa-play text-xs ml-0.5"></i>'; }
          });

          audio.addEventListener('timeupdate', () => {
              pS.value = (audio.currentTime / audio.duration) * 100 || 0;
              let m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60);
              cL.innerText = `${m}:${s < 10 ? '0'+s : s}`;
          });

          audio.addEventListener('loadedmetadata', () => {
              let m = Math.floor(audio.duration / 60), s = Math.floor(audio.duration % 60);
              dL.innerText = `${m}:${s < 10 ? '0'+s : s}`;
          });

          pS.addEventListener('input', () => { audio.currentTime = (pS.value / 100) * audio.duration; });
          vS.addEventListener('input', (e) => { audio.volume = e.target.value; vT.innerText = `${Math.round(e.target.value * 100)}%`; });
      }

      function initCursor() {
          const c = document.getElementById('cursor'), cb = document.getElementById('cursor-blur');
          document.addEventListener('mousemove', (e) => {
              window.requestAnimationFrame(() => {
                  c.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
                  cb.style.transform = `translate3d(${e.clientX - 70}px, ${e.clientY - 70}px, 0)`;
              });
          });
      }

      function initSecurityUI() {
          document.addEventListener('keydown', (e) => {
              if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
                  e.preventDefault(); window.location.href = '/404.html';
              }
          });
          document.addEventListener('contextmenu', (e) => e.preventDefault());
      }
    </script>
