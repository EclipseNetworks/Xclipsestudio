<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 XCLIPSE STUDIO | OFFICIAL《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">    
    <meta name="description" content="Xclipse Studio Official. Advanced Hoodtrap distribution and mastering portal.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app" 
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      async function runSecurityGate() {
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          const cleanIP = data.ip.replaceAll('.', '-');

          // 1. BLACKLIST SYNC
          db.ref('network/blacklist/' + cleanIP).on('value', (snapshot) => {
            if (snapshot.exists()) window.location.href = "/404.html";
          });

          // 2. LIVE TRAFFIC SYNC
          const userRef = db.ref('network/traffic/' + cleanIP);
          userRef.set({
            ip: data.ip,
            current_page: 'Main Portal',
            last_seen: Date.now(),
            platform: navigator.platform
          });
          userRef.onDisconnect().remove();

        } catch (e) { console.warn("Security Offline"); }
      }

      // 3. SHIELD SYNC & DYNAMIC UI
      function initShieldSync() {
          db.ref('network/security_shield').on('value', (snapshot) => {
              const status = snapshot.val();
              const dot = document.getElementById('shield-dot');
              const text = document.getElementById('shield-text');
              const iconBox = document.getElementById('shield-status-icon');
              
              if (status === 'Active') {
                  dot.className = "w-1.5 h-1.5 rounded-full bg-pink-500 shield-pulse";
                  text.innerText = "SHIELD ACTIVE";
                  text.className = "font-display text-[7px] tracking-[0.4em] uppercase text-pink-500 italic font-bold";
                  iconBox.style.borderColor = "rgba(236, 72, 153, 0.4)";
                  setTimeout(() => { window.location.href = "/404.html"; }, 1500);
              } else {
                  dot.className = "w-1.5 h-1.5 rounded-full bg-white/20";
                  text.innerText = "SHIELD STANDBY";
                  text.className = "font-display text-[7px] tracking-[0.4em] uppercase text-white/40 italic";
                  iconBox.style.borderColor = "rgba(255, 255, 255, 0.05)";
              }
          });
      }

      runSecurityGate();
      initShieldSync();
    </script>

    <style>
      :root { --primary-glow: #ec4899; }
      html { scroll-behavior: smooth; cursor: none; background: #050811; font-size: 13px; }
      body { color: white; -webkit-font-smoothing: antialiased; font-family: 'Montserrat', sans-serif; }

      /* Shield Animation */
      .shield-pulse { box-shadow: 0 0 12px #ec4899; animation: pulse-ring 2s infinite; }
      @keyframes pulse-ring { 0%, 100% { transform: scale(0.95); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }

      #cursor { width: 8px; height: 8px; background: var(--primary-glow); border-radius: 50%; position: fixed; pointer-events: none; z-index: 99999999; transition: transform 0.08s ease-out; mix-blend-mode: difference; }
      .reveal-text { background: linear-gradient(to right, #fff 20%, #ec4899 40%, #ec4899 60%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 8s linear infinite; }
      @keyframes shine { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
      .glass-card { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.04); }
      .music-bar { background: rgba(5, 8, 17, 0.97); backdrop-filter: blur(40px); border-top: 1px solid rgba(236, 72, 153, 0.12); }
    </style>
  </head>

  <body class="selection:bg-primary no-select pb-28">

    <div id="cursor"></div>

    <div id="shield-status-icon" class="fixed bottom-24 right-8 z-[10001] flex items-center gap-3 bg-black/60 backdrop-blur-2xl border border-white/5 px-5 py-2.5 rounded-full transition-all duration-700">
        <div id="shield-dot" class="w-1.5 h-1.5 rounded-full bg-white/20 transition-all duration-500"></div>
        <span id="shield-text" class="font-display text-[7px] tracking-[0.4em] uppercase text-white/40 italic">Shield Standby</span>
    </div>

    <div class="music-bar fixed bottom-0 left-0 w-full z-[9999999] px-6 py-3 grid grid-cols-1 md:grid-cols-3 items-center gap-6">
        <div class="flex items-center gap-4">
            <img id="player-cover" src="IMG_9564.png" class="w-11 h-11 rounded-lg border border-primary/20 object-cover" alt="Cover">
            <div class="min-w-0">
                <p id="player-title" class="text-[11px] font-bold truncate uppercase italic text-white mb-0.5">Select Pipeline</p>
                <p class="text-[8px] text-gray-500 uppercase font-black tracking-widest">Xclipse Studio</p>
            </div>
        </div>

        <div class="flex flex-col items-center gap-1.5">
            <div class="flex items-center gap-6">
                <select id="track-selector" class="bg-dark/60 border border-white/10 text-[8px] font-black uppercase py-1.5 px-4 rounded-full outline-none text-gray-400">
                    <option value="" disabled selected>DROPS</option>
                    <option value="stayaway.mp3" data-title="Stay Away" data-cover="StayAway.png">Stay Away (Hoodtrap)</option>
                </select>
                <div class="flex items-center gap-4">
                    <button id="play-btn" class="w-9 h-9 rounded-full bg-white text-black flex items-center justify-center hover:scale-110 transition"><i class="fas fa-play text-xs ml-0.5"></i></button>
                </div>
            </div>
        </div>
    </div>

    <header class="fixed top-0 w-full z-[10000] px-8 py-6 md:px-14 flex justify-between items-center mix-blend-exclusion">
        <a href="#" class="font-display text-lg md:text-xl font-bold tracking-tighter uppercase italic">
            XCLIPSE<span class="text-primary">STUDIO</span>
        </a>
        <nav class="hidden lg:flex items-center gap-12 font-medium text-[9px] uppercase tracking-[0.4em]">
            <a href="index.html" class="text-primary">Portal</a>
            <a href="unreleased.html">Unreleased</a>
            <a href="contact.html" class="px-5 py-2 rounded-full border border-primary/50 text-primary bg-primary/5">Contact</a>
        </nav>
    </header>

    <main>
      <section class="min-h-screen flex items-center justify-center pt-20 px-6 relative overflow-hidden">
          <div class="text-center z-10" data-aos="zoom-out">
              <img src="IMG_9564.png" class="w-64 h-64 md:w-[420px] md:h-[420px] object-cover rounded-[2.5rem] shadow-2xl border border-white/5 mb-10 mx-auto" alt="Hero">
              <h1 class="reveal-text text-4xl md:text-[8rem] font-black italic tracking-tighter uppercase leading-[0.85]">THIS IS WHAT<br>YOU CAME FOR</h1>
          </div>
      </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
          AOS.init({ duration: 1200, once: true });
          initAudio();
          initCursor();
      });

      function initAudio() {
          const audio = new Audio();
          const pBtn = document.getElementById('play-btn');
          const tL = document.getElementById('track-selector');

          tL.addEventListener('change', (e) => {
              const opt = e.target.options[e.target.selectedIndex];
              audio.src = opt.value;
              document.getElementById('player-title').innerText = opt.getAttribute('data-title');
              document.getElementById('player-cover').src = opt.getAttribute('data-cover');
              audio.play();
              pBtn.innerHTML = '<i class="fas fa-pause text-xs"></i>';
          });

          pBtn.addEventListener('click', () => {
              if(!audio.src) return;
              if(audio.paused) { audio.play(); pBtn.innerHTML = '<i class="fas fa-pause text-xs"></i>'; }
              else { audio.pause(); pBtn.innerHTML = '<i class="fas fa-play text-xs ml-0.5"></i>'; }
          });
      }

      function initCursor() {
          const c = document.getElementById('cursor');
          document.addEventListener('mousemove', (e) => {
              window.requestAnimationFrame(() => {
                  c.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
              });
          });
      }
    </script>
  </body>
</html>
