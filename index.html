<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 XCLIPSE STUDIO | OFFICIAL《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
      :root { --primary-glow: #ec4899; }
      html { background: #050811; cursor: none; scroll-behavior: smooth; }
      body { color: white; font-family: 'Montserrat', sans-serif; }
      
      /* Status Icon Animations */
      .shield-pulse {
        box-shadow: 0 0 15px #ec4899;
        animation: pulse-ring 2s infinite;
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.95); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
        100% { transform: scale(0.95); opacity: 1; }
      }

      #cursor { width: 8px; height: 8px; background: var(--primary-glow); border-radius: 50%; position: fixed; pointer-events: none; z-index: 99999999; mix-blend-mode: difference; }
      .reveal-text { background: linear-gradient(to right, #fff 20%, #ec4899 40%, #ec4899 60%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 8s linear infinite; }
      @keyframes shine { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    </style>
  </head>

  <body class="bg-[#050811] no-select">
    <div id="cursor"></div>

    <div id="status-link" class="fixed top-6 right-6 z-[10001] flex items-center gap-3 bg-black/40 backdrop-blur-md border border-white/5 p-2 px-4 rounded-full transition-all duration-500">
        <div id="shield-icon-dot" class="w-2 h-2 rounded-full bg-gray-600 transition-all duration-500"></div>
        <span id="shield-icon-text" class="text-[9px] font-black tracking-[0.3em] uppercase text-white/30 transition-all duration-500">Shield Standby</span>
    </div>

    <header class="fixed top-0 w-full z-[10000] px-8 py-6 flex justify-between items-center mix-blend-exclusion">
        <a href="#" class="font-display text-xl font-bold italic uppercase tracking-tighter">
            XCLIPSE<span class="text-primary">STUDIO</span>
        </a>
    </header>

    <main class="min-h-screen flex items-center justify-center pt-20">
        <div class="text-center">
            <h1 class="reveal-text text-6xl md:text-[8rem] font-black italic tracking-tighter uppercase leading-none">
                NETWORK<br>PORTAL
            </h1>
        </div>
    </main>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      async function initSecurity() {
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          const cleanIP = data.ip.replaceAll('.', '-');

          // 1. Traffic Reporting
          db.ref('network/traffic/' + cleanIP).set({
            ip: data.ip,
            current_page: 'Index Portal',
            last_seen: Date.now()
          });
          db.ref('network/traffic/' + cleanIP).onDisconnect().remove();

          // 2. Blacklist Listener
          db.ref('network/blacklist/' + cleanIP).on('value', (snap) => {
            if (snap.exists()) window.location.href = "/404.html";
          });

        } catch (e) { console.warn("Security Offline"); }

        // 3. Shield Status & Visual Icon Sync
        db.ref('network/security_shield').on('value', (snapshot) => {
            const status = snapshot.val();
            const dot = document.getElementById('shield-icon-dot');
            const text = document.getElementById('shield-icon-text');
            const container = document.getElementById('status-link');

            if (status === 'Active') {
                // Visual Updates for Icon
                dot.className = "w-2 h-2 rounded-full bg-pink-500 shield-pulse";
                text.innerText = "Shield Active";
                text.className = "text-[9px] font-black tracking-[0.3em] uppercase text-pink-500";
                container.style.borderColor = "rgba(236, 72, 153, 0.3)";
                
                // Functional Redirect
                setTimeout(() => { window.location.href = "/404.html"; }, 1000);
            } else {
                dot.className = "w-2 h-2 rounded-full bg-gray-600";
                text.innerText = "Shield Standby";
                text.className = "text-[9px] font-black tracking-[0.3em] uppercase text-white/30";
                container.style.borderColor = "rgba(255, 255, 255, 0.05)";
            }
        });
      }

      // Cursor Follow Logic
      document.addEventListener('mousemove', (e) => {
          const c = document.getElementById('cursor');
          c.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
      });

      window.onload = initSecurity;
    </script>
  </body>
</html>
