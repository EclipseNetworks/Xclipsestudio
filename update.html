<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 System Logs | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { 
            background: #02040a; 
            color: white; 
            font-family: 'JetBrains Mono', monospace;
            background-image: radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.01); 
            border: 1px solid rgba(236, 72, 153, 0.1); 
            backdrop-filter: blur(15px); 
        }
        .status-pulse {
            box-shadow: 0 0 15px #ec4899;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 1; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto mb-8">
        <div class="glass-panel p-4 flex justify-between items-center border-l-4 border-pink-500">
            <div class="flex items-center gap-4">
                <div id="shield-indicator" class="w-3 h-3 rounded-full bg-gray-500"></div>
                <div>
                    <p class="text-[10px] text-white/40 tracking-[0.3em] uppercase">Security Protocol</p>
                    <h2 id="shield-text" class="text-xs font-bold tracking-widest uppercase">Syncing Uplink...</h2>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-pink-500/50 uppercase font-bold" id="marquee-display">Establishing Secure Broadcast...</p>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto grid grid-cols-1 gap-8">
        <div class="glass-panel p-8">
            <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                <h3 class="text-sm font-bold text-pink-500 tracking-[0.4em] uppercase italic">Neural Network Logs</h3>
                <span class="text-[10px] text-white/20 uppercase">AES-256 Encrypted Connection</span>
            </div>
            
            <div id="logs-container" class="space-y-4 h-[500px] overflow-y-auto pr-4 scroll-smooth">
                <p class="text-[10px] text-white/20 italic">Awaiting data stream...</p>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
            authDomain: "xclipse-security.firebaseapp.com",
            databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "xclipse-security",
            storageBucket: "xclipse-security.firebasestorage.app",
            messagingSenderId: "161353959200",
            appId: "1:161353959200:web:d0b36f7817b31842cff945"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function syncNetworkProtocols() {
            // 1. Sync Shield Status
            db.ref('network/security_shield').on('value', (snapshot) => {
                const status = snapshot.val() || 'Disabled';
                const indicator = document.getElementById('shield-indicator');
                const text = document.getElementById('shield-text');
                
                if (status === 'Active') {
                    indicator.className = "w-3 h-3 rounded-full bg-pink-500 status-pulse";
                    text.innerText = "Shield: FULL LOCKDOWN";
                    text.classList.add('text-pink-500');
                } else {
                    indicator.className = "w-3 h-3 rounded-full bg-gray-600";
                    text.innerText = "Shield: STANDBY";
                    text.classList.remove('text-pink-500');
                }
            });

            // 2. Sync Global Marquee
            db.ref('network/global_marquee').on('value', (snapshot) => {
                const msg = snapshot.val() || "XCLIPSE NETWORK // IDLE";
                document.getElementById('marquee-display').innerText = msg.toUpperCase();
            });

            // 3. Sync Traffic Logs
            db.ref('network/traffic').on('value', (snapshot) => {
                const container = document.getElementById('logs-container');
                const data = snapshot.val();
                container.innerHTML = '';
                
                if (data) {
                    Object.keys(data).forEach(id => {
                        const entry = data[id];
                        const logEntry = document.createElement('div');
                        logEntry.className = "p-4 bg-white/5 border-l-2 border-pink-500/20 hover:bg-white/10 transition-all";
                        logEntry.innerHTML = `
                            <div class="flex justify-between items-center">
                                <span class="text-[11px] font-bold text-pink-400 tracking-widest">${id.replace(/-/g, '.')}</span>
                                <span class="text-[9px] text-white/20">${new Date().toLocaleTimeString()}</span>
                            </div>
                            <p class="text-[10px] text-white/50 mt-1 uppercase">Accessing Node: <span class="text-white">${entry.current_page || 'Root'}</span></p>
                        `;
                        container.prepend(logEntry);
                    });
                } else {
                    container.innerHTML = '<p class="text-[10px] text-white/20 italic">No active neural links detected.</p>';
                }
            });
        }

        // Initialize on Load
        window.onload = syncNetworkProtocols;
    </script>
</body>
</html>
