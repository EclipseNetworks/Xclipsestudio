<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 System Logs | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const systemLogsRef = db.ref('system_logs');

      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', dark: '#050811', spotify: '#1db954', danger: '#ef4444' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #ec4899; }
      * { -webkit-user-select: none; user-select: none; outline: none !important; }
      body { background: #050811; color: white; cursor: none; overflow-x: hidden; font-family: 'Montserrat', sans-serif; }
      
      #cursor { width: 8px; height: 8px; background: #ec4899; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999999; mix-blend-mode: difference; }
      .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050811 100%); }
      .grid-overlay { position: absolute; inset: 0; background-image: linear-gradient(rgba(236, 72, 153, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(236, 72, 153, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; }
      
      .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
      
      .announcement-container { width: 100%; overflow: hidden; background: rgba(236, 72, 153, 0.05); border-top: 1px solid rgba(236, 72, 153, 0.1); border-bottom: 1px solid rgba(236, 72, 153, 0.1); padding: 10px 0; }
      .announcement-text { display: inline-block; white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.8em; color: #ec4899; animation: slideText 30s linear infinite; }
      @keyframes slideText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

      .node-card { border-left: 2px solid rgba(255,255,255,0.05); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
      .node-card:hover { border-left-color: #ec4899; transform: translateX(5px); background: rgba(255,255,255,0.03); }
      .node-card.github:hover { border-left-color: #1db954; }
    </style>
</head>
<body>
    
    <div id="cursor"></div>
    <div class="mesh-bg"></div>
    <div class="grid-overlay"></div>

    <nav class="fixed top-0 left-0 w-full p-8 flex justify-between items-center z-[60]">
        <div class="font-display text-[9px] tracking-[0.5em] text-white/30 italic">XCLIPSE_UPDATE_PROTOCOL</div>
        <button onclick="toggleLoginModal()" class="w-10 h-10 glass-card rounded-full flex items-center justify-center text-white/20 hover:text-primary transition-all">
            <i class="fas fa-terminal"></i>
        </button>
    </nav>

    <div class="mt-24 announcement-container">
        <div class="announcement-text uppercase italic">SYSTEM STATUS: ALL NODES OPERATIONAL // FETCHING LIVE GITHUB REPOSITORY UPDATES // XCLIPSE STUDIO v2.0.26</div>
    </div>

    <header class="pt-24 pb-16 px-6 text-center">
        <h1 class="font-display text-4xl md:text-6xl italic tracking-tighter mb-4 text-white">SYSTEM_LOGS</h1>
        <p class="font-mono text-[8px] tracking-[1em] text-white/20 uppercase italic">Real-Time Infrastructure History</p>
    </header>

    <main class="max-w-5xl mx-auto px-6 pb-40">
        <div id="main-update-feed" class="space-y-6">
            <div class="text-center font-mono text-[9px] text-white/10 uppercase animate-pulse">Synchronizing with GitHub Mainframe...</div>
        </div>
    </main>

    <div id="login-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/80 backdrop-blur-xl">
        <div class="w-[350px] glass-card p-10 rounded-[2rem]">
            <input type="password" id="admin-key" placeholder="SECURE_KEY" class="w-full bg-transparent border-b border-white/10 py-4 mb-8 text-center font-mono text-sm outline-none focus:border-primary">
            <button onclick="executeLogin()" class="w-full py-4 bg-primary/10 border border-primary/20 text-primary font-display text-[9px] uppercase tracking-widest hover:bg-primary hover:text-white transition-all">Verify Access</button>
        </div>
    </div>

    <script>
        // CURSOR
        document.addEventListener('mousemove', (e) => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px';
        });

        const GITHUB_OWNER = 'EclipseNetworks';
        const GITHUB_REPO = 'Xclipsestudio';

        async function syncUpdates() {
            const feed = document.getElementById('main-update-feed');
            
            // 1. Fetch Firebase Manual Logs
            const firebaseSnap = await systemLogsRef.orderByChild('timestamp').once('value');
            const manualLogs = [];
            firebaseSnap.forEach(child => {
                manualLogs.push({ ...child.val(), type: 'MANUAL' });
            });

            // 2. Fetch GitHub Commits
            let gitCommits = [];
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/commits?per_page=30`);
                const data = await response.json();
                gitCommits = data.map(c => ({
                    title: c.commit.message,
                    date: new Date(c.commit.author.date).toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' }),
                    timestamp: new Date(c.commit.author.date).getTime(),
                    type: 'GITHUB',
                    sha: c.sha.substring(0, 7)
                }));
            } catch (e) { console.error("GitHub Uplink Offline"); }

            // 3. Merge & Display
            const all = [...manualLogs, ...gitCommits].sort((a, b) => b.timestamp - a.timestamp);
            feed.innerHTML = '';

            all.forEach(log => {
                const isGit = log.type === 'GITHUB';
                feed.insertAdjacentHTML('beforeend', `
                    <div class="node-card glass-card p-6 md:p-8 rounded-xl ${isGit ? 'github' : 'manual'}">
                        <div class="flex flex-col md:flex-row justify-between md:items-center gap-4">
                            <div>
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="w-1.5 h-1.5 rounded-full ${isGit ? 'bg-spotify shadow-[0_0_8px_#1db954]' : 'bg-primary shadow-[0_0_8px_#ec4899]'}"></span>
                                    <span class="font-mono text-[7px] tracking-[0.4em] text-white/30 uppercase italic">${log.date} // ${isGit ? 'GITHUB_PUSH' : 'ADMIN_ENTRY'}</span>
                                </div>
                                <h2 class="font-display text-[11px] md:text-[13px] text-white/90 tracking-widest uppercase italic leading-relaxed">
                                    ${log.title}
                                </h2>
                                ${log.desc ? `<p class="mt-4 font-mono text-[9px] text-white/40 leading-relaxed uppercase">${log.desc}</p>` : ''}
                            </div>
                            <div class="text-right">
                                <span class="font-mono text-[8px] px-3 py-1 border border-white/5 rounded-full text-white/20 uppercase tracking-widest">
                                    ${isGit ? `ID: ${log.sha}` : 'VERIFIED'}
                                </span>
                            </div>
                        </div>
                    </div>
                `);
            });
        }

        function toggleLoginModal() { document.getElementById('login-modal').classList.toggle('hidden'); }
        
        function executeLogin() {
            if(document.getElementById('admin-key').value === "xclipse2026") {
                sessionStorage.setItem('xclipse_auth', 'true');
                alert("ACCESS_GRANTED");
                location.reload();
            }
        }

        window.onload = syncUpdates;
    </script>
</body>
</html>
