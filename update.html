<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 Archive Dashboard | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const galleryRef = db.ref('studio_gallery');
      const uiRef = db.ref('ui_settings');
      const banRef = db.ref('blacklist');
      const whiteRef = db.ref('whitelist');
      const logRef = db.ref('access_logs');
      const broadcastRef = db.ref('global_broadcast');
      const securityRef = db.ref('security_status');
      const systemLogsRef = db.ref('system_logs');

      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', dark: '#050811', spotify: '#1db954', danger: '#ef4444', success: '#22c55e' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #ec4899; box-shadow: 0 0 10px #ec4899; }
      * { -webkit-user-select: none; user-select: none; outline: none !important; }
      body { background: #050811; color: white; cursor: none; overflow-x: hidden; font-family: 'Montserrat', sans-serif; }
      
      #cursor { width: 8px; height: 8px; background: #ec4899; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999999; mix-blend-mode: difference; }
      .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050811 100%); }
      
      .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
      .grid-overlay { position: absolute; inset: 0; background-image: linear-gradient(rgba(236, 72, 153, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(236, 72, 153, 0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: -1; }

      .announcement-container { width: 100%; overflow: hidden; background: rgba(255, 255, 255, 0.02); border-top: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 12px 0; z-index: 55; position: relative; }
      .announcement-text { display: inline-block; white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.6em; color: #ec4899; animation: slideLeftToRight 25s linear infinite; }
      @keyframes slideLeftToRight { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

      .login-input { background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.2); width: 100%; padding: 12px 0; font-size: 14px; color: white; outline: none; transition: 0.3s; }
      .login-input:focus { border-bottom-color: #ec4899; }
      
      .admin-tab { display: none; }
      .admin-tab.active { display: block; }

      .update-node { border-left: 1px solid rgba(255, 255, 255, 0.1); padding-left: 2rem; position: relative; transition: 0.3s; }
      .update-node:hover { border-left-color: #ec4899; background: rgba(255, 255, 255, 0.01); }
      .update-node::before { content: ''; position: absolute; left: -4px; top: 0; width: 8px; height: 8px; background: currentColor; border-radius: 50%; }
      
      .status-pulse { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulseStatus 2s infinite; }
      @keyframes pulseStatus { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    
    <div id="cursor"></div>
    <div class="mesh-bg"></div>

    <div id="main-content">
        <nav class="fixed top-0 left-0 w-full p-8 flex justify-between items-center z-[60]">
            <div class="font-display text-[10px] tracking-[0.5em] text-white/20 italic">XCLIPSE_SYSTEM</div>
            <div class="flex gap-6 items-center">
                 <button onclick="toggleUpdatesPage()" class="font-mono text-[9px] tracking-widest text-white/40 hover:text-primary uppercase italic">System Updates</button>
                 <button onclick="toggleLoginModal()" id="login-icon" class="w-12 h-12 glass-card rounded-full flex items-center justify-center text-white/40 hover:text-primary transition-all">
                    <i class="fas fa-user-circle text-2xl"></i>
                </button>
            </div>
        </nav>

        <div class="mt-28 announcement-container">
            <div id="global-announcement" class="announcement-text uppercase italic">ESTABLISHING SECURE UPLINK...</div>
        </div>

        <header class="py-32 px-6 text-center">
            <h1 id="main_header" class="font-display text-4xl md:text-7xl italic tracking-tighter mb-4">ARCHIVE</h1>
            <p id="sub_header" class="font-mono text-[8px] tracking-[1em] text-white/30 uppercase italic">Network Node Management</p>
        </header>

        <main class="max-w-7xl mx-auto px-6 pb-60">
            <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
        </main>
    </div>

    <div id="updates-page" class="fixed inset-0 z-[80] hidden bg-black/95 backdrop-blur-3xl overflow-y-auto">
        <div class="grid-overlay"></div>
        <div class="max-w-4xl mx-auto px-8 py-32">
            <div class="flex justify-between items-start mb-20">
                <div>
                    <h2 class="font-display text-3xl italic tracking-tighter text-primary mb-2">DEV_LOG</h2>
                    <p class="font-mono text-[8px] tracking-[0.8em] text-white/20 uppercase mb-8">GitHub & Manual Sync</p>
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center">
                            <span class="status-pulse bg-success"></span>
                            <span class="font-mono text-[7px] text-white/30 uppercase">Database: Operational</span>
                        </div>
                        <div class="flex items-center">
                            <span class="status-pulse bg-spotify"></span>
                            <span class="font-mono text-[7px] text-white/30 uppercase">GitHub: Linked</span>
                        </div>
                    </div>
                </div>
                <button onclick="toggleUpdatesPage()" class="text-white/20 hover:text-white"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <div id="combined-feed" class="space-y-16">
                <div class="animate-pulse font-mono text-[10px] text-white/10 uppercase italic">Reading Archive Logs...</div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-md">
        <div class="w-[400px] glass-card rounded-[3rem] p-12 flex flex-col items-center">
            <input type="text" id="admin-id" placeholder="Email ID" class="login-input mb-6">
            <input type="password" id="admin-key" placeholder="Password" class="login-input mb-10">
            <button onclick="executeLogin()" class="w-full py-5 rounded-2xl bg-white/5 text-white font-display text-[10px] tracking-[0.3em] uppercase italic hover:bg-primary transition-all">Execute Login</button>
        </div>
    </div>

    <div id="dashboard" class="fixed inset-0 z-[110] hidden flex items-center justify-center bg-black/90 backdrop-blur-3xl p-6">
        <div class="w-full max-w-4xl glass-card p-10 rounded-[3rem] relative overflow-y-auto max-h-[90vh]">
            <button onclick="closeDashboard()" class="absolute top-8 right-8 text-white/10 hover:text-white"><i class="fas fa-times"></i></button>
            <div class="flex gap-6 mb-10 border-b border-white/5 pb-4">
                <button onclick="switchTab('uplink')" id="btn-uplink" class="font-display text-[9px] tracking-widest uppercase italic text-primary">Media</button>
                <button onclick="switchTab('logs')" id="btn-logs" class="font-display text-[9px] tracking-widest uppercase italic text-white/20">System Logs</button>
                <button onclick="switchTab('settings')" id="btn-settings" class="font-display text-[9px] tracking-widest uppercase italic text-white/20">Security</button>
            </div>

            <div id="tab-logs" class="admin-tab space-y-6">
                <input type="text" id="log-title" placeholder="Log Title" class="login-input">
                <textarea id="log-desc" placeholder="Details..." class="login-input h-24 bg-white/5 p-4 rounded-xl"></textarea>
                <button onclick="publishSystemLog()" class="w-full bg-primary py-4 rounded-xl font-black text-[9px] uppercase tracking-widest">Post Log</button>
                <div id="admin-logs-list" class="space-y-2 mt-10"></div>
            </div>

            <div id="tab-uplink" class="admin-tab active">
                <p class="font-mono text-[10px] text-white/20 uppercase">Media controls active.</p>
            </div>

            <div id="tab-settings" class="admin-tab">
                <button onclick="logout()" class="w-full bg-white/5 text-white/40 py-4 rounded-xl font-mono text-[8px] uppercase">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // CURSOR
        document.addEventListener('mousemove', (e) => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px';
        });

        const GITHUB_OWNER = 'EclipseNetworks';
        const GITHUB_REPO = 'Xclipsestudio';

        // FETCH ALL DATA
        async function fetchSystemUpdates() {
            const feed = document.getElementById('combined-feed');
            feed.innerHTML = '';
            
            // 1. Fetch Manual Firebase Logs
            const firebaseSnap = await systemLogsRef.orderByChild('timestamp').once('value');
            const manualLogs = [];
            firebaseSnap.forEach(child => {
                manualLogs.push({ ...child.val(), type: 'MANUAL' });
            });

            // 2. Fetch GitHub Commits
            let gitCommits = [];
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/commits?per_page=100`);
                const data = await response.json();
                gitCommits = data.map(c => ({
                    title: c.commit.message,
                    date: new Date(c.commit.author.date).toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' }),
                    timestamp: new Date(c.commit.author.date).getTime(),
                    type: 'GITHUB',
                    sha: c.sha.substring(0, 7)
                }));
            } catch (e) { console.error("GitHub Offline"); }

            // 3. Merge and Sort
            const allUpdates = [...manualLogs, ...gitCommits].sort((a, b) => b.timestamp - a.timestamp);

            allUpdates.forEach(log => {
                const isGit = log.type === 'GITHUB';
                const accent = isGit ? 'text-spotify' : 'text-primary';
                const label = isGit ? 'GITHUB_PUSH' : 'NODE_UPDATE';
                
                feed.insertAdjacentHTML('beforeend', `
                    <div class="update-node" style="color: ${isGit ? '#1db954' : '#ec4899'}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-mono text-[7px] text-white/10 tracking-[0.5em] block uppercase italic">${log.date} // ${label}</span>
                            <span class="font-mono text-[7px] ${accent} border border-white/5 px-2 py-1 uppercase tracking-widest">${isGit ? 'COMMITTED' : 'STABLE'}</span>
                        </div>
                        <h3 class="font-display text-[11px] text-white/80 tracking-widest uppercase italic mb-3 leading-relaxed">${log.title}</h3>
                        ${log.desc ? `<p class="font-mono text-[9px] text-white/30 uppercase leading-relaxed max-w-2xl">${log.desc}</p>` : ''}
                        ${isGit ? `<p class="font-mono text-[7px] text-white/10 uppercase mt-2">ID: ${log.sha}</p>` : ''}
                    </div>
                `);
            });
        }

        function toggleUpdatesPage() {
            const p = document.getElementById('updates-page');
            p.classList.toggle('hidden');
            if (!p.classList.contains('hidden')) fetchSystemUpdates();
        }

        // AUTH & TABS
        function executeLogin() {
            if(document.getElementById('admin-id').value === "admin" && document.getElementById('admin-key').value === "xclipse2026") {
                sessionStorage.setItem('xclipse_auth', 'true');
                location.reload();
            }
        }
        function toggleLoginModal() {
            if (sessionStorage.getItem('xclipse_auth') === 'true') openDashboard();
            else document.getElementById('login-modal').classList.toggle('hidden');
        }
        function openDashboard() { document.getElementById('dashboard').classList.remove('hidden'); document.body.style.cursor = 'auto'; }
        function closeDashboard() { document.getElementById('dashboard').classList.add('hidden'); document.body.style.cursor = 'none'; }
        function logout() { sessionStorage.removeItem('xclipse_auth'); location.reload(); }
        function switchTab(id) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
        }

        function publishSystemLog() {
            const title = document.getElementById('log-title').value;
            const desc = document.getElementById('log-desc').value;
            if (!title) return;
            systemLogsRef.push({
                title: title.toUpperCase(),
                desc: desc,
                date: new Date().toLocaleDateString('en-AU', { day: '2-digit', month: 'short' }),
                timestamp: Date.now()
            }).then(() => location.reload());
        }
    </script>
</body>
</html>
