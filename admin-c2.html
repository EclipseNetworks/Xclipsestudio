<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XCLIPSE | NEURAL UPLINK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon-pink: #ec4899;
            --deep-obsidian: #02040a;
            --glass-border: rgba(236, 72, 153, 0.2);
        }

        body { 
            background: var(--deep-obsidian); 
            color: white; 
            font-family: 'JetBrains Mono', monospace; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(5, 8, 17, 0.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(5, 8, 17, 0.8) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .heavenly-glass { 
            background: rgba(255, 255, 255, 0.01); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #fff, var(--neon-pink), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .btn-neon {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--neon-pink);
            background: transparent;
            color: var(--neon-pink);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 4px;
        }

        .btn-neon:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 30px var(--neon-pink);
            transform: scale(1.02);
        }

        input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            padding: 16px;
            font-size: 12px;
            letter-spacing: 2px;
            color: white;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.2);
            outline: none;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--neon-pink);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-pink); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center">
        <div class="text-center p-10 heavenly-glass max-w-md w-full mx-4">
            <div class="mb-8">
                <i class="fas fa-fingerprint text-5xl text-pink-500 mb-4 animate-pulse"></i>
                <h2 class="font-display text-white text-xl tracking-[0.8em] uppercase italic">XCLIPSE_CORE</h2>
                <p class="text-[9px] text-pink-500/50 mt-2 tracking-widest">ENCRYPTION LEVEL: SEVEN_HEAVEN</p>
            </div>
            <input type="password" id="master-pass" placeholder="DECIPHER KEY" class="text-center mb-6 w-full">
            <button onclick="authenticate()" class="w-full btn-neon py-5 text-xs">Establish Link</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto opacity-0 transition-opacity duration-1000" id="main-content">
        <header class="flex flex-col md:flex-row justify-between items-end mb-12 border-b border-pink-500/10 pb-8">
            <div class="w-full">
                <h1 class="font-display text-4xl italic uppercase shimmer-text">XCLIPSE <span class="text-white">C2</span></h1>
                <div class="flex items-center gap-4 mt-2">
                    <p class="text-[10px] text-white/30 tracking-[0.6em]">NETWORK STATUS:</p>
                    <span class="status-dot animate-ping"></span>
                    <p id="uplink-status" class="text-[10px] text-pink-500 font-bold uppercase">Uplink Stable</p>
                </div>
            </div>
            <div class="mt-6 md:mt-0 text-right font-mono">
                <p id="ip-display" class="text-[10px] text-white/40 tracking-widest">NODE_ADDR: 0.0.0.0</p>
                <p class="text-[10px] text-pink-500/30">AES-256 GCM ENCRYPTED</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-8">
                <div class="heavenly-glass p-8 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-2 opacity-10">
                        <i class="fas fa-shield-alt text-6xl"></i>
                    </div>
                    <h3 class="text-[11px] font-bold mb-6 text-pink-500 uppercase tracking-[0.4em]">System Shield</h3>
                    <button id="lockdown-btn" onclick="toggleLockdown()" class="w-full btn-neon py-6 text-[10px]">
                        Syncing Protocols...
                    </button>
                    <p class="text-[8px] text-white/20 mt-4 text-center tracking-widest italic">ROOT ACCESS REQUIRED FOR OVERRIDE</p>
                </div>

                <div class="heavenly-glass p-8">
                    <h3 class="text-[11px] font-bold mb-6 text-pink-500 uppercase tracking-[0.4em]">Neural Traffic</h3>
                    <div id="live-visitors" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="heavenly-glass p-8">
                        <h3 class="text-[11px] font-bold mb-6 text-pink-500 uppercase tracking-[0.4em]">Broadcast</h3>
                        <div class="space-y-4">
                            <input type="text" id="marquee-msg" placeholder="SYSTEM_MESSAGE_STRING..." class="w-full">
                            <button onclick="updateMarquee()" class="w-full btn-neon py-4 text-[9px]">Transmit</button>
                        </div>
                    </div>
                    <div class="heavenly-glass p-8">
                        <h3 class="text-[11px] font-bold mb-6 text-red-500 uppercase tracking-[0.4em]">Blacklist</h3>
                        <div class="space-y-4">
                            <input type="text" id="target-ip" placeholder="TARGET_ADDR (0.0.0.0)" class="w-full">
                            <button onclick="banIP()" class="w-full py-4 border border-red-500 text-red-500 hover:bg-red-500 hover:text-white transition text-[9px] font-bold tracking-[0.3em]">Excommunicate</button>
                        </div>
                    </div>
                </div>

                <div class="heavenly-glass p-8">
                    <div class="flex justify-between items-center mb-6 border-b border-pink-500/10 pb-4">
                        <h3 class="text-[11px] font-bold text-white/60 uppercase tracking-[0.4em]">System Execution Logs</h3>
                        <span class="text-[9px] text-pink-500 font-mono">X-OS v2.0.26</span>
                    </div>
                    <div id="logs" class="h-64 overflow-y-auto text-[10px] space-y-2 font-mono scroll-smooth">
                        <p class="text-white/20 italic">Initializing encrypted kernel...</p>
                    </div>
                </div>

                <div id="ban-list" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION - DO NOT MODIFY PATHS
        const firebaseConfig = {
            apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
            authDomain: "xclipse-security.firebaseapp.com",
            databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "xclipse-security",
            storageBucket: "xclipse-security.firebasestorage.app",
            messagingSenderId: "161353959200",
            appId: "1:161353959200:web:d0b36f7817b31842cff945"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function authenticate() {
            if(document.getElementById('master-pass').value === 'XCLIPSE') { 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                initC2();
                addLog('>> UPLINK ESTABLISHED: SECURE TUNNEL ACTIVE', 'pink');
            } else { 
                addLog('>> CRITICAL_ERROR: UNAUTHORIZED ACCESS ATTEMPT', 'red');
                alert('ACCESS_DENIED'); 
            }
        }

        function initC2() {
            // SYNC TRAFFIC
            db.ref('network/traffic').on('value', (s) => {
                const container = document.getElementById('live-visitors');
                container.innerHTML = '';
                const data = s.val();
                if(!data) return;
                Object.keys(data).forEach(id => {
                    const u = data[id];
                    container.innerHTML += `
                        <div class="p-4 bg-white/5 border-l-2 border-pink-500/30 hover:bg-white/10 transition-all group">
                            <div class="flex justify-between items-center">
                                <p class="text-[10px] font-bold text-pink-400 tracking-widest">${id.replaceAll('-', '.')}</p>
                                <span class="text-[8px] text-white/20 group-hover:text-pink-500 transition-colors">LIVE</span>
                            </div>
                            <p class="text-[8px] opacity-40 uppercase mt-1">NODE_LOC: ${u.current_page || 'ROOT'}</p>
                        </div>`;
                });
            });

            // SYNC BLACKLIST
            db.ref('network/blacklist').on('value', (s) => {
                const list = document.getElementById('ban-list');
                list.innerHTML = '';
                const data = s.val();
                if(data) {
                    Object.keys(data).forEach(id => {
                        list.innerHTML += `
                            <div class="heavenly-glass p-4 border-red-500/20 flex justify-between items-center bg-red-500/5 animate-pulse">
                                <span class="text-[9px] font-mono text-red-500">${id.replaceAll('-', '.')}</span>
                                <button onclick="revokeBan('${id}')" class="text-[8px] text-white/40 hover:text-white">REVOKE</button>
                            </div>`;
                    });
                }
            });

            // SYNC SHIELD
            db.ref('network/security_shield').on('value', (s) => {
                const active = s.val() === 'Active';
                const btn = document.getElementById('lockdown-btn');
                btn.innerText = active ? "SHIELD: ENGAGED" : "SHIELD: DISENGAGED";
                btn.style.borderColor = active ? "var(--neon-pink)" : "rgba(255,255,255,0.1)";
                btn.style.color = active ? "white" : "rgba(255,255,255,0.3)";
                btn.style.background = active ? "var(--neon-pink)" : "transparent";
            });
        }

        function banIP() {
            const ip = document.getElementById('target-ip').value;
            if(!ip.includes('.')) return;
            db.ref('network/blacklist/' + ip.replaceAll('.', '-')).set({ 
                timestamp: Date.now(),
                status: 'BANNED'
            });
            addLog(`>> SYSTEM_COMMAND: EXCOMMUNICATED NODE [${ip}]`, 'red');
            document.getElementById('target-ip').value = '';
        }

        function revokeBan(id) { 
            db.ref('network/blacklist/' + id).remove(); 
            addLog(`>> SYSTEM_COMMAND: RESTORED ACCESS TO [${id.replaceAll('-', '.')}]`, 'pink');
        }

        function toggleLockdown() {
            db.ref('network/security_shield').once('value', (s) => {
                const newState = s.val() === 'Active' ? 'Disabled' : 'Active';
                db.ref('network/security_shield').set(newState);
                addLog(`>> PROTOCOL_SHIFT: SHIELD SET TO ${newState.toUpperCase()}`, 'pink');
            });
        }

        function updateMarquee() {
            const msg = document.getElementById('marquee-msg').value;
            if(!msg) return;
            db.ref('network/global_marquee').set(msg);
            addLog(`>> BROADCAST_UP: ${msg}`, 'pink');
            document.getElementById('marquee-msg').value = '';
        }

        function addLog(msg, color = 'white') {
            const logEl = document.getElementById('logs');
            const p = document.createElement('p');
            p.style.color = color === 'pink' ? '#ec4899' : (color === 'red' ? '#ff4444' : 'white');
            p.innerHTML = `<span style="opacity:0.2;">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            logEl.prepend(p);
        }

        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('ip-display').innerText = `NODE_ADDR: ${d.ip}`);
    </script>
</body>
</html>
