<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 Visual Gallery | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      // XCLIPSE SECURITY FIREBASE CONFIG
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const galleryRef = db.ref('studio_gallery');

      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', dark: '#050811' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      body { background: #050811; color: white; cursor: none; overflow-x: hidden; }
      .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
      #cursor { width: 8px; height: 8px; background: #ec4899; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; }
      .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%); }
      
      /* Smooth transitions for drag zone */
      #drop-zone.drag-over { border-color: #ec4899; background: rgba(236, 72, 153, 0.1); transform: scale(1.02); }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div class="mesh-bg"></div>

    <div id="admin-panel" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl">
        <div class="w-full max-w-xl glass p-10 rounded-[3rem] border-primary/20 shadow-2xl relative">
            <button onclick="closeAdmin()" class="absolute top-8 right-8 text-white/20 hover:text-white transition-colors"><i class="fas fa-times"></i></button>
            <h2 class="font-display text-primary text-[10px] tracking-[0.5em] uppercase mb-8 italic">Archive Uplink</h2>
            
            <div class="space-y-6">
                <div id="drop-zone" class="w-full h-56 border-2 border-dashed border-white/10 rounded-[2.5rem] flex flex-col items-center justify-center transition-all duration-500 cursor-pointer group">
                    <div id="drop-content" class="text-center">
                        <i class="fas fa-cloud-upload-alt text-4xl text-white/10 group-hover:text-primary transition-colors mb-4"></i>
                        <p class="font-mono text-[9px] text-white/40 uppercase tracking-widest group-hover:text-white">Drag & Drop Image</p>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>

                <input type="text" id="img-title" placeholder="Project / Track Name" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl font-mono text-xs outline-none focus:border-primary transition-all">
                
                <button id="push-btn" onclick="saveImage()" class="w-full bg-primary text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.4em] hover:shadow-[0_0_30px_#ec4899] transition-all active:scale-95 disabled:opacity-50">Push to Database</button>
            </div>
        </div>
    </div>

    <header class="py-24 px-6 text-center">
        <h1 class="font-display text-5xl md:text-8xl italic tracking-tighter mb-6">ARCHIVE</h1>
        <p class="font-mono text-[8px] tracking-[1em] text-white/20 uppercase">Xclipse Studio Visual Database</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            </div>
    </main>

    <button onclick="triggerAuth()" class="fixed bottom-10 right-10 w-14 h-14 glass rounded-full flex items-center justify-center text-white/10 hover:text-primary hover:border-primary transition-all z-50">
        <i class="fas fa-lock"></i>
    </button>

    <script>
        let droppedImageData = null;
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        // --- AUTH & UI LOGIC ---
        function triggerAuth() {
            const user = prompt("System User:");
            const pass = prompt("Access Key:");
            if(user === "admin" && pass === "xclipse2026") {
                document.getElementById('admin-panel').classList.remove('hidden');
            } else { alert("Access Denied."); }
        }

        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }

        // --- DRAG & DROP LOGIC ---
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
        });

        dropZone.ondragover = () => dropZone.classList.add('drag-over');
        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
        
        dropZone.ondrop = (e) => {
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        };

        function handleFiles(files) {
            const file = files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    droppedImageData = reader.result;
                    document.getElementById('drop-content').innerHTML = `
                        <i class="fas fa-check-circle text-primary text-3xl mb-2"></i>
                        <p class="font-mono text-[9px] text-white uppercase tracking-widest">Image Ready</p>
                    `;
                };
            }
        }

        // --- FIREBASE SYNC ---
        function saveImage() {
            const title = document.getElementById('img-title').value;
            const btn = document.getElementById('push-btn');
            if (!droppedImageData) return;

            btn.disabled = true;
            btn.innerText = "SYNCHRONIZING...";

            galleryRef.push({
                url: droppedImageData,
                title: title || "Studio Session",
                timestamp: Date.now()
            }).then(() => {
                droppedImageData = null;
                document.getElementById('img-title').value = '';
                btn.disabled = false;
                btn.innerText = "Push to Firebase";
                document.getElementById('drop-content').innerHTML = `
                    <i class="fas fa-cloud-upload-alt text-4xl text-white/10 mb-4"></i>
                    <p class="font-mono text-[9px] text-white/40 uppercase tracking-widest">Drag & Drop Image</p>
                `;
                closeAdmin();
            });
        }

        galleryRef.on('value', (snapshot) => {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                const html = `
                    <div class="glass group relative overflow-hidden rounded-[2.5rem] aspect-square transition-all duration-700 hover:-translate-y-3">
                        <img src="${data.url}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 scale-110 group-hover:scale-100 transition-all duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all p-10 flex flex-col justify-end">
                            <span class="text-primary font-display text-[9px] tracking-widest uppercase italic">${data.title}</span>
                            <div class="h-[1px] w-0 group-hover:w-full bg-primary/30 transition-all duration-700 mt-2"></div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('afterbegin', html);
            });
        });

        // --- INTERACTION ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
  </body>
</html>
