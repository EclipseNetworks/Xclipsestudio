<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 Archive Dashboard | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const galleryRef = db.ref('studio_gallery');

      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', dark: '#050811', spotify: '#1db954', soundcloud: '#ff5500', danger: '#ef4444' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #ec4899; box-shadow: 0 0 10px #ec4899; }
      * { -webkit-user-select: none; user-select: none; -webkit-user-drag: none; outline: none !important; }
      body { background: #050811; color: white; cursor: none; overflow-x: hidden; scroll-behavior: smooth; }
      
      #cursor { width: 8px; height: 8px; background: #ec4899; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999999; mix-blend-mode: difference; }
      .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%); }
      .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
      
      #dashboard { transition: all 0.5s ease; }
    </style>
  </head>
  <body oncontextmenu="return false;">
    
    <div id="cursor"></div>
    <div class="mesh-bg"></div>

    <header class="py-24 px-6 text-center">
        <h1 class="font-display text-4xl md:text-7xl italic tracking-tighter mb-4">ARCHIVE</h1>
        <p class="font-mono text-[8px] tracking-[1em] text-white/30 uppercase italic">Maximum Security Session Active</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-60">
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
    </main>

    <button onclick="checkSessionAndOpen()" class="fixed bottom-10 right-10 w-16 h-16 glass rounded-full flex items-center justify-center text-primary border border-primary/20 transition-all z-50">
        <i class="fas fa-terminal text-xl"></i>
    </button>

    <div id="dashboard" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-3xl">
        <div class="w-full max-w-2xl glass p-10 rounded-[3rem] border-white/5 relative">
            <button onclick="closeDashboard()" class="absolute top-8 right-8 text-white/10 hover:text-white"><i class="fas fa-times"></i></button>
            
            <div class="mb-8 flex justify-between items-start">
                <div>
                    <h2 id="dash-mode-text" class="font-display text-primary text-[10px] tracking-[0.4em] uppercase mb-1 italic">Uplink Mode</h2>
                    <p id="dash-sub-text" class="font-mono text-[7px] text-white/20 uppercase tracking-widest italic">Session Authenticated</p>
                </div>
                <button id="delete-btn" onclick="deleteAsset()" class="hidden bg-danger/10 text-danger border border-danger/20 px-4 py-2 rounded-full font-mono text-[8px] uppercase tracking-widest hover:bg-danger hover:text-white transition-all">Destroy Asset</button>
            </div>

            <input type="hidden" id="active-asset-id">
            
            <div class="space-y-5">
                <div id="drop-zone" class="w-full h-36 border-2 border-dashed border-white/10 rounded-[2rem] flex flex-col items-center justify-center transition-all group hover:border-primary/40 cursor-pointer">
                    <div id="drop-content" class="text-center">
                        <i class="fas fa-image text-xl text-white/10 group-hover:text-primary mb-2"></i>
                        <p class="font-mono text-[8px] text-white/30 uppercase">Drop Visual Core</p>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>

                <input type="text" id="asset-title" placeholder="Project Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl font-mono text-xs outline-none focus:border-primary">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="asset-spotify" placeholder="Spotify Link" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl font-mono text-xs outline-none focus:border-spotify/40 text-spotify">
                    <input type="text" id="asset-soundcloud" placeholder="SoundCloud Link" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl font-mono text-xs outline-none focus:border-soundcloud/40 text-soundcloud">
                </div>

                <button onclick="commitToArchive()" id="commit-btn" class="w-full bg-primary text-white py-5 rounded-xl font-black text-[10px] uppercase tracking-[0.4em]">Synchronize Archive</button>
            </div>
        </div>
    </div>

    <script>
        // --- SECURITY: BLOCK KEYBOARD ---
        document.addEventListener('keydown', (e) => { e.preventDefault(); return false; }, true);

        // --- SESSION LOGIC ---
        function checkSessionAndOpen() {
            // Check if "xclipse_auth" exists in SessionStorage
            if (sessionStorage.getItem('xclipse_auth') === 'true') {
                openDashboard();
            } else {
                const u = prompt("Admin ID:");
                const k = prompt("Security Key:");
                if(u === "admin" && k === "xclipse2026") {
                    sessionStorage.setItem('xclipse_auth', 'true');
                    openDashboard();
                } else {
                    alert("ACCESS DENIED: Unauthorized Signature.");
                }
            }
        }

        function openDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.body.style.cursor = 'auto';
        }

        function closeDashboard() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('active-asset-id').value = "";
            document.getElementById('delete-btn').classList.add('hidden');
            document.getElementById('dash-mode-text').innerText = "Uplink Mode";
            document.getElementById('asset-title').value = "";
            document.getElementById('asset-spotify').value = "";
            document.getElementById('asset-soundcloud').value = "";
            base64Image = null;
            document.body.style.cursor = 'none';
        }

        // --- DASHBOARD OPERATIONS ---
        let base64Image = null;
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => processFile(e.target.files[0]);
        ['dragover', 'drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); }));
        dropZone.ondrop = (e) => { e.preventDefault(); processFile(e.dataTransfer.files[0]); };

        function processFile(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    base64Image = reader.result;
                    document.getElementById('drop-content').innerHTML = `<i class="fas fa-check text-primary"></i>`;
                };
            }
        }

        function initiateEdit(key, title, spot, sound) {
            // Check session before allowing edit trigger
            if (sessionStorage.getItem('xclipse_auth') !== 'true') return checkSessionAndOpen();
            
            document.getElementById('active-asset-id').value = key;
            document.getElementById('asset-title').value = title;
            document.getElementById('asset-spotify').value = spot !== "null" ? spot : "";
            document.getElementById('asset-soundcloud').value = sound !== "null" ? sound : "";
            
            document.getElementById('dash-mode-text').innerText = "Edit Mode";
            document.getElementById('delete-btn').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.body.style.cursor = 'auto';
        }

        function deleteAsset() {
            const key = document.getElementById('active-asset-id').value;
            if (confirm("Permanently destroy this asset from the archive?")) {
                galleryRef.child(key).remove().then(() => location.reload());
            }
        }

        function commitToArchive() {
            const assetKey = document.getElementById('active-asset-id').value;
            const data = {
                title: document.getElementById('asset-title').value || "Studio Session",
                spotify: document.getElementById('asset-spotify').value || null,
                soundcloud: document.getElementById('asset-soundcloud').value || null,
            };

            if (assetKey) {
                if (base64Image) data.url = base64Image;
                galleryRef.child(assetKey).update(data).then(() => location.reload());
            } else {
                if (!base64Image) return alert("Visual Core Required");
                data.url = base64Image;
                galleryRef.push(data).then(() => location.reload());
            }
        }

        // --- RENDER ---
        galleryRef.on('value', (snapshot) => {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const item = child.val();
                const key = child.key;
                
                grid.insertAdjacentHTML('afterbegin', `
                    <div class="glass relative overflow-hidden rounded-[3rem] aspect-[4/5] group transition-all duration-700">
                        <img src="${item.url}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000">
                        
                        <button onclick="initiateEdit('${key}', '${item.title}', '${item.spotify}', '${item.soundcloud}')" class="absolute top-8 left-8 w-8 h-8 glass rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center text-[10px] text-white/20 hover:text-primary transition-all">
                            <i class="fas fa-edit"></i>
                        </button>

                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 p-10 flex flex-col justify-end">
                            <h3 class="font-display text-primary text-[10px] tracking-widest uppercase italic mb-3">${item.title}</h3>
                            <div class="flex gap-3">
                                ${item.spotify ? `<a href="${item.spotify}" target="_blank" class="text-spotify hover:scale-110 transition-transform"><i class="fab fa-spotify text-xl"></i></a>` : ''}
                                ${item.soundcloud ? `<a href="${item.soundcloud}" target="_blank" class="text-soundcloud hover:scale-110 transition-transform"><i class="fab fa-soundcloud text-xl"></i></a>` : ''}
                            </div>
                        </div>
                    </div>
                `);
            });
        });

        // Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
  </body>
</html>
