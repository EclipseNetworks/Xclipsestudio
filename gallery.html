<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 Archive Dashboard | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const galleryRef = db.ref('studio_gallery');
      const uiRef = db.ref('ui_settings'); // New node for UI text/html

      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', dark: '#050811', spotify: '#1db954', soundcloud: '#ff5500', danger: '#ef4444' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #ec4899; box-shadow: 0 0 10px #ec4899; }
      * { -webkit-user-select: none; user-select: none; -webkit-user-drag: none; outline: none !important; }
      body { background: #050811; color: white; cursor: none; overflow-x: hidden; scroll-behavior: smooth; }
      
      #cursor { width: 8px; height: 8px; background: #ec4899; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999999; mix-blend-mode: difference; }
      .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%); }
      .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
      
      /* Hover Edit Styles */
      .editable-container { position: relative; display: inline-block; width: 100%; }
      .edit-html-trigger { 
          position: absolute; top: -20px; right: 50%; transform: translateX(50%);
          font-size: 8px; background: #ec4899; color: white; padding: 4px 10px;
          border-radius: 4px; opacity: 0; transition: 0.3s; cursor: pointer; z-index: 50;
      }
      .editable-container:hover .edit-html-trigger { opacity: 1; top: -30px; }
    </style>
  </head>
  <body oncontextmenu="return false;">
    
    <div id="cursor"></div>
    <div class="mesh-bg"></div>

    <nav class="fixed top-0 left-0 w-full p-8 flex justify-between items-center z-[60]">
        <div class="font-display text-[10px] tracking-[0.5em] text-white/20 italic">XCLIPSE_SYSTEM</div>
        <button onclick="checkSessionAndOpen()" id="login-icon" class="w-12 h-12 glass rounded-full flex items-center justify-center text-white/20 hover:text-primary transition-all">
            <i class="fas fa-user-shield text-xl"></i>
        </button>
    </nav>

    <header class="py-40 px-6 text-center">
        <div class="editable-container" data-ui-key="main_header">
            <div id="html-trigger" class="edit-html-trigger hidden">EDIT HTML</div>
            <h1 id="main_header" class="font-display text-4xl md:text-7xl italic tracking-tighter mb-4 text-white">ARCHIVE</h1>
        </div>
        
        <div class="editable-container" data-ui-key="sub_header">
            <div id="sub-trigger" class="edit-html-trigger hidden">EDIT HTML</div>
            <p id="sub_header" class="font-mono text-[8px] tracking-[1em] text-white/30 uppercase italic">Network Node Management</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-60">
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
    </main>

    <div id="html-editor" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-6 bg-black/95 backdrop-blur-3xl">
        <div class="w-full max-w-lg glass p-8 rounded-[2rem] border-white/5 relative">
            <h2 class="font-display text-primary text-[10px] tracking-widest uppercase italic mb-6">HTML Override Protocol</h2>
            <input type="hidden" id="editing-ui-key">
            <textarea id="html-input" class="w-full h-48 bg-white/5 border border-white/10 p-4 rounded-xl font-mono text-xs text-primary outline-none focus:border-primary/50 mb-6" spellcheck="false"></textarea>
            <div class="flex gap-4">
                <button onclick="saveHTML()" class="flex-1 bg-primary text-white py-4 rounded-xl font-black text-[9px] uppercase tracking-widest">Update Source</button>
                <button onclick="document.getElementById('html-editor').classList.add('hidden')" class="px-6 bg-white/5 text-white/20 rounded-xl font-mono text-[9px] uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-3xl">
        <div class="w-full max-w-2xl glass p-10 rounded-[3rem] relative">
            <button onclick="closeDashboard()" class="absolute top-8 right-8 text-white/10 hover:text-white"><i class="fas fa-times"></i></button>
            <div class="flex gap-6 mb-10 border-b border-white/5 pb-4">
                <button onclick="switchTab('uplink')" class="font-display text-[9px] tracking-widest uppercase italic text-primary">Media Uplink</button>
                <button onclick="switchTab('settings')" class="font-display text-[9px] tracking-widest uppercase italic text-white/20 hover:text-white">Security Settings</button>
            </div>
            
            <div id="tab-uplink" class="admin-tab active space-y-4">
                <input type="hidden" id="active-asset-id">
                <div id="drop-zone" class="w-full h-32 border-2 border-dashed border-white/10 rounded-[2rem] flex items-center justify-center cursor-pointer hover:border-primary/40">
                    <p class="font-mono text-[8px] text-white/30 uppercase">Paste or Drop Image</p>
                </div>
                <input type="text" id="asset-title" placeholder="Title" class="w-full bg-white/5 p-4 rounded-xl font-mono text-xs outline-none focus:border-primary">
                <button onclick="commitToArchive()" class="w-full bg-primary py-4 rounded-xl font-black text-[9px] uppercase tracking-widest">Synchronize</button>
            </div>

            <div id="tab-settings" class="admin-tab space-y-4">
                <button onclick="nukeArchive()" class="w-full bg-danger text-white py-4 rounded-xl font-black text-[9px] uppercase">Erase All Data</button>
                <button onclick="logout()" class="w-full bg-white/5 text-white/40 py-4 rounded-xl font-mono text-[8px] uppercase">Terminate Session</button>
            </div>
        </div>
    </div>

    <script>
        // --- SECURITY ---
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'c' || e.key === 'a')) return true;
            e.preventDefault(); 
            return false; 
        }, true);

        // --- UI SYNC ---
        // Load custom HTML from Firebase
        uiRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                for (let key in data) {
                    const el = document.getElementById(key);
                    if (el) el.innerHTML = data[key];
                }
            }
        });

        // --- HOVER EDITING ---
        function checkSessionAndOpen() {
            if (sessionStorage.getItem('xclipse_auth') === 'true') {
                openDashboard();
            } else {
                const u = prompt("ID:"), k = prompt("KEY:");
                if(u === "admin" && k === "xclipse2026") {
                    sessionStorage.setItem('xclipse_auth', 'true');
                    document.getElementById('login-icon').classList.add('text-primary');
                    activateHoverEdit();
                    openDashboard();
                }
            }
        }

        function activateHoverEdit() {
            if (sessionStorage.getItem('xclipse_auth') === 'true') {
                document.querySelectorAll('.edit-html-trigger').forEach(t => t.classList.remove('hidden'));
                document.querySelectorAll('.editable-container').forEach(c => {
                    c.querySelector('.edit-html-trigger').onclick = () => {
                        const key = c.getAttribute('data-ui-key');
                        const currentHTML = document.getElementById(key).innerHTML;
                        document.getElementById('editing-ui-key').value = key;
                        document.getElementById('html-input').value = currentHTML;
                        document.getElementById('html-editor').classList.remove('hidden');
                    };
                });
            }
        }

        function saveHTML() {
            const key = document.getElementById('editing-ui-key').value;
            const newHTML = document.getElementById('html-input').value;
            uiRef.update({ [key]: newHTML }).then(() => {
                document.getElementById('html-editor').classList.add('hidden');
            });
        }

        // --- DASHBOARD WRAPPERS ---
        function openDashboard() { document.getElementById('dashboard').classList.remove('hidden'); document.body.style.cursor = 'auto'; }
        function closeDashboard() { document.getElementById('dashboard').classList.add('hidden'); document.body.style.cursor = 'none'; }
        function switchTab(tabId) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
        }
        function logout() { sessionStorage.removeItem('xclipse_auth'); location.reload(); }

        // --- ASSET LOGIC (SIMPLIFIED) ---
        let base64Image = null;
        document.addEventListener('paste', (e) => {
            if (document.getElementById('dashboard').classList.contains('hidden')) return;
            const items = e.clipboardData.items;
            for (let i in items) if (items[i].kind === 'file') {
                const reader = new FileReader();
                reader.readAsDataURL(items[i].getAsFile());
                reader.onload = (ev) => base64Image = ev.target.result;
            }
        });

        function commitToArchive() {
            const data = { title: document.getElementById('asset-title').value, url: base64Image };
            if (!base64Image) return alert("Visual Core Empty");
            galleryRef.push(data).then(() => location.reload());
        }

        function renderGallery() {
            galleryRef.on('value', (s) => {
                const g = document.getElementById('gallery-grid');
                g.innerHTML = '';
                s.forEach((c) => {
                    const item = c.val();
                    g.insertAdjacentHTML('afterbegin', `<div class="glass relative overflow-hidden rounded-[3rem] aspect-[4/5] group"><img src="${item.url}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000"><div class="absolute inset-0 p-10 flex flex-col justify-end opacity-0 group-hover:opacity-100 transition-all"><h3 class="font-display text-primary text-[10px] uppercase italic">${item.title}</h3></div></div>`);
                });
            });
        }

        renderGallery();
        activateHoverEdit(); // Run check on load

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
    </script>
  </body>
</html>
