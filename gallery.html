<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 Visual Gallery | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const galleryRef = db.ref('studio_gallery');

      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', dark: '#050811' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      /* Prevent text selection and cursor visibility */
      * { 
        -webkit-user-select: none; 
        user-select: none; 
        -webkit-user-drag: none; 
        outline: none !important;
      }
      body { background: #050811; color: white; cursor: none; overflow-x: hidden; }
      .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
      #cursor { width: 8px; height: 8px; background: #ec4899; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
      .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%); }
      img { pointer-events: none; }
    </style>
  </head>
  <body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">
    <div id="cursor"></div>
    <div class="mesh-bg"></div>

    <div id="admin-panel" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/98 backdrop-blur-2xl">
        <div class="w-full max-w-xl glass p-10 rounded-[3rem] border-primary/20 shadow-2xl relative">
            <button onclick="closeAdmin()" class="absolute top-8 right-8 text-white/20 hover:text-white transition-colors"><i class="fas fa-times"></i></button>
            <h2 class="font-display text-primary text-[10px] tracking-[0.5em] uppercase mb-8 italic">Archive Uplink</h2>
            
            <div class="space-y-6">
                <div id="drop-zone" class="w-full h-56 border-2 border-dashed border-white/10 rounded-[2.5rem] flex flex-col items-center justify-center transition-all duration-500 cursor-pointer group">
                    <div id="drop-content" class="text-center">
                        <i class="fas fa-cloud-upload-alt text-4xl text-white/10 group-hover:text-primary transition-colors mb-4"></i>
                        <p class="font-mono text-[9px] text-white/40 uppercase tracking-widest">Drag & Drop Image</p>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
                <input type="text" id="img-title" placeholder="Project / Track Name" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl font-mono text-xs outline-none focus:border-primary transition-all">
                <button id="push-btn" onclick="saveImage()" class="w-full bg-primary text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.4em] hover:shadow-[0_0_30px_#ec4899] transition-all active:scale-95">Push to Database</button>
            </div>
        </div>
    </div>

    <header class="py-24 px-6 text-center">
        <h1 class="font-display text-5xl md:text-8xl italic tracking-tighter mb-6">ARCHIVE</h1>
        <p class="font-mono text-[8px] tracking-[1em] text-white/20 uppercase italic">Maximum Security Node</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </main>

    <button onclick="triggerAuth()" class="fixed bottom-10 right-10 w-14 h-14 glass rounded-full flex items-center justify-center text-white/10 hover:text-primary transition-all z-50">
        <i class="fas fa-lock"></i>
    </button>

    <script>
        // --- MAXIMUM SECURITY: TOTAL KEYBOARD LOCKDOWN ---
        document.addEventListener('keydown', (e) => {
            // Kill every single key stroke
            e.preventDefault();
            e.stopPropagation();
            console.warn("KEY_INPUT_DENIED");
            return false;
        }, true);

        // Disable PrintScreen / Snip behavior (partial)
        document.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen') {
                navigator.clipboard.writeText('');
                alert("XCLIPSE SECURITY: Screenshot Attempt Blocked.");
            }
        });

        // Debugger Trap
        setInterval(() => {
            const start = performance.now();
            debugger;
            if (performance.now() - start > 50) { window.location.reload(); }
        }, 100);

        // --- DATABASE & HOVER LOGIC ---
        let droppedImageData = null;
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        function triggerAuth() {
            // Note: Since keyboard is blocked, use the prompt's native window
            const u = prompt("Authorized ID:");
            const p = prompt("Encryption Key:");
            if(u === "admin" && p === "xclipse2026") {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        }

        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
        });

        dropZone.ondrop = (e) => handleFiles(e.dataTransfer.files);

        function handleFiles(files) {
            const file = files[0];
            if (file && file.type.startsWith('image/')) {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = () => {
                    droppedImageData = r.result;
                    document.getElementById('drop-content').innerHTML = `<i class="fas fa-check-circle text-primary text-3xl"></i>`;
                };
            }
        }

        function saveImage() {
            const t = document.getElementById('img-title').value;
            if (!droppedImageData) return;
            galleryRef.push({ url: droppedImageData, title: t || "Secured Archive", timestamp: Date.now() })
            .then(() => { location.reload(); });
        }

        galleryRef.on('value', (s) => {
            const g = document.getElementById('gallery-grid');
            g.innerHTML = '';
            s.forEach((c) => {
                const d = c.val();
                g.insertAdjacentHTML('afterbegin', `
                    <div class="glass group relative overflow-hidden rounded-[2.5rem] aspect-square transition-all duration-700">
                        <img src="${d.url}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 scale-110 group-hover:scale-100 transition-all duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent p-10 flex flex-col justify-end opacity-0 group-hover:opacity-100 transition-all">
                            <span class="text-primary font-display text-[9px] tracking-widest uppercase italic">${d.title}</span>
                        </div>
                    </div>
                `);
            });
        });

        // CUSTOM CURSOR MOTION (The only allowed interaction)
        document.addEventListener('mousemove', (e) => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX + 'px';
            c.style.top = e.clientY + 'px';
        });
    </script>
  </body>
</html>
