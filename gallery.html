<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 Archive Dashboard | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const galleryRef = db.ref('studio_gallery');
      const uiRef = db.ref('ui_settings');

      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', dark: '#050811', spotify: '#1db954', soundcloud: '#ff5500', danger: '#ef4444' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #ec4899; box-shadow: 0 0 10px #ec4899; }
      * { -webkit-user-select: none; user-select: none; -webkit-user-drag: none; outline: none !important; }
      body { background: #050811; color: white; cursor: none; overflow-x: hidden; scroll-behavior: smooth; font-family: 'Montserrat', sans-serif; }
      
      #cursor { width: 8px; height: 8px; background: #ec4899; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999999; mix-blend-mode: difference; }
      .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050811 100%); }
      
      /* Login & Dashboard Glassmorphism */
      .glass-card { 
          background: rgba(255, 255, 255, 0.03); 
          backdrop-filter: blur(40px); 
          border: 1px solid rgba(255, 255, 255, 0.1); 
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      
      .login-input {
          background: transparent;
          border: none;
          border-bottom: 1px solid rgba(255, 255, 255, 0.2);
          width: 100%;
          padding: 12px 0;
          font-size: 14px;
          color: white;
          outline: none;
          transition: border-color 0.3s;
      }
      .login-input:focus { border-bottom-color: #ec4899; }
      .login-input::placeholder { color: rgba(255, 255, 255, 0.3); }

      .btn-gradient {
          background: linear-gradient(90deg, #4c0519 0%, #3b82f6 100%);
          transition: transform 0.2s, opacity 0.2s;
      }
      .btn-gradient:hover { transform: scale(1.02); opacity: 0.9; }

      /* Editable UI elements */
      .editable-container { position: relative; }
      .edit-html-trigger { 
          position: absolute; top: -20px; right: 0; font-size: 8px; 
          background: #ec4899; padding: 2px 8px; border-radius: 4px; cursor: pointer;
      }
    </style>
  </head>
  <body oncontextmenu="return false;">
    
    <div id="cursor"></div>
    <div class="mesh-bg"></div>

    <nav class="fixed top-0 left-0 w-full p-8 flex justify-between items-center z-[60]">
        <div class="font-display text-[10px] tracking-[0.5em] text-white/20 italic">XCLIPSE_SYSTEM</div>
        <button onclick="toggleLoginModal()" id="login-icon" class="w-12 h-12 glass-card rounded-full flex items-center justify-center text-white/40 hover:text-primary transition-all">
            <i class="fas fa-user-circle text-2xl"></i>
        </button>
    </nav>

    <header class="py-40 px-6 text-center">
        <div class="editable-container" data-ui-key="main_header">
            <div id="html-trigger" class="edit-html-trigger hidden">EDIT HTML</div>
            <h1 id="main_header" class="font-display text-4xl md:text-7xl italic tracking-tighter mb-4">ARCHIVE</h1>
        </div>
        <p class="font-mono text-[8px] tracking-[1em] text-white/30 uppercase italic">Network Node Management</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-60">
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
    </main>

    <div id="login-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-md">
        <div class="w-[400px] glass-card rounded-[3rem] p-12 flex flex-col items-center text-center relative">
            <button onclick="toggleLoginModal()" class="absolute top-8 right-8 text-white/20 hover:text-white"><i class="fas fa-times"></i></button>
            
            <div class="w-24 h-24 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mb-12">
                <i class="fas fa-user text-white/10 text-4xl"></i>
            </div>

            <div class="w-full space-y-8 mb-12 text-left">
                <div class="flex items-center gap-4">
                    <i class="fas fa-envelope text-white/30 text-sm"></i>
                    <input type="text" id="admin-id" placeholder="Email ID" class="login-input">
                </div>
                <div class="flex items-center gap-4">
                    <i class="fas fa-lock text-white/30 text-sm"></i>
                    <input type="password" id="admin-key" placeholder="Password" class="login-input">
                </div>
            </div>

            <div class="w-full flex justify-between items-center mb-10 px-1">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="accent-primary rounded bg-transparent border-white/20">
                    <span class="text-[10px] text-white/40 uppercase tracking-widest">Remember me</span>
                </label>
                <a href="#" class="text-[10px] text-white/40 italic hover:text-primary transition-all">Forgot Password?</a>
            </div>

            <button onclick="executeLogin()" class="w-full py-5 rounded-2xl btn-gradient text-white font-display text-[11px] tracking-[0.4em] uppercase italic">Login</button>
        </div>
    </div>

    <div id="dashboard" class="fixed inset-0 z-[110] hidden flex items-center justify-center bg-black/90 backdrop-blur-3xl p-6">
        <div class="w-full max-w-2xl glass-card p-10 rounded-[3rem] border-white/5 relative">
            <button onclick="closeDashboard()" class="absolute top-8 right-8 text-white/10 hover:text-white"><i class="fas fa-times"></i></button>
            <div class="flex gap-6 mb-10 border-b border-white/5 pb-4">
                <button onclick="switchTab('uplink')" class="font-display text-[9px] tracking-widest uppercase italic text-primary">Media Uplink</button>
                <button onclick="switchTab('settings')" class="font-display text-[9px] tracking-widest uppercase italic text-white/20 hover:text-white transition-all">Security Settings</button>
            </div>

            <div id="tab-uplink" class="admin-tab active space-y-5">
                <div id="drop-zone" class="w-full h-32 border-2 border-dashed border-white/10 rounded-[2rem] flex items-center justify-center cursor-pointer hover:border-primary/40">
                    <p class="font-mono text-[8px] text-white/30 uppercase">Paste/Drop Core Data</p>
                </div>
                <input type="text" id="asset-title" placeholder="Project Title" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl font-mono text-xs outline-none focus:border-primary">
                <button onclick="commitToArchive()" class="w-full bg-primary py-5 rounded-xl font-black text-[10px] uppercase tracking-[0.4em]">Apply Changes</button>
            </div>
            
            <div id="tab-settings" class="admin-tab hidden space-y-4">
                <button onclick="nukeArchive()" class="w-full bg-danger text-white py-5 rounded-xl font-black text-[10px] uppercase tracking-[0.4em]">Master Wipe Archive</button>
                <button onclick="logout()" class="w-full bg-white/5 text-white/40 py-4 rounded-xl font-mono text-[8px] uppercase tracking-[0.4em]">End Session</button>
            </div>
        </div>
    </div>

    <script>
        // --- KEY LOGIC ---
        function toggleLoginModal() {
            if (sessionStorage.getItem('xclipse_auth') === 'true') {
                openDashboard();
            } else {
                const modal = document.getElementById('login-modal');
                modal.classList.toggle('hidden');
            }
        }

        function executeLogin() {
            const u = document.getElementById('admin-id').value;
            const k = document.getElementById('admin-key').value;
            
            if(u === "admin" && k === "xclipse2026") {
                sessionStorage.setItem('xclipse_auth', 'true');
                document.getElementById('login-icon').classList.add('text-primary');
                document.getElementById('login-modal').classList.add('hidden');
                location.reload(); // Refresh to show admin triggers
            } else {
                alert("ACCESS DENIED: Credentials Invalid.");
            }
        }

        function openDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.body.style.cursor = 'auto';
        }

        function closeDashboard() {
            document.getElementById('dashboard').classList.add('hidden');
            document.body.style.cursor = 'none';
        }

        function logout() { sessionStorage.removeItem('xclipse_auth'); location.reload(); }

        function switchTab(tabId) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
        }

        // Render Gallery & Cursor (Logic remains the same as previous)
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Initialize admin triggers if logged in
        if (sessionStorage.getItem('xclipse_auth') === 'true') {
            document.getElementById('login-icon').classList.add('text-primary');
            document.querySelectorAll('.edit-html-trigger').forEach(t => t.classList.remove('hidden'));
        }
    </script>
  </body>
</html>
