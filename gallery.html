<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★》 Archive Dashboard | XCLIPSE STUDIO 《★</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const galleryRef = db.ref('studio_gallery');

      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', dark: '#050811', spotify: '#1db954', soundcloud: '#ff5500' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #ec4899; box-shadow: 0 0 10px #ec4899; }
      * { -webkit-user-select: none; user-select: none; -webkit-user-drag: none; outline: none !important; }
      body { background: #050811; color: white; cursor: none; overflow-x: hidden; scroll-behavior: smooth; }
      
      #cursor { width: 8px; height: 8px; background: #ec4899; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999999; mix-blend-mode: difference; }
      .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%); }
      .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
      
      /* Dashboard Animations */
      #dashboard { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
      .edit-pulse { animation: pulse 2s infinite; }
      @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
  </head>
  <body oncontextmenu="return false;">
    
    <div id="cursor"></div>
    <div class="mesh-bg"></div>

    <header class="py-24 px-6 text-center">
        <h1 class="font-display text-4xl md:text-7xl italic tracking-tighter mb-4">ARCHIVE</h1>
        <div class="flex items-center justify-center gap-4">
            <span class="h-[1px] w-12 bg-primary/30"></span>
            <p class="font-mono text-[8px] tracking-[1em] text-white/30 uppercase italic">Command & Control</p>
            <span class="h-[1px] w-12 bg-primary/30"></span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-60">
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
    </main>

    <button onclick="openDashboard()" class="fixed bottom-10 right-10 w-16 h-16 glass rounded-full flex items-center justify-center text-primary border border-primary/20 shadow-[0_0_30px_rgba(236,72,153,0.1)] hover:shadow-[0_0_40px_rgba(236,72,153,0.3)] transition-all z-50">
        <i class="fas fa-sliders-h text-xl"></i>
    </button>

    <div id="dashboard" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/95 backdrop-blur-3xl">
        <div class="w-full max-w-2xl glass p-12 rounded-[3.5rem] border-white/5 relative">
            <button onclick="closeDashboard()" class="absolute top-10 right-10 text-white/20 hover:text-white transition-colors"><i class="fas fa-times"></i></button>
            
            <div class="mb-10">
                <h2 id="dash-mode-text" class="font-display text-primary text-[11px] tracking-[0.5em] uppercase mb-2 italic">New Asset Uplink</h2>
                <p id="dash-sub-text" class="font-mono text-[7px] text-white/20 uppercase tracking-widest">Awaiting visual synchronization</p>
            </div>

            <input type="hidden" id="active-asset-id">
            
            <div class="space-y-6">
                <div id="drop-zone" class="w-full h-44 border-2 border-dashed border-white/10 rounded-[2.5rem] flex flex-col items-center justify-center transition-all group hover:border-primary/40 cursor-pointer">
                    <div id="drop-content" class="text-center">
                        <i class="fas fa-cloud-upload-alt text-2xl text-white/10 group-hover:text-primary mb-3"></i>
                        <p class="font-mono text-[8px] text-white/30 uppercase">Drag Image Core</p>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>

                <div class="space-y-4">
                    <input type="text" id="asset-title" placeholder="Project Name" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl font-mono text-xs outline-none focus:border-primary transition-all">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="relative">
                            <i class="fab fa-spotify absolute left-5 top-1/2 -translate-y-1/2 text-spotify"></i>
                            <input type="text" id="asset-spotify" placeholder="Spotify Link" class="w-full bg-white/5 border border-white/10 p-5 pl-12 rounded-2xl font-mono text-xs outline-none focus:border-spotify/50 transition-all">
                        </div>
                        <div class="relative">
                            <i class="fab fa-soundcloud absolute left-5 top-1/2 -translate-y-1/2 text-soundcloud"></i>
                            <input type="text" id="asset-soundcloud" placeholder="SoundCloud Link" class="w-full bg-white/5 border border-white/10 p-5 pl-12 rounded-2xl font-mono text-xs outline-none focus:border-soundcloud/50 transition-all">
                        </div>
                    </div>
                </div>

                <button onclick="commitToArchive()" id="commit-btn" class="w-full bg-primary text-white py-6 rounded-2xl font-black text-[10px] uppercase tracking-[0.5em] hover:shadow-[0_0_40px_rgba(236,72,153,0.4)] active:scale-[0.98] transition-all">Execute Synchronize</button>
            </div>
        </div>
    </div>

    <script>
        // --- SECURITY: BLOCK KEYBOARD ---
        document.addEventListener('keydown', (e) => { e.preventDefault(); return false; }, true);

        // --- DASHBOARD LOGIC ---
        let base64Image = null;
        let isAdminAuthenticated = false;

        function openDashboard() {
            const u = prompt("Admin ID:");
            const k = prompt("Security Key:");
            if(u === "admin" && k === "xclipse2026") {
                document.getElementById('dashboard').classList.remove('hidden', 'opacity-0');
                document.body.style.cursor = 'auto'; // Restore cursor for admin tasks
                isAdminAuthenticated = true;
            }
        }

        function closeDashboard() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('active-asset-id').value = "";
            document.getElementById('dash-mode-text').innerText = "New Asset Uplink";
            document.getElementById('commit-btn').innerText = "Execute Synchronize";
            document.getElementById('asset-title').value = "";
            document.getElementById('asset-spotify').value = "";
            document.getElementById('asset-soundcloud').value = "";
            document.getElementById('drop-content').innerHTML = `<i class="fas fa-cloud-upload-alt text-2xl text-white/10 group-hover:text-primary mb-3"></i><p class="font-mono text-[8px] text-white/30 uppercase">Drag Image Core</p>`;
            base64Image = null;
            document.body.style.cursor = 'none';
        }

        // --- EDIT MODE TRIGGER ---
        function initiateEdit(key, title, spot, sound) {
            document.getElementById('active-asset-id').value = key;
            document.getElementById('asset-title').value = title;
            document.getElementById('asset-spotify').value = spot !== "null" ? spot : "";
            document.getElementById('asset-soundcloud').value = sound !== "null" ? sound : "";
            
            document.getElementById('dash-mode-text').innerText = "Edit Protocol Active";
            document.getElementById('dash-sub-text').innerText = "Targeting Asset: " + key;
            document.getElementById('commit-btn').innerText = "Push Modifications";
            
            document.getElementById('dashboard').classList.remove('hidden');
            document.body.style.cursor = 'auto';
        }

        // --- FILE HANDLING ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => processFile(e.target.files[0]);
        ['dragover', 'drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }));
        dropZone.ondrop = (e) => processFile(e.dataTransfer.files[0]);

        function processFile(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    base64Image = reader.result;
                    document.getElementById('drop-content').innerHTML = `<i class="fas fa-fingerprint text-primary text-3xl mb-2"></i><p class="text-primary text-[8px] font-mono">IMAGE DATA READY</p>`;
                };
            }
        }

        // --- FIREBASE SYNC ---
        function commitToArchive() {
            const assetKey = document.getElementById('active-asset-id').value;
            const data = {
                title: document.getElementById('asset-title').value || "Studio Session",
                spotify: document.getElementById('asset-spotify').value || null,
                soundcloud: document.getElementById('asset-soundcloud').value || null,
                updated: Date.now()
            };

            if (assetKey) {
                // UPDATE RECORD
                if (base64Image) data.url = base64Image;
                galleryRef.child(assetKey).update(data).then(() => location.reload());
            } else {
                // CREATE RECORD
                if (!base64Image) return alert("Visual Data Required for Uplink");
                data.url = base64Image;
                galleryRef.push(data).then(() => location.reload());
            }
        }

        // --- LIVE GALLERY RENDER ---
        galleryRef.on('value', (snapshot) => {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const item = child.val();
                const key = child.key;

                const spotIcon = item.spotify ? `<a href="${item.spotify}" target="_blank" class="w-10 h-10 glass rounded-full flex items-center justify-center text-spotify hover:bg-spotify hover:text-white transition-all"><i class="fab fa-spotify"></i></a>` : '';
                const soundIcon = item.soundcloud ? `<a href="${item.soundcloud}" target="_blank" class="w-10 h-10 glass rounded-full flex items-center justify-center text-soundcloud hover:bg-soundcloud hover:text-white transition-all"><i class="fab fa-soundcloud"></i></a>` : '';
                
                grid.insertAdjacentHTML('afterbegin', `
                    <div class="glass relative overflow-hidden rounded-[3rem] aspect-[4/5] group transition-all duration-700 hover:-translate-y-2">
                        <img src="${item.url}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000 scale-105 group-hover:scale-100">
                        
                        <button onclick="initiateEdit('${key}', '${item.title}', '${item.spotify}', '${item.soundcloud}')" class="absolute top-8 left-8 w-8 h-8 glass rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center text-[10px] text-white/20 hover:text-primary transition-all">
                            <i class="fas fa-pen-nib"></i>
                        </button>

                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 p-10 flex flex-col justify-end">
                            <h3 class="font-display text-primary text-[10px] tracking-widest uppercase italic mb-1">${item.title}</h3>
                            <p class="font-mono text-[7px] text-white/30 uppercase tracking-[0.3em] mb-6">Archive Node ${key.substring(0,6)}</p>
                            <div class="flex gap-3">
                                ${spotIcon}
                                ${soundIcon}
                            </div>
                        </div>
                    </div>
                `);
            });
        });

        // --- CURSOR MOTION ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
  </body>
</html>
