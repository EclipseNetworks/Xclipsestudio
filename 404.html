<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINATED | XCLIPSE SECURITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --error-red: #ff4444;
            --deep-black: #010206;
        }

        body { 
            background-color: var(--deep-black); 
            color: white; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        /* Glitch Animation */
        .glitch {
            font-size: 5rem;
            font-weight: 900;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), -0.025em 0.05em 0 rgba(0,0,255,.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), -0.025em 0.05em 0 rgba(0,0,255,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75), -0.05em -0.05em 0 rgba(0,0,255,.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75), -0.05em -0.05em 0 rgba(0,0,255,.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,0,.75), 0 -0.05em 0 rgba(0,0,255,.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,0,.75), 0 -0.05em 0 rgba(0,0,255,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75), -0.025em -0.025em 0 rgba(0,255,0,.75), -0.025em -0.05em 0 rgba(0,0,255,.75); }
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            80% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .terminal-box {
            border: 1px solid rgba(255, 68, 68, 0.2);
            padding: 2rem;
            background: rgba(255, 0, 0, 0.02);
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--error-red);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--error-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="terminal-box text-center">
        <div class="mb-8">
            <h2 class="glitch tracking-tighter italic uppercase">404</h2>
            <p class="text-[10px] tracking-[0.8em] text-red-500 font-bold mt-2 uppercase">System_Seized</p>
        </div>

        <div class="space-y-4 text-left border-t border-red-500/20 pt-6">
            <div class="flex items-center">
                <div class="status-dot"></div>
                <p class="text-[9px] uppercase tracking-widest text-red-400">Security protocol v4.6 active</p>
            </div>
            
            <p class="text-[11px] text-white/40 leading-relaxed uppercase">
                Access to this node has been restricted by XCLIPSE C2. Your connection metadata has been logged and blacklisted.
            </p>

            <div class="bg-red-500/10 p-4 mt-6">
                <p class="text-[8px] text-red-500/60 font-bold mb-1 uppercase tracking-widest">Client Metadata</p>
                <p id="timestamp" class="text-[9px] text-red-400 font-mono italic mb-1"></p>
                <p class="text-[9px] text-red-400 font-mono italic uppercase">STATUS: EXCOMMUNICATED</p>
            </div>
        </div>

        <div class="mt-8 flex justify-center gap-8">
            <div class="text-center">
                <p class="text-[7px] text-white/20 uppercase tracking-[0.3em]">Xclipse Networks</p>
            </div>
        </div>
    </div>

    <script>
        // Set live timestamp
        function updateTime() {
            const now = new Date();
            document.getElementById('timestamp').innerText = `UPLINK_TERM: ${now.toUTCString()}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Visual noise effect
        document.body.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.terminal-box').style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
        });
    </script>
</body>
</html>
