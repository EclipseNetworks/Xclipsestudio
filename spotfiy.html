<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XCLIPSE | NEURAL_DISPLAY</title>
    <meta name="author" content="TheKidLeeroy.M">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a855f7; --bg: #010101; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; margin: 0; }
        
        #blur-bg { position: fixed; inset: -10%; background-size: cover; background-position: center; filter: blur(100px) brightness(0.15); z-index: 0; transition: background-image 2s ease; }
        
        /* GITHUB SYNC INDICATOR */
        .sync-pulse {
            position: fixed; top: 40px; left: 40px;
            display: flex; align-items: center; gap: 10px;
            font-size: 8px; letter-spacing: 0.3em; opacity: 0.4;
        }
        .pulse-dot { width: 6px; height: 6px; background: #0f0; border-radius: 50%; animation: pulse-blink 2s infinite; }
        @keyframes pulse-blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; box-shadow: 0 0 10px #0f0; } }

        /* CONTENT LAYOUT */
        .hero { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #main-art { width: 300px; height: 300px; object-fit: cover; box-shadow: 0 0 100px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 40px; }
        
        #track-title { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 5vw, 3rem); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1.1; letter-spacing: -0.02em; background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #artist-name { font-size: 10px; letter-spacing: 0.8em; opacity: 0.4; margin-top: 15px; font-weight: 400; text-transform: uppercase; }

        /* CREATED BY THEKIDLEEROY.M (POPPING) */
        .signature {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            font-size: 14px; font-weight: 800; letter-spacing: 1.2em;
            text-transform: uppercase; color: #fff;
            text-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
            z-index: 100; animation: sig-glow 4s infinite ease-in-out;
            white-space: nowrap; pointer-events: none;
        }
        @keyframes sig-glow {
            0%, 100% { opacity: 0.5; filter: brightness(1); transform: translateX(-50%) scale(1); }
            50% { opacity: 1; filter: brightness(1.6); transform: translateX(-50%) scale(1.05); }
        }

        .progress-rail { position: fixed; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.03); }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 1.2s linear; }
        
        .glitch-overlay { position: fixed; inset: 0; background: #fff; z-index: 1000; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="blur-bg"></div>
    <div class="glitch-overlay" id="glitch"></div>

    <div class="sync-pulse">
        <div class="pulse-dot"></div>
        GIT_SYNC: ACTIVE
    </div>

    <main class="hero">
        <div id="player-content">
            <img id="main-art" src="" alt="">
            <div id="track-title">SCANNING_SIGNAL</div>
            <div id="artist-name">Uplink_Idle</div>
        </div>
    </main>

    <div class="signature">
        CREATED BY <span style="color: var(--primary); margin-left: 10px;">THEKIDLEEROY.M</span>
    </div>

    <div class="progress-rail"><div id="progress-fill"></div></div>

    <script src="spotify.js"></script>
    <script>
        // CONFIG FOR GITHUB AUTO-REFRESH
        const GITHUB_REPO = 'TheKidLeeroy/Xclipse-OS'; // CHANGE THIS TO YOUR REPO
        let lastCommitHash = null;

        async function checkGitHubUpdates() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/commits/main`);
                const data = await res.json();
                if (lastCommitHash && lastCommitHash !== data.sha) {
                    console.log("UPDATE_PUSHED: Refreshing OS...");
                    document.getElementById('glitch').style.opacity = '1';
                    setTimeout(() => window.location.reload(), 800);
                }
                lastCommitHash = data.sha;
            } catch (e) { console.error("GIT_ERR", e); }
        }

        window.onload = () => {
            // Check GitHub every 60 seconds
            checkGitHubUpdates();
            setInterval(checkGitHubUpdates, 60000);

            // Spotify Sync
            const syncUI = () => {
                Spotify.sync((data) => {
                    document.getElementById('track-title').innerText = data.item.name;
                    document.getElementById('artist-name').innerText = data.item.artists[0].name;
                    document.getElementById('main-art').src = data.item.album.images[0].url;
                    document.getElementById('blur-bg').style.backgroundImage = `url(${data.item.album.images[0].url})`;
                    document.getElementById('progress-fill').style.width = (data.progress_ms / data.item.duration_ms) * 100 + "%";
                });
            };

            if(localStorage.getItem('sp_access_token')) {
                syncUI();
                setInterval(syncUI, 3000);
            } else { Spotify.auth(); }
        };
    </script>
</body>
</html>
