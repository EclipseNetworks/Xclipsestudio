<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>XCLIPSE | NEURAL_DISPLAY</title>
    <meta name="author" content="TheKidLeeroy.M">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a855f7; --bg: #010101; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; margin: 0; }
        #blur-bg { position: fixed; inset: -10%; background-size: cover; background-position: center; filter: blur(100px) brightness(0.2); z-index: 0; transition: background-image 2s ease; }
        
        /* --- REACTIVE BUTTON ANIMATION --- */
        .system-nav { position: fixed; top: 40px; right: 40px; z-index: 200; display: flex; gap: 15px; opacity: 0; transition: 0.5s; }
        body:hover .system-nav { opacity: 1; }

        .relink-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: inset 0 0 0 rgba(168, 85, 247, 0);
        }
        .relink-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 0 30px var(--primary);
            transform: skewX(-10deg);
        }

        #main-art { width: 400px; height: 400px; object-fit: cover; box-shadow: 0 0 100px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); animation: breathe 8s infinite ease-in-out; margin-bottom: 40px; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        #track-title { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 10vw, 7rem); font-weight: 900; font-style: italic; text-transform: uppercase; text-align: center; line-height: 0.8; }
        .signature { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 0.8em; opacity: 0.2; }
        .progress-rail { position: fixed; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.05); }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 1.2s linear; }
    </style>
</head>
<body>
    <div id="blur-bg"></div>
    <div class="system-nav">
        <a href="hmm.html" class="relink-btn" style="border-color: white; color: white;">RETURN_TO_OS</a>
        <button onclick="Spotify.relink()" class="relink-btn">RELINK_ACCOUNT</button>
    </div>

    <main class="hero flex flex-col items-center justify-center h-screen relative z-10">
        <div id="player-content" class="flex flex-col items-center">
            <img id="main-art" src="" alt="">
            <div id="track-title">SIGNAL_LOST</div>
            <div id="artist-name" class="text-xs tracking-[0.5em] opacity-40 mt-6 uppercase font-bold">Scanning...</div>
        </div>
    </main>

    <div class="signature">Created by TheKidLeeroy.M</div>
    <div class="progress-rail"><div id="progress-fill"></div></div>

    <script src="spotify.js"></script>
    <script>
        window.onload = () => {
            if(localStorage.getItem('sp_access_token')) {
                setInterval(() => {
                    Spotify.sync((data) => {
                        document.getElementById('track-title').innerText = data.item.name;
                        document.getElementById('artist-name').innerText = data.item.artists[0].name;
                        document.getElementById('main-art').src = data.item.album.images[0].url;
                        document.getElementById('blur-bg').style.backgroundImage = `url(${data.item.album.images[0].url})`;
                        document.getElementById('progress-fill').style.width = (data.progress_ms / data.item.duration_ms) * 100 + "%";
                    });
                }, 3000);
            } else { Spotify.auth(); }
        };
    </script>
</body>
</html>
