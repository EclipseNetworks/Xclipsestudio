<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | NEURAL_DISPLAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --spotify: #1DB954;
            --bg-dark: #010101;
        }

        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            overflow: hidden; 
            margin: 0;
        }

        /* --- FULLSCREEN BACKGROUND ART --- */
        #blur-bg {
            position: fixed;
            inset: -50px;
            background-size: cover;
            background-position: center;
            filter: blur(80px) brightness(0.4);
            z-index: 0;
            transition: background-image 1.5s ease-in-out;
            transform: scale(1.1);
        }

        /* --- VIGNETTE & GRAIN --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- CENTER CONTENT --- */
        .hero-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        #main-art {
            width: 350px;
            height: 350px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        #track-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 900;
            font-style: italic;
            line-height: 0.9;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #artist-name {
            font-size: 1.2rem;
            letter-spacing: 0.5em;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
            opacity: 0.8;
        }

        /* --- PROGRESS BAR --- */
        .progress-rail {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            z-index: 20;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 1s linear;
            box-shadow: 0 0 20px var(--primary);
        }

        /* --- UI OVERLAYS --- */
        .system-info {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 10px;
            letter-spacing: 0.3em;
            opacity: 0.4;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="blur-bg"></div>
    <div class="overlay"></div>

    <div class="system-info">ARCHITECT_OS // MEDIA_IMMERSION_MODE</div>

    <main class="hero-container">
        <img id="main-art" src="" alt="">
        <div id="track-title">STATION_IDLE</div>
        <div id="artist-name">Awaiting Uplink</div>
    </main>

    <div class="progress-rail">
        <div id="progress-fill"></div>
    </div>

    <script src="spotify.js"></script>
    <script>
        // Automatic Relogin & Sync Logic
        window.onload = () => {
            const token = localStorage.getItem('sp_access_token');
            const expiry = localStorage.getItem('sp_expiry');

            if (token && expiry && Date.now() < expiry) {
                console.log("UPLINK_RESTORED");
                Spotify.token = token;
                
                // Override the sync function to match this specific UI's IDs
                const originalSync = Spotify.sync;
                Spotify.sync = async function() {
                    await originalSync.call(this);
                    // Map the generic spotify.js logic to our specific IDs if they differ
                    const fill = document.getElementById('progress-fill');
                    if (fill) fill.style.width = this.progress + "%";
                };

                Spotify.sync();
                setInterval(() => Spotify.sync(), 5000);
            } else {
                // If no token, redirect to login or show auth button
                document.getElementById('track-title').innerText = "AUTH_REQUIRED";
                document.getElementById('artist-name').innerHTML = '<button onclick="location.href=\'callback.html\'" style="cursor:pointer; text-decoration:underline;">INITIATE_HANDSHAKE</button>';
            }
        };
    </script>
</body>
</html>
