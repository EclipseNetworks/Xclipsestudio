<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT_OS // ULTIMATE_EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono:wght@100;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --bg-deep: #020203;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-main: #f4f4f5;
            --text-dim: rgba(161, 161, 170, 0.4);
            --panel-width: 450px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        #core-canvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
            opacity: 0.4;
        }

        .architect-grid {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 100px 100px;
            z-index: 1; pointer-events: none;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        }

        #custom-cursor {
            position: fixed; width: 40px; height: 40px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease-out, border-color 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        #custom-cursor::after { content: ''; width: 4px; height: 4px; background: white; border-radius: 50%; }

        .clock-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; pointer-events: none;
        }

        .main-time {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(8rem, 20vw, 25rem);
            font-weight: 900; font-style: italic;
            line-height: 0.75; letter-spacing: -0.05em;
            color: white; opacity: 0.9;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 0 40px var(--accent-glow));
        }

        .chrono-unit {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px; font-weight: 700;
            letter-spacing: 1em; color: var(--accent);
            margin-top: 40px; opacity: 0.6;
            text-transform: uppercase;
        }

        .side-panel {
            position: fixed; top: 0; right: calc(var(--panel-width) * -1);
            width: var(--panel-width); height: 100%;
            background: var(--glass);
            backdrop-filter: blur(60px) saturate(180%);
            border-left: 1px solid var(--glass-border);
            z-index: 1000;
            transition: right 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 60px 50px;
            display: flex; flex-direction: column;
        }

        .side-panel.active { right: 0; }

        .panel-header {
            font-size: 10px; font-weight: 900; letter-spacing: 0.6em;
            text-transform: uppercase; color: var(--text-dim);
            margin-bottom: 60px; display: flex; align-items: center; gap: 20px;
        }
        .panel-header::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

        .control-group { margin-bottom: 40px; }
        .control-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-main);
            display: block; margin-bottom: 20px;
        }

        .toggle-btn {
            width: 100%; padding: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim); font-size: 10px; font-weight: 800;
            text-align: left; letter-spacing: 0.2em;
            transition: 0.3s; margin-bottom: 10px;
        }
        .toggle-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
        .toggle-btn:hover { background: rgba(255,255,255,0.08); color: white; }

        #media-terminal {
            position: fixed; bottom: 50px; left: 50px;
            width: 400px; z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .track-info { display: flex; align-items: center; gap: 20px; }
        .album-art-stub {
            width: 50px; height: 50px; background: var(--glass-border);
            border: 1px solid var(--glass-border); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .progress-rail {
            width: 100%; height: 2px; background: var(--glass-border);
            position: relative; overflow: hidden;
        }
        .progress-bar {
            position: absolute; left: 0; top: 0; height: 100%;
            background: var(--accent); width: 0%;
            transition: width 0.5s linear;
        }

        @keyframes pulse-accent { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .pulse { animation: pulse-accent 2s infinite; }

        #system-log {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; color: var(--text-dim);
            height: 100px; overflow-y: hidden;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px; margin-top: auto;
        }
    </style>
</head>
<body>

    <canvas id="core-canvas"></canvas>
    <div class="architect-grid"></div>
    <div id="custom-cursor"></div>

    <header class="fixed top-0 w-full p-12 flex justify-between items-center z-[500]">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <span class="text-[11px] font-black tracking-[0.6em] uppercase">Architect.OS</span>
                <span class="text-[8px] font-mono text-indigo-500/60 mt-1">UPLINK_STABLE // 2.0.45</span>
            </div>
        </div>
        <div class="flex gap-4">
            <button class="text-[9px] font-bold tracking-[0.3em] uppercase opacity-40 hover:opacity-100 transition" onclick="UI.togglePanel('settings')">01_CONFIG</button>
            <button class="text-[9px] font-bold tracking-[0.3em] uppercase opacity-40 hover:opacity-100 transition" onclick="UI.togglePanel('environment')">02_ENV</button>
        </div>
    </header>

    <aside id="panel-settings" class="side-panel">
        <div class="close-btn p-4 absolute top-10 right-10" onclick="UI.closeAll()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></div>
        <div class="panel-header">System_Settings</div>
        <div class="control-group">
            <label class="control-label">Time Format</label>
            <button id="btn-24h" class="toggle-btn active" onclick="Core.setClockMode(24)">24_HOUR_ISO</button>
            <button id="btn-12h" class="toggle-btn" onclick="Core.setClockMode(12)">12_HOUR_STANDARD</button>
        </div>
        <div class="control-group">
            <label class="control-label">Media Uplink</label>
            <button class="toggle-btn !text-indigo-400 !border-indigo-500/30" onclick="Spotify.connect()">INITIALIZE_SPOTIFY_LINK</button>
        </div>
        <div id="system-log"><div class="opacity-40">> SYSTEM_READY...</div></div>
    </aside>

    <aside id="panel-environment" class="side-panel">
        <div class="close-btn p-4 absolute top-10 right-10" onclick="UI.closeAll()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></div>
        <div class="panel-header">Atmosphere_Control</div>
        <div class="control-group">
            <label class="control-label">Accent Profile</label>
            <div class="grid grid-cols-2 gap-2">
                <button class="toggle-btn" onclick="UI.setAccent('#6366f1')">INDIGO</button>
                <button class="toggle-btn" onclick="UI.setAccent('#10b981')">EMERALD</button>
                <button class="toggle-btn" onclick="UI.setAccent('#f43f5e')">ROSE</button>
                <button class="toggle-btn" onclick="UI.setAccent('#f59e0b')">AMBER</button>
            </div>
        </div>
    </aside>

    <main class="clock-container">
        <div class="main-time" id="clock-face">00:00</div>
        <div class="chrono-unit"><span class="pulse">●</span> <span id="clock-seconds">00</span> <span id="clock-date" class="ml-10 opacity-30 text-white font-thin">APR_11_2026</span></div>
    </main>

    <section id="media-terminal">
        <div class="track-info">
            <div class="album-art-stub" id="sp-art">
                <svg width="20" height="20" fill="currentColor" class="opacity-20" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </div>
            <div class="flex flex-col min-w-0">
                <span id="sp-title" class="text-[11px] font-black uppercase tracking-widest truncate">Awaiting_Signal</span>
                <span id="sp-artist" class="text-[9px] font-mono opacity-30 uppercase mt-1">Status: Standby</span>
            </div>
        </div>
        <div class="progress-rail"><div id="media-progress" class="progress-bar"></div></div>
    </section>

    <script>
        const Core = {
            mode: 24,
            init() {
                this.startClock();
                this.initCanvas();
                this.initCursor();
                window.addEventListener('resize', () => this.initCanvas());
            },
            startClock() {
                const update = () => {
                    const now = new Date();
                    let h = now.getHours();
                    if(this.mode === 12) h = h % 12 || 12;
                    document.getElementById('clock-face').innerText = `${String(h).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                    document.getElementById('clock-seconds').innerText = `${String(now.getSeconds()).padStart(2, '0')}`;
                    document.getElementById('clock-date').innerText = now.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' }).toUpperCase().replace(/ /g, '_');
                    requestAnimationFrame(update);
                };
                update();
            },
            setClockMode(m) {
                this.mode = m;
                document.querySelectorAll('#panel-settings .toggle-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`btn-${m}h`).classList.add('active');
            },
            initCanvas() {
                const c = document.getElementById('core-canvas'), ctx = c.getContext('2d');
                c.width = window.innerWidth; c.height = window.innerHeight;
                const p = Array.from({ length: 40 }, () => ({ x: Math.random()*c.width, y: Math.random()*c.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3 }));
                const draw = () => {
                    ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    p.forEach(i => { i.x+=i.vx; i.y+=i.vy; if(i.x<0||i.x>c.width) i.vx*=-1; if(i.y<0||i.y>c.height) i.vy*=-1; ctx.beginPath(); ctx.arc(i.x,i.y,1,0,Math.PI*2); ctx.fill(); });
                    requestAnimationFrame(draw);
                };
                draw();
            },
            initCursor() {
                const cursor = document.getElementById('custom-cursor');
                document.addEventListener('mousemove', (e) => {
                    cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
                    const moveX = (e.clientX - window.innerWidth / 2) / 30, moveY = (e.clientY - window.innerHeight / 2) / 30;
                    document.getElementById('clock-face').style.transform = `translate3d(${moveX}px, ${moveY}px, 0) rotateX(${-moveY/2}deg) rotateY(${moveX/2}deg)`;
                });
            }
        };

        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8', 
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/shh.html',
            scopes: 'user-read-currently-playing user-read-playback-state',

            connect() {
                UI.log("INIT_AUTH_CODE_FLOW...");
                const url = `https://accounts.spotify.com/authorize?client_id=${this.clientId}&response_type=code&redirect_uri=${encodeURIComponent(this.redirectUri)}&scope=${encodeURIComponent(this.scopes)}`;
                window.location.href = url;
            },

            handleCallback() {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');

                if (code) {
                    UI.log("AUTH_CODE_RECEIVED");
                    UI.log(`CODE: ${code.substring(0, 12)}...`);
                    // Exchange logic would happen here with a backend
                    history.pushState("", document.title, window.location.pathname);
                }
            }
        };

        const UI = {
            activePanel: null,
            togglePanel(id) {
                if (this.activePanel === id) this.closeAll();
                else { this.closeAll(); document.getElementById(`panel-${id}`).classList.add('active'); this.activePanel = id; }
            },
            closeAll() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); this.activePanel = null; },
            setAccent(c) { document.documentElement.style.setProperty('--accent', c); },
            log(m) { const l = document.getElementById('system-log'), e = document.createElement('div'); e.innerText = `> ${m}`; l.prepend(e); }
        };

        window.onload = () => { Core.init(); Spotify.handleCallback(); };
    </script>
</body>
</html>
