<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.4);
            --spotify: #1DB954;
            --bg-dark: #050505;
            --panel-bg: rgba(10, 10, 10, 0.85);
            --border-ui: rgba(255, 255, 255, 0.05);
            --terminal-green: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- KINETIC BACKGROUND --- */
        #entropy-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.3; pointer-events: none; filter: blur(1px); }
        .os-grid { 
            position: fixed; inset: 0; z-index: 1; 
            background-image: 
                linear-gradient(var(--border-ui) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-ui) 1px, transparent 1px);
            background-size: 50px 50px; 
            pointer-events: none;
            mask-image: radial-gradient(circle at center, black 20%, transparent 80%);
        }

        /* --- REACTIVE CLOCK --- */
        .clock-wrap {
            transition: transform 0.1s ease-out;
            perspective: 1000px;
        }
        #main-time { 
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(10rem, 25vw, 32rem); 
            font-weight: 900; font-style: italic; 
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.1);
            line-height: 0.8;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #main-time:hover {
            color: white;
            -webkit-text-stroke: 0px transparent;
            filter: drop-shadow(0 0 50px var(--primary-glow));
        }
        #sec-hex { font-family: 'JetBrains Mono'; font-size: 6rem; color: var(--primary); opacity: 0.6; }

        /* --- SIDE PANEL (MODERNIZED) --- */
        .side-panel {
            position: fixed; top: 0; right: -500px;
            width: 500px; height: 100%;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-ui);
            backdrop-filter: blur(50px) saturate(150%);
            z-index: 1000;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 80px 50px;
        }
        .side-panel.active { right: 0; box-shadow: -50px 0 100px rgba(0,0,0,0.5); }

        .os-btn { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border-ui); 
            padding: 16px; font-size: 10px; 
            text-transform: uppercase; font-weight: 800; 
            transition: 0.4s; letter-spacing: 0.2em;
            color: rgba(255,255,255,0.5);
        }
        .os-btn:hover { background: #fff; color: #000; transform: translateY(-2px); }
        .os-btn.active { border-color: var(--primary); color: var(--primary); }

        /* --- SPOTIFY NODE --- */
        #spotify-node {
            position: fixed; bottom: 60px; left: 60px;
            z-index: 100; transition: 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-ui);
            padding: 24px;
            backdrop-filter: blur(20px);
            border-radius: 2px;
            display: flex; align-items: center; gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .album-art { width: 60px; height: 60px; border-radius: 2px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .track-bar-bg { height: 2px; width: 100%; background: rgba(255,255,255,0.05); margin-top: 12px; }
        .track-bar-fill { height: 100%; background: var(--spotify); transition: width 1s linear; box-shadow: 0 0 10px var(--spotify); }

        .log-stream { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--terminal-green); height: 200px; overflow-y: auto; opacity: 0.5; }
    </style>
</head>
<body>

    <canvas id="entropy-canvas"></canvas>
    <div class="os-grid"></div>

    <header class="fixed top-12 left-12 right-12 flex justify-between items-start z-[100]">
        <div class="flex flex-col">
            <div class="text-[10px] font-black tracking-[0.8em] text-purple-500 uppercase">Architect.OS // Pro</div>
            <div id="auth-status" class="text-[8px] opacity-30 mt-2 font-mono uppercase tracking-[0.4em]">Signal: Interrupted</div>
        </div>
        <button class="os-btn px-12" onclick="OS.togglePanel()">Menu</button>
    </header>

    <aside id="osPanel" class="side-panel">
        <div class="flex justify-between items-center mb-16">
            <span class="text-[10px] font-black tracking-[0.5em] opacity-20">SYSTEM_MODULES</span>
            <button onclick="OS.togglePanel()" class="text-[10px] hover:text-purple-500 transition">CLOSE_X</button>
        </div>

        <div class="space-y-12">
            <section>
                <label class="text-[9px] opacity-30 uppercase tracking-[0.4em] mb-6 block">Time_Protocol</label>
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn12" class="os-btn active" onclick="Clock.setMode(12)">12_Hour</button>
                    <button id="btn24" class="os-btn" onclick="Clock.setMode(24)">24_Hour</button>
                </div>
            </section>

            <section>
                <label class="text-[9px] opacity-30 uppercase tracking-[0.4em] mb-6 block">Media_Gate</label>
                <div class="bg-white/[0.02] border border-white/5 p-6 mb-4">
                    <div id="mirror-track" class="text-xs font-bold uppercase tracking-widest truncate">Idle_Stream</div>
                    <div id="mirror-artist" class="text-[9px] text-purple-400 mt-1 uppercase">Awaiting Link...</div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button class="os-btn !p-3" onclick="Spotify.command('previous')">«</button>
                    <button class="os-btn !p-3" onclick="Spotify.command('play')">⏵</button>
                    <button class="os-btn !p-3" onclick="Spotify.command('next')">»</button>
                </div>
            </section>

            <section>
                <label class="text-[9px] opacity-30 uppercase tracking-[0.4em] mb-6 block">Kernel_Logs</label>
                <div class="log-stream" id="sys-log"></div>
            </section>
        </div>
    </aside>

    <main class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
        <div class="clock-wrap flex items-baseline gap-10" id="reactive-clock">
            <div id="main-time">00:00</div>
            <div id="sec-hex">00</div>
        </div>
    </main>

    <div id="spotify-node"></div>

    <script>
        const OS = {
            togglePanel: () => document.getElementById('osPanel').classList.toggle('active'),
            log: (tag, msg) => {
                const log = document.getElementById('sys-log');
                const e = document.createElement('div');
                e.className = "mb-1";
                e.innerHTML = `<span class="opacity-20">${new Date().toLocaleTimeString()}</span> [${tag}] ${msg}`;
                log.prepend(e);
            }
        };

        const Clock = {
            mode: 12,
            setMode: (m) => {
                Clock.mode = m;
                document.getElementById('btn12').classList.toggle('active', m === 12);
                document.getElementById('btn24').classList.toggle('active', m === 24);
            },
            tick: () => {
                const now = new Date(); let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                if(Clock.mode === 12) h = h % 12 || 12;
                document.getElementById('main-time').innerText = `${String(h).padStart(2, '0')}:${m}`;
                document.getElementById('sec-hex').innerText = s;
            }
        };

        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/shh.html',

            updateUI: (isConnected, data = null) => {
                const node = document.getElementById('spotify-node');
                const status = document.getElementById('auth-status');
                
                if (!isConnected) {
                    node.innerHTML = `<button class="os-btn !text-green-500 !border-green-500/20" onclick="Spotify.auth()">Secure_Link</button>`;
                    status.innerText = "Signal: Interrupted";
                    return;
                }

                if (data && data.item) {
                    const progress = (data.progress_ms / data.item.duration_ms) * 100 + "%";
                    node.innerHTML = `
                        <div class="glass-card">
                            <img class="album-art" src="${data.item.album.images[0].url}">
                            <div class="flex flex-col">
                                <div class="text-[11px] font-black uppercase tracking-widest w-48 truncate">${data.item.name}</div>
                                <div class="text-[8px] text-purple-500 font-bold uppercase mt-1">${data.item.artists[0].name}</div>
                                <div class="track-bar-bg"><div class="track-bar-fill" style="width: ${progress}"></div></div>
                            </div>
                        </div>`;
                    document.getElementById('mirror-track').innerText = data.item.name;
                    document.getElementById('mirror-artist').innerText = data.item.artists[0].name;
                    status.innerText = "Signal: Secure // Streaming";
                }
            },

            auth: async () => {
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(hashed))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                
                localStorage.setItem('code_verifier', verifier);
                const params = new URLSearchParams({ 
                    response_type: 'code', client_id: Spotify.clientId, 
                    scope: 'user-read-currently-playing user-modify-playback-state user-read-playback-state', 
                    redirect_uri: Spotify.redirectUri, 
                    code_challenge_method: 'S256', code_challenge: challenge 
                });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            },

            getToken: async (code) => {
                const verifier = localStorage.getItem('code_verifier');
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code', code, 
                        redirect_uri: Spotify.redirectUri, 
                        client_id: Spotify.clientId, code_verifier: verifier
                    })
                });
                const data = await response.json();
                if(data.access_token) {
                    localStorage.setItem('sp_access_token', data.access_token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    Spotify.sync();
                }
            },

            sync: async () => {
                const token = localStorage.getItem('sp_access_token');
                if(!token) return Spotify.updateUI(false);
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', { 
                        headers: { 'Authorization': `Bearer ${token}` } 
                    });
                    if(res.status === 200) Spotify.updateUI(true, await res.json());
                    else if(res.status === 401) Spotify.updateUI(false);
                } catch(e) { console.warn("Ghosted"); }
            },

            command: async (type) => {
                const token = localStorage.getItem('sp_access_token');
                const endpoint = type === 'play' ? 'play' : (type === 'pause' ? 'pause' : type);
                await fetch(`https://api.spotify.com/v1/me/player/${endpoint}`, { 
                    method: (type === 'next' || type === 'previous') ? 'POST' : 'PUT', 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                setTimeout(Spotify.sync, 500);
            }
        };

        /* --- MOUSE PARALLAX ENGINE --- */
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            document.getElementById('reactive-clock').style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        const Canvas = {
            init: () => {
                const c = document.getElementById('entropy-canvas'), ctx = c.getContext('2d');
                c.width = window.innerWidth; c.height = window.innerHeight;
                const p = Array.from({length: 50}, () => ({
                    x: Math.random()*c.width, y: Math.random()*c.height, 
                    v: Math.random()*0.5, s: Math.random()*2
                }));
                const draw = () => {
                    ctx.clearRect(0,0,c.width,c.height);
                    ctx.fillStyle = "#a855f7";
                    p.forEach(i => {
                        i.y -= i.v; if(i.y < 0) i.y = c.height;
                        ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill();
                    });
                    requestAnimationFrame(draw);
                };
                draw();
            }
        };

        window.onload = () => {
            Canvas.init();
            setInterval(Clock.tick, 1000);
            setInterval(Spotify.sync, 4000);
            const code = new URLSearchParams(window.location.search).get('code');
            if(code) Spotify.getToken(code); else Spotify.sync();
        };
    </script>
</body>
</html>
