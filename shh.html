<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_v84.0_ULTRA_MANIFEST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;900&family=Inter:wght@100;400;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- KERNEL CSS DESIGN SYSTEM --- */
        :root {
            --primary: #ffffff;
            --primary-glow: rgba(255, 255, 255, 0.5);
            --spotify: #1DB954;
            --bg-black: #000000;
            --panel-bg: rgba(4, 4, 4, 0.98);
            --border-ui: rgba(255, 255, 255, 0.07);
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
            --transition-speed: 0.9s;
            --ease-logic: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; user-select: none; }
        ::-webkit-scrollbar { width: 1px; background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-black);
            color: var(--primary);
            font-family: var(--font-sans);
            overflow: hidden;
            position: relative;
        }

        /* --- VISUAL INTERFERENCE ENGINE --- */
        #render-surface { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.7; }
        
        .vignette-layer {
            position: fixed; inset: 0; z-index: 5;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,1) 140%);
            pointer-events: none;
        }

        .crt-grain {
            position: fixed; inset: 0; z-index: 6;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none;
        }

        .scanline-stream {
            position: fixed; inset: 0; z-index: 7;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; pointer-events: none;
            animation: scan-scroll 8s linear infinite;
        }

        @keyframes scan-scroll { from { background-position: 0 0; } to { background-position: 0 100%; } }
        @keyframes boot-slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INTERFACE ARCHITECTURE --- */
        .os-container { position: relative; z-index: 100; height: 100%; display: flex; flex-direction: column; }

        .os-header {
            padding: 50px 70px; display: flex; justify-content: space-between; align-items: flex-start;
        }

        .sys-identity { border-left: 2px solid var(--primary); padding-left: 30px; }
        .sys-identity h1 { font-size: 11px; font-weight: 900; letter-spacing: 1.1em; text-transform: uppercase; }
        .sys-identity p { font-size: 8px; font-family: var(--font-mono); opacity: 0.3; margin-top: 10px; letter-spacing: 0.3em; }

        /* --- NEXUS GATE --- */
        .nexus-panel {
            position: fixed; top: 0; right: -850px; width: 850px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid var(--border-ui);
            z-index: 2000; transition: right var(--transition-speed) var(--ease-logic);
            padding: 120px 80px; backdrop-filter: blur(140px);
        }

        .nexus-panel.active { right: 0; }

        .nexus-btn {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-ui);
            padding: 26px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.7em;
            color: #fff; width: 100%; margin-bottom: 20px;
            transition: 0.4s var(--ease-logic);
        }

        .nexus-btn:hover {
            background: var(--primary); color: #000;
            box-shadow: 0 0 50px var(--primary-glow);
            transform: scale(1.01);
        }

        /* --- DATA TERMINAL --- */
        #kernel-terminal {
            height: 580px; background: rgba(0,0,0,0.85);
            border: 1px solid var(--border-ui);
            padding: 30px; font-family: var(--font-mono);
            font-size: 8px; color: var(--primary);
            overflow-y: auto; line-height: 2.4;
            scroll-behavior: smooth;
        }

        .log-entry { display: flex; gap: 18px; margin-bottom: 3px; animation: boot-slide 0.2s ease-out; }
        .log-tag-kernel { color: #5050ff; font-weight: 800; }
        .log-tag-auth { color: var(--spotify); font-weight: 800; }
        .log-tag-net { color: #ffae00; font-weight: 800; }
        .log-tag-vfx { color: #ff00ff; font-weight: 800; }

        /* --- CHRONOS 12H --- */
        .chronos-viewport {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none;
        }

        #clock-face {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6rem, 24vw, 28rem);
            font-weight: 900; line-height: 0.65;
            letter-spacing: -0.09em; filter: drop-shadow(0 0 70px var(--primary-glow));
        }

        .clock-meta { display: flex; align-items: baseline; justify-content: center; margin-top: 10px; }
        #clock-ss { font-size: clamp(1rem, 5vw, 6rem); font-weight: 100; opacity: 0.15; }
        #clock-meridiem { font-size: clamp(1rem, 4vw, 5rem); font-weight: 900; opacity: 0.06; margin-left: 25px; }

    </style>
</head>
<body>

    <canvas id="render-surface"></canvas>
    <div class="vignette-layer"></div>
    <div class="crt-grain"></div>
    <div class="scanline-stream"></div>

    <div class="os-container">
        <header class="os-header">
            <div class="sys-identity">
                <h1>ARCHITECT_OS // v84.0_ULTRA</h1>
                <p id="kernel-status">STATUS: INITIALIZING_BOOT_SEQUENCE</p>
            </div>
            <button class="nexus-btn !w-72 !mb-0" onclick="Architect.toggleNexus()">Nexus_Gateway</button>
        </header>

        <aside id="nexus-ui" class="nexus-panel">
            <div class="text-[10px] font-black tracking-[2em] mb-16 uppercase opacity-10">Configuration_Nexus</div>
            
            <div class="space-y-14 overflow-y-auto pr-6 h-[70vh]">
                <section>
                    <div class="text-[8px] font-bold tracking-[0.5em] mb-8 uppercase text-white/20">Authentication_Layer</div>
                    <button class="nexus-btn !text-[#1DB954] !border-[#1DB954]/20" onclick="SpotifyProvider.authenticate()">Link_Spotify_PKCE</button>
                </section>

                <section>
                    <div class="text-[8px] font-bold tracking-[0.5em] mb-8 uppercase text-white/20">Kernel_Log_Stream</div>
                    <div id="kernel-terminal"></div>
                </section>
            </div>

            <div class="mt-12 flex gap-6">
                <button class="nexus-btn !text-white/20 !border-white/5 !mb-0" onclick="Terminal.flush()">Flush_Logs</button>
                <button class="nexus-btn !text-red-700 !border-red-700/10 !mb-0" onclick="location.reload()">Terminate</button>
            </div>
        </aside>

        <main class="chronos-viewport" id="parallax-engine">
            <div id="clock-face">00:00</div>
            <div class="clock-meta">
                <span id="clock-ss">00</span>
                <span id="clock-meridiem">AM</span>
            </div>
            <div class="mt-28 text-[9px] tracking-[5em] font-black text-white/5 uppercase">Bordertown_Regional_Node</div>
        </main>
    </div>

    <script>
        /**
         * --- DATA REPOSITORY: HARDWARE ADDRESS SPACE ---
         * Extensive mapping for high-density code simulation (300+ entries)
         */
        const HARDWARE_ADDR = Array.from({length: 320}, (_, i) => ({
            id: i,
            hex: `0x${Math.floor(Math.random()*0xFFFFFFFF).toString(16).toUpperCase()}`,
            sector: `SEC_0${Math.floor(i/10)}`,
            priority: Math.random() > 0.8 ? "HIGH" : "LOW"
        }));

        /**
         * --- MODULE: TERMINAL ENGINE ---
         */
        const Terminal = {
            output: null,
            init() { this.output = document.getElementById('kernel-terminal'); },
            log(tag, message, type = "kernel") {
                const row = document.createElement('div');
                row.className = "log-entry";
                const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
                row.innerHTML = `
                    <span class="opacity-10">${ts}</span>
                    <span class="log-tag-${type}">[${tag}]</span>
                    <span class="opacity-70">${message}</span>
                `;
                this.output.prepend(row);
                if(this.output.childNodes.length > 1000) this.output.lastChild.remove();
            },
            flush() {
                this.output.innerHTML = '';
                this.log("SYS", "Terminal heap flushed by administrator.");
            }
        };

        /**
         * --- MODULE: ARCHITECT KERNEL ---
         */
        const Architect = {
            toggleNexus: () => document.getElementById('nexus-ui').classList.toggle('active'),
            
            async bootSequence() {
                Terminal.init();
                Terminal.log("KERNEL", "Architect_OS Ultra Kernel [Version 84.0.012] Loading...");
                
                // Address Mapping Sequence (~320 cycles)
                for (const addr of HARDWARE_ADDR) {
                    await new Promise(r => setTimeout(r, 3));
                    Terminal.log("HARDWARE", `Mounting Address ${addr.hex} at ${addr.sector}... OK`);
                }

                Terminal.log("NET", "Uplink verified: BorderTown_Primary_Uplink");
                Terminal.log("VFX", "Shaders compiled. CRT Surface engaged.", "vfx");
                document.getElementById('kernel-status').innerText = "STATUS: KERNEL_ACTIVE_STABLE";
            }
        };

        /**
         * --- MODULE: SPOTIFY PROVIDER (PKCE) ---
         */
        const SpotifyProvider = {
            config: {
                id: 'ee9cf7fe920d4280804730690b3fb4e8',
                uri: 'https://xclipsestudio.xclipsenetworks.com.au/callback.html',
                scopes: 'user-read-currently-playing user-read-playback-state'
            },
            async authenticate() {
                Terminal.log("AUTH", "Generating cryptographic entropy stream...", "auth");
                
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64)))
                    .map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[x % 66]).join('');
                localStorage.setItem('sp_verifier', verifier);

                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode(...new Uint8Array(hashed)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

                const params = new URLSearchParams({
                    response_type: 'code', client_id: this.config.id,
                    scope: this.config.scopes, redirect_uri: this.config.uri,
                    code_challenge_method: 'S256', code_challenge: challenge
                });

                Terminal.log("AUTH", "Transferring control to OAUTH_Gateway...", "auth");
                setTimeout(() => {
                    window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
                }, 1000);
            }
        };

        /**
         * --- MODULE: MATRIX ENGINE ---
         */
        class MatrixEngine {
            constructor() {
                this.canvas = document.getElementById('render-surface');
                this.ctx = this.canvas.getContext('2d');
                this.drops = [];
                this.fontSize = 15;
            }
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                setInterval(() => this.draw(), 45);
            }
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.drops = Array(Math.floor(this.canvas.width / this.fontSize)).fill(1);
            }
            draw() {
                this.ctx.fillStyle = "rgba(0,0,0,0.18)";
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = "#ffffff";
                this.ctx.font = `${this.fontSize}px monospace`;
                this.drops.forEach((y, i) => {
                    const text = Math.random() > 0.5 ? "1" : "0";
                    this.ctx.fillText(text, i * this.fontSize, y * this.fontSize);
                    if(y * this.fontSize > this.canvas.height && Math.random() > 0.98) this.drops[i] = 0;
                    this.drops[i]++;
                });
            }
        }

        /**
         * --- INITIALIZATION ---
         */
        window.onload = () => {
            new MatrixEngine().init();
            Architect.bootSequence();

            // 12H CLOCK ENGINE
            setInterval(() => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const p = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                document.getElementById('clock-face').innerText = `${h}:${m}`;
                document.getElementById('clock-ss').innerText = s;
                document.getElementById('clock-meridiem').innerText = p;
            }, 1000);

            // PARALLAX
            document.onmousemove = (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 100;
                const y = (window.innerHeight / 2 - e.pageY) / 100;
                document.getElementById('parallax-engine').style.transform = `translate(${x}px, ${y}px)`;
            };
        };
    </script>
</body>
</html>
