<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_v7.2_STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.6);
            --spotify: #1DB954;
            --bg-dark: #000000;
            --panel-bg: rgba(4, 4, 4, 0.99);
            --border-ui: rgba(255, 255, 255, 0.06);
            --danger: #ff3333;
            --accent-blue: #3b82f6;
            --terminal-text: #a855f7;
        }

        /* --- CORE ARCHITECTURE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- VISUAL ENGINE --- */
        #nebula-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; transition: filter 1.5s ease; }
        .vignette {
            position: fixed; inset: 0; z-index: 2;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,1) 100%);
            pointer-events: none;
        }
        .scanline-layer {
            position: fixed; inset: 0; z-index: 3;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.3;
        }

        /* --- TELEMETRY DASHBOARD --- */
        .telemetry-suite {
            position: fixed; top: 30px; left: 30px; z-index: 100;
            font-family: 'JetBrains Mono'; font-size: 8px; line-height: 2.2;
            color: rgba(255,255,255,0.15); text-transform: uppercase;
        }
        .tel-item { display: flex; align-items: center; gap: 15px; }
        .tel-label { width: 80px; color: var(--primary); font-weight: 800; letter-spacing: 0.1em; }
        .tel-progress { width: 100px; height: 1px; background: rgba(255,255,255,0.05); position: relative; }
        .tel-fill { height: 100%; background: var(--primary); transition: width 0.8s ease; }

        /* --- TERMINATION MODULE --- */
        .exit-gate { position: fixed; top: 30px; right: 30px; z-index: 2000; display: flex; align-items: center; gap: 15px; }
        .close-trigger {
            width: 50px; height: 50px; border: 1px solid var(--border-ui);
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .close-trigger:hover { border-color: var(--danger); transform: rotate(90deg); background: rgba(255, 51, 51, 0.05); }
        .close-trigger span { font-weight: 100; font-size: 20px; color: rgba(255,255,255,0.2); }
        .close-trigger:hover span { color: var(--danger); }

        #kill-modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.99); backdrop-filter: blur(50px);
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .modal-body {
            text-align: center; max-width: 500px; padding: 60px;
            border: 1px solid var(--border-ui); background: #020202;
        }

        /* --- CHRONOS DISPLAY --- */
        .clock-anchor {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            z-index: 10; transition: 0.3s ease-out; width: 100%;
        }
        .glass-frame {
            background: rgba(255, 255, 255, 0.001); backdrop-filter: blur(25px) saturate(180%);
            padding: 100px 40px; border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: inline-block; min-width: 100%;
        }
        #time-val { 
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(8rem, 24vw, 32rem); 
            font-weight: 900; line-height: 0.75;
            letter-spacing: -0.06em; color: #fff;
            filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.08));
        }
        .meta-strip {
            display: flex; justify-content: center; align-items: center; gap: 60px;
            margin-top: 40px; font-family: 'JetBrains Mono'; 
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.2em; color: var(--primary); opacity: 0.4;
        }

        /* --- COMPACT SPOTIFY MODULE --- */
        #spotify-uplink { 
            position: fixed; bottom: 30px; left: 30px; z-index: 100; 
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .sp-mini-card {
            background: rgba(5, 5, 5, 0.95); border: 1px solid var(--border-ui); padding: 16px 20px;
            backdrop-filter: blur(30px); display: flex; align-items: center; gap: 20px;
            border-left: 2px solid var(--spotify); box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            max-width: 320px;
        }
        .sp-mini-art { width: 44px; height: 44px; border-radius: 1px; }
        .sp-mini-meta { overflow: hidden; }
        .sp-mini-track { font-weight: 900; font-size: 11px; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-mini-artist { font-size: 8px; color: var(--primary); text-transform: uppercase; margin-top: 4px; letter-spacing: 0.2em; opacity: 0.7; }
        .sp-mini-prog { height: 1px; width: 100%; background: rgba(255,255,255,0.05); margin-top: 10px; }
        .sp-mini-fill { height: 100%; background: var(--spotify); }

        /* --- SIDEBAR SYSTEM --- */
        .control-panel {
            position: fixed; top: 0; right: -500px; width: 500px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid var(--border-ui);
            z-index: 1000; transition: right 0.7s cubic-bezier(0.19, 1, 0.22, 1); padding: 100px 60px;
        }
        .control-panel.active { right: 0; }
        .action-btn { 
            background: rgba(255,255,255,0.01); border: 1px solid var(--border-ui); 
            padding: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.4em; color: #fff; transition: 0.3s; width: 100%; text-align: center;
            display: block; margin-bottom: 12px;
        }
        .action-btn:hover { background: #fff; color: #000; }
        .action-btn.primary { border-color: var(--primary); color: var(--primary); }

        .log-box {
            height: 300px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-ui);
            padding: 20px; font-family: 'JetBrains Mono'; font-size: 9px; overflow-y: auto; color: var(--primary); line-height: 1.8;
        }

        /* --- SYSTEM STATES --- */
        .os-shutdown-active { opacity: 0; transform: translateY(20px); filter: blur(30px); pointer-events: none; transition: 1s ease; }
    </style>
</head>
<body id="os-root">

    <canvas id="nebula-canvas"></canvas>
    <div class="vignette"></div>
    <div class="scanline-layer"></div>

    <div id="kill-modal">
        <div class="modal-body">
            <div class="font-black text-[12px] tracking-[1em] text-red-500 mb-6 uppercase">Node_Terminated</div>
            <div class="font-mono text-[9px] text-white/30 leading-loose mb-10 uppercase tracking-widest">
                Uplink protocol severed.<br>
                Encryption keys discarded.<br>
                Please establish new session to continue.
            </div>
            <button class="action-btn primary" onclick="Kernel.reboot()">Establish Session</button>
        </div>
    </div>

    <div class="telemetry-suite" id="tel-ui">
        <div class="tel-item"><span class="tel-label">CPU_LOAD</span> <div class="tel-progress"><div id="cpu-bar" class="tel-fill" style="width: 20%"></div></div></div>
        <div class="tel-item"><span class="tel-label">MEM_USE</span> <div class="tel-progress"><div id="mem-bar" class="tel-fill" style="width: 45%"></div></div></div>
        <div class="tel-item"><span class="tel-label">NET_FLUX</span> <div class="tel-progress"><div id="net-bar" class="tel-fill" style="width: 12%"></div></div></div>
        <div class="tel-item mt-4"><span class="tel-label text-blue-400">STATUS</span> <span class="text-white">NODE_ARCH_STABLE</span></div>
    </div>

    <div class="exit-gate">
        <button class="close-trigger" onclick="Kernel.terminate()"><span>✕</span></button>
    </div>

    <header class="fixed top-8 left-1/2 -translate-x-1/2 z-[500]" id="nav-ui">
        <button class="action-btn !px-20" onclick="Kernel.togglePanel()">Open_Kernel_Parameters</button>
    </header>

    <aside id="sidebar-ui" class="control-panel">
        <div class="text-[9px] opacity-20 font-black tracking-[1em] mb-12 uppercase">Kernel_v7.2_Manifest</div>
        <div class="space-y-12">
            <section>
                <div class="grid grid-cols-2 gap-3">
                    <button class="action-btn" onclick="Chronos.setMode(12)">12H_ISO</button>
                    <button class="action-btn" onclick="Chronos.setMode(24)">24H_ISO</button>
                </div>
            </section>
            <section>
                <div class="text-[8px] opacity-20 font-black tracking-[0.5em] mb-6 uppercase">System_I/O_Stream</div>
                <div id="kernel-logs" class="log-box">
                    <div>> [READY] Node established.</div>
                </div>
            </section>
            <section>
                <button class="action-btn !text-red-500 !border-red-500/20" onclick="Kernel.terminate()">Forced_Shutdown</button>
            </section>
        </div>
    </aside>

    <main class="clock-anchor" id="clock-ui">
        <div class="glass-frame">
            <div id="time-val">00:00</div>
            <div class="meta-strip">
                <span class="font-black">NODE_7.2</span>
                <span id="sec-val" class="text-white">00</span>
                <span id="date-val">APR_11</span>
            </div>
        </div>
    </main>

    <div id="spotify-uplink"></div>

    <script>
        /**
         * ARCHITECT_OS // STABLE KERNEL ENGINE
         * Total Line Expansion: 430+ for system depth.
         */

        const Kernel = {
            togglePanel: () => document.getElementById('sidebar-ui').classList.toggle('active'),
            
            terminate: () => {
                Kernel.log("MSG", "SIGTERM sequence broadcasted.");
                const targets = ['clock-ui', 'spotify-uplink', 'nav-ui', 'tel-ui'];
                targets.forEach(id => document.getElementById(id).classList.add('os-shutdown-active'));
                document.getElementById('nebula-canvas').style.filter = 'brightness(0.05) blur(40px) contrast(2)';
                
                const modal = document.getElementById('kill-modal');
                modal.style.display = 'flex';
                setTimeout(() => { modal.style.opacity = '1'; }, 100);
            },

            reboot: () => window.location.reload(),

            log: (tag, text) => {
                const log = document.getElementById('kernel-logs');
                const div = document.createElement('div');
                div.innerHTML = `<span class="opacity-30">${new Date().toLocaleTimeString()}</span> [${tag}] ${text}`;
                log.prepend(div);
            },

            stats: () => {
                document.getElementById('cpu-bar').style.width = (Math.random() * 40 + 5) + '%';
                document.getElementById('mem-bar').style.width = (Math.random() * 10 + 60) + '%';
                document.getElementById('net-bar').style.width = (Math.random() * 30 + 2) + '%';
            }
        };

        const Chronos = {
            mode: 12,
            setMode: (m) => { 
                Chronos.mode = m; 
                Kernel.log("CFG", `Chronos logic shifted to ${m}H.`);
                Kernel.togglePanel();
            },
            tick: () => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                if (Chronos.mode === 12) h = h % 12 || 12;
                document.getElementById('time-val').innerText = `${String(h).padStart(2, '0')}:${m}`;
                document.getElementById('sec-val').innerText = s;
                const month = now.toLocaleString('en-us', { month: 'short' }).toUpperCase();
                document.getElementById('date-val').innerText = `${month}_${now.getDate()}`;
            }
        };

        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/shh.html',

            updateUI: (isConnected, data = null) => {
                const node = document.getElementById('spotify-uplink');
                if (!isConnected) {
                    node.innerHTML = `<button class="action-btn !text-green-500 !border-green-500/10 mb-4 ml-4 !text-[8px] !p-3" onclick="Spotify.auth()">LINK_MEDIA</button>`;
                    return;
                }
                if (data && data.item) {
                    const prog = (data.progress_ms / data.item.duration_ms) * 100;
                    node.innerHTML = `
                        <div class="sp-mini-card animate-[fadeIn_0.6s]">
                            <img class="sp-mini-art" src="${data.item.album.images[0].url}">
                            <div class="sp-mini-meta">
                                <div class="sp-mini-track">${data.item.name}</div>
                                <div class="sp-mini-artist">${data.item.artists[0].name}</div>
                                <div class="sp-mini-prog"><div class="sp-mini-fill" style="width: ${prog}%"></div></div>
                            </div>
                        </div>`;
                }
            },

            auth: async () => {
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(hashed))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                localStorage.setItem('code_verifier', verifier);
                const params = new URLSearchParams({ response_type: 'code', client_id: Spotify.clientId, scope: 'user-read-currently-playing', redirect_uri: Spotify.redirectUri, code_challenge_method: 'S256', code_challenge: challenge });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            },

            sync: async () => {
                const token = localStorage.getItem('sp_access_token');
                if (!token) return Spotify.updateUI(false);
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (res.status === 200) Spotify.updateUI(true, await res.json());
                    else if (res.status === 401) Spotify.updateUI(false);
                } catch (e) { console.error("Uplink unstable."); }
            }
        };

        const Nebula = {
            canvas: null, ctx: null, pts: [],
            init: () => {
                Nebula.canvas = document.getElementById('nebula-canvas');
                Nebula.ctx = Nebula.canvas.getContext('2d');
                Nebula.resize();
                window.onresize = Nebula.resize;
                for (let i = 0; i < 110; i++) Nebula.pts.push({
                    x: Math.random() * Nebula.canvas.width,
                    y: Math.random() * Nebula.canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    r: Math.random() * 1.2
                });
                Nebula.render();
            },
            resize: () => { Nebula.canvas.width = window.innerWidth; Nebula.canvas.height = window.innerHeight; },
            render: () => {
                Nebula.ctx.clearRect(0, 0, Nebula.canvas.width, Nebula.canvas.height);
                Nebula.pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > Nebula.canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > Nebula.canvas.height) p.vy *= -1;
                    Nebula.ctx.fillStyle = "rgba(168, 85, 247, 0.4)";
                    Nebula.ctx.beginPath(); Nebula.ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); Nebula.ctx.fill();
                });
                Nebula.paths();
                requestAnimationFrame(Nebula.render);
            },
            paths: () => {
                for (let i = 0; i < Nebula.pts.length; i++) {
                    for (let j = i; j < Nebula.pts.length; j++) {
                        let dx = Nebula.pts[i].x - Nebula.pts[j].x;
                        let dy = Nebula.pts[i].y - Nebula.pts[j].y;
                        let d = Math.sqrt(dx*dx + dy*dy);
                        if (d < 120) {
                            Nebula.ctx.strokeStyle = `rgba(168, 85, 247, ${0.1 - d/1200})`;
                            Nebula.ctx.lineWidth = 0.5;
                            Nebula.ctx.beginPath(); Nebula.ctx.moveTo(Nebula.pts[i].x, Nebula.pts[i].y);
                            Nebula.ctx.lineTo(Nebula.pts[j].x, Nebula.pts[j].y);
                            Nebula.ctx.stroke();
                        }
                    }
                }
            }
        };

        window.onload = () => {
            Nebula.init();
            setInterval(Chronos.tick, 1000);
            setInterval(Spotify.sync, 4000);
            setInterval(Kernel.stats, 2500);
            Spotify.sync();
            Kernel.log("SYS", "Environment stability verified.");
        };

        document.onmousemove = (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 100;
            const y = (window.innerHeight / 2 - e.pageY) / 100;
            document.getElementById('clock-ui').style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotateY(${x}deg) rotateX(${-y}deg)`;
        };
    </script>
</body>
</html>
