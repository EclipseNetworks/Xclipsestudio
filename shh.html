<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_PREMIUM_v6.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.5);
            --spotify: #1DB954;
            --bg-dark: #000000;
            --panel-bg: rgba(6, 6, 6, 0.98);
            --border-ui: rgba(255, 255, 255, 0.08);
            --danger: #ff3e3e;
        }

        /* --- SYSTEM CORE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- NEURAL NEBULA BACKGROUND --- */
        #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4; transition: filter 1s ease; }
        .vignette {
            position: fixed; inset: 0; z-index: 2;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.98) 100%);
            pointer-events: none;
        }

        /* --- EXIT MODULE --- */
        .exit-gate {
            position: fixed; top: 40px; right: 40px;
            z-index: 2000; display: flex; align-items: center; gap: 20px;
        }
        .close-btn {
            width: 60px; height: 60px;
            border: 1px solid var(--border-ui);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative; overflow: hidden;
        }
        .close-btn:hover {
            border-color: var(--danger);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 30px rgba(255, 62, 62, 0.3);
        }
        .close-btn span { font-weight: 200; font-size: 24px; color: rgba(255,255,255,0.5); transition: 0.3s; }
        .close-btn:hover span { color: var(--danger); }

        /* --- SESSION CLOSED POPUP --- */
        #session-modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .modal-content {
            text-align: center; max-width: 500px; padding: 60px;
            border: 1px solid var(--border-ui); background: #050505;
            box-shadow: 0 0 100px rgba(168, 85, 247, 0.1);
        }
        .modal-title { font-family: 'Montserrat'; font-size: 14px; letter-spacing: 0.8em; color: var(--danger); text-transform: uppercase; margin-bottom: 20px; }
        .modal-text { font-family: 'JetBrains Mono'; font-size: 10px; color: rgba(255,255,255,0.4); line-height: 2; margin-bottom: 40px; text-transform: uppercase; }

        /* --- GHOST CLOCK --- */
        .clock-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 10;
            transition: transform 0.15s ease-out, opacity 0.8s ease;
            width: 100%;
        }
        .clock-glass {
            background: rgba(255, 255, 255, 0.003); 
            backdrop-filter: blur(20px) saturate(180%);
            padding: 100px 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: inline-block; min-width: 100%;
        }
        #main-time { 
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(12rem, 26vw, 34rem); 
            font-weight: 900; line-height: 0.75;
            letter-spacing: -0.07em; color: #fff;
        }

        /* --- SPOTIFY MODULE --- */
        #spotify-node {
            position: fixed; bottom: 50px; left: 50px;
            z-index: 100; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sp-module {
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--border-ui); padding: 24px 30px;
            backdrop-filter: blur(40px); display: flex; align-items: center; gap: 28px;
            border-left: 3px solid var(--spotify);
        }
        .sp-art { width: 64px; height: 64px; border-radius: 2px; }
        .sp-track { font-weight: 900; font-size: 14px; text-transform: uppercase; color: #fff; }
        .progress-bar { height: 1px; width: 100%; background: rgba(255,255,255,0.06); margin-top: 20px; }
        .progress-fill { height: 100%; background: var(--spotify); transition: width 1s linear; }

        /* --- SIDEBAR & BUTTONS --- */
        .side-panel {
            position: fixed; top: 0; right: -550px; width: 550px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid var(--border-ui);
            z-index: 1000; transition: right 0.7s cubic-bezier(0.16, 1, 0.3, 1); padding: 120px 80px;
        }
        .side-panel.active { right: 0; }
        .os-btn { 
            background: rgba(255,255,255,0.01); border: 1px solid var(--border-ui); 
            padding: 22px; font-size: 10px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.4em; color: #fff; transition: 0.3s; width: 100%; text-align: center;
            display: block; margin-bottom: 10px;
        }
        .os-btn:hover { background: #fff; color: #000; transform: translateY(-3px); }
        .os-btn.primary-action { border-color: var(--primary); color: var(--primary); }
        .os-btn.primary-action:hover { background: var(--primary); color: #000; }

        /* --- SYSTEM STATE --- */
        .sys-shutdown { opacity: 0; pointer-events: none; filter: blur(20px); }
    </style>
</head>
<body id="os-root">

    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>

    <div id="session-modal">
        <div class="modal-content">
            <div class="modal-title">Session Terminated</div>
            <div class="modal-text">
                Uplink dropped. Kernel state preserved.<br>
                Please press establish session to return to main.
            </div>
            <button class="os-btn primary-action" onclick="OS.reboot()">Establish New Session</button>
        </div>
    </div>

    <div class="exit-gate">
        <div class="text-[8px] font-black tracking-[0.5em] text-white/20 uppercase">Session_ID: X-77</div>
        <button class="close-btn" onclick="OS.terminate()" title="Close Terminal Session">
            <span>✕</span>
        </button>
    </div>

    <header class="fixed top-12 left-1/2 -translate-x-1/2 z-[500] transition-opacity duration-500" id="header-ui">
        <button class="os-btn !px-20" onclick="OS.togglePanel()">Kernel_Settings</button>
    </header>

    <aside id="osPanel" class="side-panel">
        <div class="text-[10px] opacity-20 font-black tracking-[1em] mb-12 uppercase">Kernel_Core</div>
        <div class="space-y-12">
            <section>
                <div class="grid grid-cols-2 gap-4">
                    <button class="os-btn" onclick="Clock.setMode(12)">12_HR</button>
                    <button class="os-btn" onclick="Clock.setMode(24)">24_HR</button>
                </div>
            </section>
            <section>
                <div id="sys-log" class="h-64 bg-black/40 border border-white/5 p-6 font-mono text-[9px] text-purple-400 overflow-y-auto">
                    > [READY] System Uplink Optimized.
                </div>
            </section>
        </div>
    </aside>

    <main class="clock-center" id="main-content">
        <div class="clock-glass">
            <div id="main-time">00:00</div>
            <div class="flex justify-center gap-12 mt-8 font-mono text-[10px] tracking-[0.8em] text-purple-500/60">
                <span>SYSTEM_CHRONOS</span>
                <span id="sec-hex" class="text-white">00</span>
                <span id="tel-date">APR_11</span>
            </div>
        </div>
    </main>

    <div id="spotify-node"></div>

    <script>
        /**
         * ARCHITECT_OS // SESSION ENGINE
         */

        const OS = {
            togglePanel: () => document.getElementById('osPanel').classList.toggle('active'),
            
            terminate: () => {
                // Fade out main UI components
                document.getElementById('main-content').classList.add('sys-shutdown');
                document.getElementById('spotify-node').classList.add('sys-shutdown');
                document.getElementById('header-ui').classList.add('sys-shutdown');
                document.getElementById('bg-canvas').style.filter = 'grayscale(1) blur(10px)';
                
                // Show termination modal
                const modal = document.getElementById('session-modal');
                modal.style.display = 'flex';
                setTimeout(() => { modal.style.opacity = '1'; }, 100);
            },

            reboot: () => {
                // Hard reset the session (returns to main)
                window.location.reload();
            },

            log: (msg) => {
                const log = document.getElementById('sys-log');
                log.innerHTML = `<div>> ${msg}</div>` + log.innerHTML;
            }
        };

        const Clock = {
            mode: 12,
            setMode: (m) => Clock.mode = m,
            tick: () => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                if (Clock.mode === 12) h = h % 12 || 12;
                document.getElementById('main-time').innerText = `${String(h).padStart(2, '0')}:${m}`;
                document.getElementById('sec-hex').innerText = s;
                const month = now.toLocaleString('en-us', { month: 'short' }).toUpperCase();
                document.getElementById('tel-date').innerText = `${month}_${now.getDate()}`;
            }
        };

        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/shh.html',

            updateUI: (isConnected, data = null) => {
                const node = document.getElementById('spotify-node');
                if (!isConnected) {
                    node.innerHTML = `<button class="os-btn !text-green-500 !border-green-500/10 mb-12 ml-12" onclick="Spotify.auth()">LINK_SPOTIFY</button>`;
                    return;
                }
                if (data && data.item) {
                    const prog = (data.progress_ms / data.item.duration_ms) * 100;
                    node.innerHTML = `
                        <div class="sp-module m-12 animate-[fadeIn_0.5s]">
                            <img class="sp-art" src="${data.item.album.images[0].url}">
                            <div class="w-64">
                                <div class="sp-track truncate">${data.item.name}</div>
                                <div class="text-[9px] text-purple-400 uppercase tracking-widest mt-2">${data.item.artists[0].name}</div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${prog}%"></div></div>
                            </div>
                        </div>`;
                }
            },

            auth: async () => {
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(hashed))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                localStorage.setItem('code_verifier', verifier);
                const params = new URLSearchParams({ response_type: 'code', client_id: Spotify.clientId, scope: 'user-read-currently-playing user-read-playback-state', redirect_uri: Spotify.redirectUri, code_challenge_method: 'S256', code_challenge: challenge });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            },

            sync: async () => {
                const token = localStorage.getItem('sp_access_token');
                if (!token) return Spotify.updateUI(false);
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (res.status === 200) Spotify.updateUI(true, await res.json());
                    else if (res.status === 401) Spotify.updateUI(false);
                } catch (e) { console.error("Sync Error"); }
            }
        };

        const Nebula = {
            canvas: null, ctx: null, particles: [],
            init: () => {
                Nebula.canvas = document.getElementById('bg-canvas');
                Nebula.ctx = Nebula.canvas.getContext('2d');
                Nebula.resize();
                window.onresize = Nebula.resize;
                for (let i = 0; i < 100; i++) Nebula.particles.push({
                    x: Math.random() * Nebula.canvas.width,
                    y: Math.random() * Nebula.canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    s: Math.random() * 2
                });
                Nebula.animate();
            },
            resize: () => { Nebula.canvas.width = window.innerWidth; Nebula.canvas.height = window.innerHeight; },
            animate: () => {
                Nebula.ctx.clearRect(0,0,Nebula.canvas.width, Nebula.canvas.height);
                Nebula.particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > Nebula.canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > Nebula.canvas.height) p.vy *= -1;
                    Nebula.ctx.fillStyle = "rgba(168, 85, 247, 0.4)";
                    Nebula.ctx.beginPath(); Nebula.ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); Nebula.ctx.fill();
                });
                requestAnimationFrame(Nebula.animate);
            }
        };

        window.onload = () => {
            Nebula.init();
            setInterval(Clock.tick, 1000);
            setInterval(Spotify.sync, 4000);
            Spotify.sync();
        };

        document.onmousemove = (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 100;
            const y = (window.innerHeight / 2 - e.pageY) / 100;
            document.getElementById('main-content').style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotateY(${x}deg) rotateX(${-y}deg)`;
        };
    </script>
</body>
</html>
