<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_v84.0_ULTRA_CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;900&family=Inter:wght@100;400;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- KERNEL DESIGN SYSTEM ---
           Industrial aesthetics for high-density environments.
        */
        :root {
            --primary: #ffffff;
            --primary-glow: rgba(255, 255, 255, 0.4);
            --spotify: #1DB954;
            --bg-black: #000000;
            --ui-border: rgba(255, 255, 255, 0.08);
            --font-mono: 'JetBrains Mono', monospace;
            --transition-ultra: 1.1s cubic-bezier(0.19, 1, 0.22, 1);
            --crt-opacity: 0.03;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; user-select: none; outline: none; }
        ::-webkit-scrollbar { width: 2px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-black);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- VISUAL INTERFERENCE SUITE --- */
        #core-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.75; }
        
        .vignette {
            position: fixed; inset: 0; z-index: 5;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,1) 150%);
            pointer-events: none;
        }

        .crt-interference {
            position: fixed; inset: 0; z-index: 6;
            background: linear-gradient(rgba(255,255,255,var(--crt-opacity)) 50%, rgba(0,0,0,0.2) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; animation: flicker 0.15s infinite;
        }

        /* --- ANIMATION REPOSITORY --- */
        @keyframes flicker { 0% { opacity: 0.8; } 50% { opacity: 0.85; } 100% { opacity: 0.82; } }
        @keyframes log-entry-anim { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scanline { from { transform: translateY(-100%); } to { transform: translateY(100%); } }

        .scanline-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px; z-index: 7;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.02), transparent);
            animation: scanline 6s linear infinite; pointer-events: none;
        }

        /* --- OS INTERFACE ARCHITECTURE --- */
        .os-wrapper { position: relative; z-index: 100; height: 100vh; width: 100vw; display: flex; flex-direction: column; }

        .os-nav { padding: 40px 60px; display: flex; justify-content: space-between; align-items: flex-start; }
        .os-branding { border-left: 2px solid var(--primary); padding-left: 25px; }
        .os-branding h1 { font-size: 11px; font-weight: 900; letter-spacing: 1.1em; text-transform: uppercase; }
        .os-branding span { font-family: var(--font-mono); font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 0.3em; margin-top: 8px; display: block; }

        /* --- NEXUS GATEWAY --- */
        .nexus-panel {
            position: fixed; top: 0; right: -850px; width: 850px; height: 100%;
            background: rgba(2, 2, 2, 0.99); border-left: 1px solid var(--ui-border);
            z-index: 2000; transition: right var(--transition-ultra);
            padding: 100px 70px; backdrop-filter: blur(160px); display: flex; flex-direction: column;
        }
        .nexus-panel.active { right: 0; }

        .ui-btn {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--ui-border);
            padding: 24px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.6em;
            color: #fff; width: 100%; margin-bottom: 20px;
            transition: all 0.5s var(--transition-ultra);
        }
        .ui-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 50px var(--primary-glow); transform: translateY(-3px); }

        /* --- DATA TERMINAL --- */
        #terminal-core {
            height: 580px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--ui-border);
            padding: 30px; font-family: var(--font-mono);
            font-size: 8px; color: var(--primary);
            overflow-y: auto; line-height: 2.4; scroll-behavior: smooth;
        }
        .log-line { display: flex; gap: 20px; margin-bottom: 2px; animation: log-entry-anim 0.3s ease-out; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .log-tag-sys { color: #4d4dff; font-weight: 800; }
        .log-tag-auth { color: var(--spotify); font-weight: 800; }
        .log-tag-err { color: #ff3333; font-weight: 800; }
        .log-tag-vfx { color: #ff00ff; font-weight: 800; }

        /* --- CHRONOS ENGINE (12H) --- */
        .chronos-box { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #main-clock { font-family: 'Montserrat', sans-serif; font-size: clamp(6rem, 24vw, 30rem); font-weight: 900; line-height: 0.65; letter-spacing: -0.08em; color: var(--primary); filter: drop-shadow(0 0 60px var(--primary-glow)); }
        .clock-meta { display: flex; align-items: baseline; gap: 20px; margin-top: 10px; }
        #sec-clock { font-size: clamp(1rem, 5vw, 6rem); font-weight: 100; opacity: 0.15; }
        #ampm-clock { font-size: clamp(1rem, 3vw, 4rem); font-weight: 900; opacity: 0.05; text-transform: uppercase; }

    </style>
</head>
<body>

    <canvas id="core-canvas"></canvas>
    <div class="vignette"></div>
    <div class="crt-interference"></div>
    <div class="scanline-effect"></div>

    <div class="os-wrapper">
        <header class="os-nav">
            <div class="os-branding">
                <h1>ARCHITECT_OS // v84.0_ULTRA</h1>
                <span id="os-lifecycle">SYSTEM_STATE: INITIALIZING</span>
            </div>
            <button class="ui-btn !w-64 !mb-0" onclick="Kernel.toggleNexus()">Nexus_Gateway</button>
        </header>

        <aside id="nexus-ui" class="nexus-panel">
            <div class="text-[10px] font-black tracking-[2em] mb-14 uppercase opacity-5">Configuration_Manifest</div>
            <div class="flex-1 overflow-y-auto pr-6 space-y-16">
                <section>
                    <div class="text-[8px] font-bold tracking-[0.5em] mb-8 uppercase text-white/20">Access_Control</div>
                    <button class="ui-btn !text-[#1DB954] !border-[#1DB954]/20" onclick="Spotify.auth()">Link_Spotify_PKCE</button>
                </section>
                <section>
                    <div class="text-[8px] font-bold tracking-[0.5em] mb-8 uppercase text-white/20">Kernel_Terminal_Stream</div>
                    <div id="terminal-core"></div>
                </section>
            </div>
            <div class="mt-10 flex gap-4">
                <button class="ui-btn !text-white/20 !border-white/5 !mb-0" onclick="Terminal.clear()">Flush_Buffer</button>
                <button class="ui-btn !text-red-700 !border-red-700/10 !mb-0" onclick="location.reload()">Terminate_Session</button>
            </div>
        </aside>

        <main class="chronos-box" id="parallax-root">
            <div id="main-clock">12:00</div>
            <div class="clock-meta">
                <span id="sec-clock">00</span>
                <span id="ampm-clock">AM</span>
            </div>
            <div class="mt-24 text-[10px] tracking-[5em] font-black text-white/5 uppercase">Regional_Hub_SA_AU</div>
        </main>
    </div>

    <script>
        /**
         * --- MASSIVE SYSTEM REGISTRY ---
         * Simulating a full hardware address space for manifest density.
         */
        const REGISTRY_BLOCK = Array.from({length: 420}, (_, i) => ({
            addr: `0x${Math.floor(Math.random()*0xFFFFFFFF).toString(16).toUpperCase()}`,
            node: `NODE_ID_${i.toString().padStart(3, '0')}`,
            prot: ["TCP", "UDP", "X_LINK", "SSH"][Math.floor(Math.random()*4)]
        }));

        /**
         * --- MODULE: TERMINAL CONTROLLER ---
         */
        const Terminal = {
            output: document.getElementById('terminal-core'),
            log(tag, msg, type = "sys") {
                const row = document.createElement('div');
                row.className = "log-line";
                const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
                row.innerHTML = `<span class="opacity-10">${ts}</span><span class="log-tag-${type}">[${tag}]</span><span class="opacity-70">${msg}</span>`;
                this.output.prepend(row);
                if(this.output.childNodes.length > 1000) this.output.lastChild.remove();
            },
            clear() { this.output.innerHTML = ''; this.log("SYS", "Buffer memory zeroed."); }
        };

        /**
         * --- MODULE: KERNEL LIFECYCLE ---
         */
        const Kernel = {
            toggleNexus: () => document.getElementById('nexus-ui').classList.toggle('active'),
            
            async init() {
                Terminal.log("SYS", "Architect_OS Ultra Kernel Initializing...");
                document.getElementById('os-lifecycle').innerText = "SYSTEM_STATE: MAPPING_HARDWARE";

                // Mapping Registry (420 Cycles)
                for (const item of REGISTRY_BLOCK) {
                    await new Promise(r => setTimeout(r, 2));
                    Terminal.log("HW", `Mounting Address ${item.addr} // Protocol: ${item.prot}... OK`);
                }

                Terminal.log("VFX", "Shaders compiled. Scanline logic active.", "vfx");
                Terminal.log("NET", "Uplink established. Latency: 4ms");
                document.getElementById('os-lifecycle').innerText = "SYSTEM_STATE: KERNEL_ACTIVE";
            }
        };

        /**
         * --- MODULE: SPOTIFY PKCE HANDSHAKE ---
         */
        const Spotify = {
            config: {
                id: 'ee9cf7fe920d4280804730690b3fb4e8',
                uri: 'https://xclipsestudio.xclipsenetworks.com.au/callback.html'
            },
            async auth() {
                Terminal.log("AUTH", "Constructing Secure Entropy Handshake...", "auth");
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64)))
                    .map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[x % 66]).join('');
                localStorage.setItem('sp_verifier', verifier);

                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode(...new Uint8Array(hashed)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

                const params = new URLSearchParams({
                    response_type: 'code', client_id: this.config.id,
                    scope: 'user-read-currently-playing user-read-playback-state',
                    redirect_uri: this.config.uri, code_challenge_method: 'S256', code_challenge: challenge
                });

                Terminal.log("AUTH", "Handshake Ready. Redirecting to Gateway.", "auth");
                setTimeout(() => { window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`; }, 800);
            }
        };

        /**
         * --- MODULE: MATRIX VECTOR ENGINE ---
         */
        class MatrixEngine {
            constructor() {
                this.c = document.getElementById('core-canvas');
                this.ctx = this.c.getContext('2d');
                this.drops = [];
                this.font = 15;
            }
            start() {
                this.resize();
                window.onresize = () => this.resize();
                setInterval(() => this.render(), 45);
            }
            resize() {
                this.c.width = window.innerWidth;
                this.c.height = window.innerHeight;
                this.drops = Array(Math.floor(this.c.width / this.font)).fill(1);
            }
            render() {
                this.ctx.fillStyle = "rgba(0,0,0,0.15)";
                this.ctx.fillRect(0, 0, this.c.width, this.c.height);
                this.ctx.fillStyle = "#ffffff";
                this.ctx.font = `${this.font}px monospace`;
                this.drops.forEach((y, i) => {
                    const text = Math.random() > 0.5 ? "1" : "0";
                    this.ctx.fillText(text, i * this.font, y * this.font);
                    if(y * this.font > this.c.height && Math.random() > 0.985) this.drops[i] = 0;
                    this.drops[i]++;
                });
            }
        }

        /**
         * --- GLOBAL EXECUTION ---
         */
        window.onload = () => {
            new MatrixEngine().start();
            Kernel.init();

            // 12H CLOCK LOGIC
            setInterval(() => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const p = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                document.getElementById('main-clock').innerText = `${h}:${m}`;
                document.getElementById('sec-clock').innerText = s;
                document.getElementById('ampm-clock').innerText = p;
            }, 1000);

            // PARALLAX ENGINE
            document.onmousemove = (e) => {
                const x = (window.innerWidth/2 - e.pageX)/100;
                const y = (window.innerHeight/2 - e.pageY)/100;
                document.getElementById('parallax-root').style.transform = `translate(${x}px, ${y}px)`;
            };
        };
    </script>
</body>
</html>
