<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_v84.0_ULTRA_MANIFEST</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;900&family=Inter:wght@100;400;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- KERNEL DESIGN SYSTEM (UAF_v84) --- */
        :root {
            --primary: #ffffff;
            --primary-glow: rgba(255, 255, 255, 0.4);
            --spotify: #1DB954;
            --bg-black: #000000;
            --panel-bg: rgba(4, 4, 4, 0.98);
            --ui-border: rgba(255, 255, 255, 0.07);
            --font-mono: 'JetBrains Mono', monospace;
            --ease-logic: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-speed: 0.9s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; user-select: none; }
        ::-webkit-scrollbar { width: 1px; background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-black);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- VISUAL INTERFERENCE SUITE --- */
        #render-surface { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.7; }
        
        .vignette-layer {
            position: fixed; inset: 0; z-index: 5;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,1) 140%);
            pointer-events: none;
        }

        .crt-interference {
            position: fixed; inset: 0; z-index: 6;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; pointer-events: none;
            animation: scan-scroll 8s linear infinite;
        }

        @keyframes scan-scroll { from { background-position: 0 0; } to { background-position: 0 100%; } }
        @keyframes boot-slide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INTERFACE ARCHITECTURE --- */
        .os-container { position: relative; z-index: 100; height: 100%; display: flex; flex-direction: column; }

        .os-header {
            padding: 50px 70px; display: flex; justify-content: space-between; align-items: flex-start;
        }

        .sys-identity { border-left: 2px solid var(--primary); padding-left: 30px; }
        .sys-identity h1 { font-size: 11px; font-weight: 900; letter-spacing: 1.1em; text-transform: uppercase; }
        .sys-identity p { font-size: 8px; font-family: var(--font-mono); opacity: 0.3; margin-top: 10px; letter-spacing: 0.3em; }

        /* --- NEXUS GATEWAY --- */
        .nexus-panel {
            position: fixed; top: 0; right: -850px; width: 850px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid var(--ui-border);
            z-index: 2000; transition: right var(--transition-speed) var(--ease-logic);
            padding: 120px 80px; backdrop-filter: blur(140px);
        }
        .nexus-panel.active { right: 0; }

        .ui-btn {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--ui-border);
            padding: 26px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.7em;
            color: #fff; width: 100%; margin-bottom: 20px;
            transition: 0.4s var(--ease-logic);
        }
        .ui-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 50px var(--primary-glow); transform: scale(1.01); }

        /* --- DATA TERMINAL --- */
        #kernel-terminal {
            height: 480px; background: rgba(0,0,0,0.85);
            border: 1px solid var(--ui-border);
            padding: 30px; font-family: var(--font-mono);
            font-size: 8px; color: var(--primary);
            overflow-y: auto; line-height: 2.4; scroll-behavior: smooth;
        }
        .log-entry { display: flex; gap: 18px; margin-bottom: 3px; animation: boot-slide 0.2s ease-out; }
        .log-tag-sys { color: #5050ff; font-weight: 800; }
        .log-tag-auth { color: var(--spotify); font-weight: 800; }
        .log-tag-vfx { color: #ff00ff; font-weight: 800; }

        /* --- SPOTIFY LIVE WIDGET --- */
        #spotify-widget {
            position: fixed; bottom: 60px; left: 70px; z-index: 500;
            width: 420px; border-left: 1px solid var(--ui-border);
            padding-left: 30px; transition: 1s var(--ease-logic);
        }

        .track-art-wrapper {
            width: 80px; height: 80px; border: 1px solid var(--ui-border);
            position: relative; overflow: hidden;
        }

        #track-progress {
            position: absolute; bottom: 0; left: 0; height: 2px;
            background: var(--primary); width: 0%; transition: width 1s linear;
        }

        /* --- CHRONOS ENGINE --- */
        .chronos-viewport {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: none;
        }
        #clock-face {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6rem, 24vw, 28rem);
            font-weight: 900; line-height: 0.65; letter-spacing: -0.09em;
            filter: drop-shadow(0 0 70px var(--primary-glow));
        }
        .clock-meta { display: flex; align-items: baseline; gap: 20px; margin-top: 15px; }
        #clock-ss { font-size: clamp(1rem, 5vw, 6rem); font-weight: 100; opacity: 0.15; }
        #clock-p { font-size: clamp(1rem, 4vw, 5rem); font-weight: 900; opacity: 0.06; }

    </style>
</head>
<body>

    <canvas id="render-surface"></canvas>
    <div class="vignette-layer"></div>
    <div class="crt-interference"></div>

    <div class="os-container">
        <header class="os-header">
            <div class="sys-identity">
                <h1>ARCHITECT_OS // v84.0_ULTRA</h1>
                <p id="kernel-status">STATUS: KERNEL_INITIALIZING</p>
            </div>
            <button class="ui-btn !w-72 !mb-0" onclick="Architect.toggleNexus()">Nexus_Gateway</button>
        </header>

        <aside id="nexus-ui" class="nexus-panel">
            <div class="text-[10px] font-black tracking-[2em] mb-16 uppercase opacity-10">Configuration_Nexus</div>
            <div class="space-y-14 overflow-y-auto pr-6 h-[70vh]">
                <section>
                    <div class="text-[8px] font-bold tracking-[0.5em] mb-8 uppercase text-white/20">Authentication_Layer</div>
                    <button class="ui-btn !text-[#1DB954] !border-[#1DB954]/20" onclick="SpotifyAuth.trigger()">Link_Spotify_PKCE</button>
                </section>
                <section>
                    <div class="text-[8px] font-bold tracking-[0.5em] mb-8 uppercase text-white/20">Kernel_Log_Stream</div>
                    <div id="kernel-terminal"></div>
                </section>
            </div>
            <div class="mt-12 flex gap-6">
                <button class="ui-btn !text-white/20 !border-white/5 !mb-0" onclick="Terminal.flush()">Flush_Logs</button>
                <button class="ui-btn !text-red-700 !border-red-700/10 !mb-0" onclick="location.reload()">Terminate</button>
            </div>
        </aside>

        <section id="spotify-widget" class="opacity-0">
            <div class="flex gap-8 items-center">
                <div class="track-art-wrapper">
                    <img id="track-art" src="" class="w-full h-full object-cover grayscale opacity-50" />
                    <div id="track-progress"></div>
                </div>
                <div class="flex-1 min-w-0">
                    <h2 id="track-name" class="text-[10px] font-black tracking-widest uppercase truncate">Idle_Stream</h2>
                    <p id="track-artist" class="text-[8px] opacity-30 tracking-[0.3em] uppercase truncate mt-2">Awaiting_Active_Device</p>
                    <div class="flex gap-8 mt-6">
                        <button onclick="SpotifyEngine.control('previous')" class="text-[8px] font-bold opacity-20 hover:opacity-100 transition-opacity">PREV</button>
                        <button id="play-pause-btn" onclick="SpotifyEngine.control('toggle')" class="text-[8px] font-black tracking-[0.5em]">CONNECTING</button>
                        <button onclick="SpotifyEngine.control('next')" class="text-[8px] font-bold opacity-20 hover:opacity-100 transition-opacity">NEXT</button>
                    </div>
                </div>
            </div>
        </section>

        <main class="chronos-viewport" id="parallax-engine">
            <div id="clock-face">00:00</div>
            <div class="clock-meta">
                <span id="clock-ss">00</span>
                <span id="clock-p">AM</span>
            </div>
            <div class="mt-28 text-[9px] tracking-[5em] font-black text-white/5 uppercase">Bordertown_Regional_Hub</div>
        </main>
    </div>

    <script>
        /**
         * --- GLOBAL HARDWARE REGISTRY (MANIFEST DENSITY) ---
         * 400+ Address points for system simulation.
         */
        const HW_REGISTRY = Array.from({length: 420}, (_, i) => ({
            id: `REG_0x${i.toString(16).toUpperCase()}`,
            sector: `SEC_${Math.floor(i/16)}`,
            status: "ACTIVE"
        }));

        /**
         * --- MODULE: TERMINAL ENGINE ---
         */
        const Terminal = {
            el: document.getElementById('kernel-terminal'),
            log(tag, msg, type = "sys") {
                const row = document.createElement('div');
                row.className = "log-entry";
                const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
                row.innerHTML = `<span class="opacity-10">${ts}</span><span class="log-tag-${type}">[${tag}]</span><span class="opacity-70">${msg}</span>`;
                this.el.prepend(row);
                if(this.el.childNodes.length > 500) this.el.lastChild.remove();
            },
            flush() { this.el.innerHTML = ''; this.log("SYS", "Terminal heap cleared."); }
        };

        /**
         * --- MODULE: ARCHITECT KERNEL ---
         */
        const Architect = {
            toggleNexus: () => document.getElementById('nexus-ui').classList.toggle('active'),
            
            async boot() {
                Terminal.log("SYS", "Architect_OS Ultra Kernel Initializing...");
                
                // Hardware Mapping Loop (Aesthetic Density)
                for(let i=0; i<HW_REGISTRY.length; i+=10) {
                    await new Promise(r => setTimeout(r, 5));
                    Terminal.log("HW", `Mapping Sector ${HW_REGISTRY[i].id}... OK`);
                }

                Terminal.log("VFX", "Shaders compiled. Scanline surface active.", "vfx");
                Terminal.log("NET", "Uplink verified: BorderTown_Primary_Node");
                document.getElementById('kernel-status').innerText = "STATUS: KERNEL_STABLE_ACTIVE";
                
                SpotifyEngine.init();
            }
        };

        /**
         * --- MODULE: SPOTIFY AUTHENTICATION (PKCE FIXED) ---
         */
        const SpotifyAuth = {
            config: {
                id: 'ee9cf7fe920d4280804730690b3fb4e8',
                uri: 'https://xclipsestudio.xclipsenetworks.com.au/callback.html'
            },
            async trigger() {
                Terminal.log("AUTH", "Generating Secure PKCE Entropy Stream...", "auth");
                
                const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64)))
                    .map(x => charset[x % charset.length]).join('');
                
                localStorage.setItem('sp_verifier', verifier);

                const encoder = new TextEncoder();
                const data = encoder.encode(verifier);
                const hash = await crypto.subtle.digest('SHA-256', data);
                const challenge = btoa(String.fromCharCode(...new Uint8Array(hash)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

                const params = new URLSearchParams({
                    client_id: this.config.id,
                    response_type: 'code',
                    redirect_uri: this.config.uri,
                    code_challenge_method: 'S256',
                    code_challenge: challenge,
                    scope: 'user-read-currently-playing user-read-playback-state user-modify-playback-state'
                });

                Terminal.log("AUTH", "PKCE_Pair Cached. Redirecting to Gateway...", "auth");
                setTimeout(() => {
                    window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
                }, 800);
            }
        };

        /**
         * --- MODULE: SPOTIFY ENGINE (LIVE PLAYBACK) ---
         */
        const SpotifyEngine = {
            token: localStorage.getItem('sp_token'),
            active: false,

            async init() {
                if(!this.token) {
                    Terminal.log("AUTH", "No active token detected. Spotify service dormant.", "auth");
                    return;
                }
                document.getElementById('spotify-widget').classList.remove('opacity-0');
                Terminal.log("SYS", "Playback stream service initialized.");
                this.poll();
                setInterval(() => this.poll(), 3000);
            }

            async poll() {
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player', {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    if(res.status === 204) { this.updateIdle(); return; }
                    const data = await res.json();
                    this.updateUI(data);
                } catch(e) { /* Fail Silently */ }
            }

            updateUI(data) {
                const track = data.item;
                this.active = data.is_playing;
                document.getElementById('track-name').innerText = track.name;
                document.getElementById('track-artist').innerText = track.artists.map(a => a.name).join(', ');
                document.getElementById('track-art').src = track.album.images[0].url;
                document.getElementById('track-progress').style.width = `${(data.progress_ms / track.duration_ms) * 100}%`;
                document.getElementById('play-pause-btn').innerText = this.active ? "PAUSE" : "PLAY";
            }

            updateIdle() {
                document.getElementById('track-name').innerText = "DEVICE_OFFLINE";
                document.getElementById('play-pause-btn').innerText = "IDLE";
            }

            async control(cmd) {
                Terminal.log("SYS", `Executing_Playback_CMD: ${cmd.toUpperCase()}`);
                let method = 'POST';
                let path = cmd;
                if(cmd === 'toggle') {
                    path = this.active ? 'pause' : 'play';
                    method = 'PUT';
                }
                try {
                    await fetch(`https://api.spotify.com/v1/me/player/${path}`, {
                        method: method,
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    setTimeout(() => this.poll(), 400);
                } catch(e) { Terminal.log("ERR", "Command_Refused", "err"); }
            }
        };

        /**
         * --- MODULE: MATRIX ENGINE ---
         */
        class MatrixEngine {
            constructor() {
                this.c = document.getElementById('render-surface');
                this.ctx = this.c.getContext('2d');
                this.drops = [];
            }
            init() {
                this.c.width = window.innerWidth;
                this.c.height = window.innerHeight;
                this.drops = Array(Math.floor(this.c.width / 20)).fill(1);
                setInterval(() => this.draw(), 45);
            }
            draw() {
                this.ctx.fillStyle = "rgba(0,0,0,0.15)";
                this.ctx.fillRect(0,0,this.c.width,this.c.height);
                this.ctx.fillStyle = "#fff";
                this.ctx.font = "14px monospace";
                this.drops.forEach((y, i) => {
                    this.ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 20, y * 20);
                    if(y * 20 > this.c.height && Math.random() > 0.98) this.drops[i] = 0;
                    this.drops[i]++;
                });
            }
        }

        /**
         * --- LIFECYCLE INITIALIZATION ---
         */
        window.onload = () => {
            new MatrixEngine().init();
            Architect.boot();

            // 12H Chronos Logic
            setInterval(() => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const p = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                document.getElementById('clock-face').innerText = `${h}:${m}`;
                document.getElementById('clock-ss').innerText = s;
                document.getElementById('clock-p').innerText = p;
            }, 1000);

            // Parallax Engine
            document.onmousemove = (e) => {
                const x = (window.innerWidth/2 - e.pageX)/100;
                const y = (window.innerHeight/2 - e.pageY)/100;
                document.getElementById('parallax-engine').style.transform = `translate(${x}px, ${y}px)`;
            };
        };
    </script>
</body>
</html>
