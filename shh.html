<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_v7.5_STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.6);
            --spotify: #1DB954;
            --bg-dark: #000000;
            --panel-bg: rgba(2, 2, 2, 0.99);
            --border-ui: rgba(255, 255, 255, 0.05);
            --danger: #ff3333;
            --accent-blue: #3b82f6;
            --matrix-color: rgba(168, 85, 247, 0.15);
        }

        /* --- FOUNDATION --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- VISUAL KERNEL LAYERS --- */
        canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        #matrix-canvas { z-index: 1; opacity: 0.3; }
        #nebula-canvas { z-index: 2; opacity: 0.5; transition: filter 1.5s ease; }
        
        .vignette {
            position: fixed; inset: 0; z-index: 5;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,1) 100%);
            pointer-events: none;
        }

        .crt-scanlines {
            position: fixed; inset: 0; z-index: 6;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none;
        }

        /* --- TELEMETRY SUITE --- */
        .telemetry-suite {
            position: fixed; top: 30px; left: 30px; z-index: 100;
            font-family: 'JetBrains Mono'; font-size: 8px; line-height: 2.2;
            color: rgba(255,255,255,0.15); text-transform: uppercase;
        }
        .tel-item { display: flex; align-items: center; gap: 15px; }
        .tel-label { width: 90px; color: var(--primary); font-weight: 800; letter-spacing: 0.1em; }
        .tel-progress { width: 110px; height: 1px; background: rgba(255,255,255,0.05); position: relative; }
        .tel-fill { height: 100%; background: var(--primary); transition: width 0.8s ease; box-shadow: 0 0 8px var(--primary); }

        /* --- EMERGENCY EXIT --- */
        .exit-controller { position: fixed; top: 30px; right: 30px; z-index: 2000; display: flex; align-items: center; gap: 15px; }
        .kill-switch {
            width: 50px; height: 50px; border: 1px solid var(--border-ui);
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .kill-switch:hover { border-color: var(--danger); transform: rotate(90deg); background: rgba(255, 51, 51, 0.05); }
        .kill-switch span { font-weight: 100; font-size: 20px; color: rgba(255,255,255,0.2); }

        #reboot-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.99); backdrop-filter: blur(60px);
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .reboot-box {
            text-align: center; max-width: 550px; padding: 70px;
            border: 1px solid var(--border-ui); background: #010101;
            box-shadow: 0 0 100px rgba(168, 85, 247, 0.1);
        }

        /* --- CHRONOS DISPLAY --- */
        .viewport-master {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            z-index: 10; transition: 0.3s ease-out; width: 100%;
        }
        .clock-chassis {
            background: rgba(255, 255, 255, 0.001); backdrop-filter: blur(25px) saturate(180%);
            padding: 90px 40px; border-top: 1px solid rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            display: inline-block; min-width: 100%;
        }
        #main-timer { 
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(6rem, 22vw, 28rem); 
            font-weight: 900; line-height: 0.8;
            letter-spacing: -0.05em; color: #fff;
            filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.05));
        }
        .sub-telemetry {
            display: flex; justify-content: center; align-items: center; gap: 60px;
            margin-top: 35px; font-family: 'JetBrains Mono'; 
            font-size: 9px; text-transform: uppercase;
            letter-spacing: 1.2em; color: var(--primary); opacity: 0.3;
        }

        /* --- MICRO MEDIA PLAYER --- */
        #media-uplink { 
            position: fixed; bottom: 30px; left: 30px; z-index: 100; 
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .media-card {
            background: rgba(4, 4, 4, 0.95); border: 1px solid var(--border-ui); padding: 14px 18px;
            backdrop-filter: blur(20px); display: flex; align-items: center; gap: 18px;
            border-left: 2px solid var(--spotify); width: 280px;
        }
        .media-art { width: 40px; height: 40px; border-radius: 1px; }
        .media-info { overflow: hidden; flex: 1; }
        .media-track { font-weight: 900; font-size: 10px; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .media-artist { font-size: 7px; color: var(--primary); text-transform: uppercase; margin-top: 3px; letter-spacing: 0.2em; opacity: 0.6; }
        .media-progress-bg { height: 1px; width: 100%; background: rgba(255,255,255,0.05); margin-top: 8px; }
        .media-progress-fill { height: 100%; background: var(--spotify); box-shadow: 0 0 5px var(--spotify); }

        /* --- KERNEL PANEL --- */
        .kernel-sidebar {
            position: fixed; top: 0; right: -500px; width: 500px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid var(--border-ui);
            z-index: 1000; transition: right 0.7s cubic-bezier(0.19, 1, 0.22, 1); padding: 90px 50px;
        }
        .kernel-sidebar.active { right: 0; }
        .os-btn { 
            background: rgba(255,255,255,0.01); border: 1px solid var(--border-ui); 
            padding: 18px; font-size: 9px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.4em; color: #fff; transition: 0.3s; width: 100%; text-align: center;
            display: block; margin-bottom: 12px;
        }
        .os-btn:hover { background: #fff; color: #000; }
        .os-btn.primary { border-color: var(--primary); color: var(--primary); }

        .ipc-terminal {
            height: 320px; background: rgba(0,0,0,0.8); border: 1px solid var(--border-ui);
            padding: 20px; font-family: 'JetBrains Mono'; font-size: 9px; overflow-y: auto; color: var(--primary); line-height: 2;
        }

        /* --- STATE TRANSITIONS --- */
        .sys-halt { opacity: 0 !important; transform: scale(0.9) !important; filter: blur(40px) !important; pointer-events: none; transition: 1.2s ease-in-out; }
    </style>
</head>
<body id="os-root">

    <canvas id="matrix-canvas"></canvas>
    <canvas id="nebula-canvas"></canvas>
    <div class="vignette"></div>
    <div class="crt-scanlines"></div>

    <div id="reboot-overlay">
        <div class="reboot-box">
            <div class="font-black text-[11px] tracking-[1.2em] text-red-500 mb-8 uppercase">Session_Suspended</div>
            <div class="font-mono text-[9px] text-white/30 leading-loose mb-12 uppercase tracking-[0.3em]">
                Core architecture v7.5 sequence halted.<br>
                Kernel state preserved in cache.<br>
                Uplink standby...
            </div>
            <button class="os-btn primary" onclick="Kernel.reboot()">Establish New Session</button>
        </div>
    </div>

    <div class="telemetry-suite" id="telemetry-node">
        <div class="tel-item"><span class="tel-label">CORE_VOLT</span> <div class="tel-progress"><div id="bar-cpu" class="tel-fill" style="width: 20%"></div></div></div>
        <div class="tel-item"><span class="tel-label">MEM_STACK</span> <div class="tel-progress"><div id="bar-mem" class="tel-fill" style="width: 45%"></div></div></div>
        <div class="tel-item"><span class="tel-label">NET_WAVE</span> <div class="tel-progress"><div id="bar-net" class="tel-fill" style="width: 12%"></div></div></div>
        <div class="tel-item"><span class="tel-label">ENTROPY</span> <div class="tel-progress"><div id="bar-ent" class="tel-fill" style="width: 60%"></div></div></div>
        <div class="tel-item mt-6"><span class="tel-label text-blue-400">ENCRYPTION</span> <span class="text-white">X-SEC_RSA_4096</span></div>
    </div>

    <div class="exit-controller">
        <div class="text-[8px] font-black tracking-[0.8em] text-white/10 uppercase mr-4">Node_X75</div>
        <button class="kill-switch" onclick="Kernel.terminate()"><span>✕</span></button>
    </div>

    <header class="fixed top-8 left-1/2 -translate-x-1/2 z-[500]" id="nav-node">
        <button class="os-btn !px-24" onclick="Kernel.togglePanel()">Kernel_Diagnostics</button>
    </header>

    <aside id="sidebar-node" class="kernel-sidebar">
        <div class="text-[9px] opacity-20 font-black tracking-[1em] mb-12 uppercase">Process_Manifest_v7.5</div>
        <div class="space-y-12">
            <section>
                <div class="grid grid-cols-2 gap-3">
                    <button class="os-btn" onclick="Chronos.setMode(12)">12H_BIT</button>
                    <button class="os-btn" onclick="Chronos.setMode(24)">24H_BIT</button>
                </div>
            </section>
            <section>
                <div class="text-[8px] opacity-20 font-black tracking-[0.5em] mb-6 uppercase">IPC_Stream_Output</div>
                <div id="ipc-logs" class="ipc-terminal">
                    <div>> [KERNEL] Boot sequence 100%</div>
                </div>
            </section>
            <section>
                <div class="text-[8px] opacity-20 font-black tracking-[0.5em] mb-6 uppercase">Environment</div>
                <button class="os-btn !text-red-500 !border-red-500/10" onclick="Kernel.terminate()">Forced_Calt_Stop</button>
            </section>
        </div>
    </aside>

    <main class="viewport-master" id="clock-node">
        <div class="clock-chassis">
            <div id="main-timer">00:00</div>
            <div class="sub-telemetry">
                <span class="font-black text-purple-400">CHRONOS_STABLE</span>
                <span id="sec-node" class="text-white">00</span>
                <span id="date-node">APR_11</span>
            </div>
        </div>
    </main>

    <div id="media-uplink"></div>

    <script>
        /**
         * ARCHITECT_OS // ADVANCED KERNEL ENGINE
         * Build: 7.5.2 // Line Count: 400+ for professional depth
         */

        const Kernel = {
            togglePanel: () => document.getElementById('sidebar-node').classList.toggle('active'),
            
            terminate: () => {
                Kernel.log("SYS", "Broadcasting SIGKILL to all processes.");
                const uiNodes = ['clock-node', 'media-uplink', 'nav-node', 'telemetry-node'];
                uiNodes.forEach(id => document.getElementById(id).classList.add('sys-halt'));
                
                document.getElementById('nebula-canvas').style.filter = 'brightness(0) blur(50px)';
                document.getElementById('matrix-canvas').style.opacity = '0';
                
                const modal = document.getElementById('reboot-overlay');
                modal.style.display = 'flex';
                setTimeout(() => { modal.style.opacity = '1'; }, 100);
            },

            reboot: () => {
                Kernel.log("SYS", "Warm reboot initialized.");
                window.location.reload();
            },

            log: (process, msg) => {
                const log = document.getElementById('ipc-logs');
                const entry = document.createElement('div');
                const timestamp = new Date().toTimeString().split(' ')[0];
                entry.innerHTML = `<span class="opacity-30">${timestamp}</span> [${process}] ${msg}`;
                log.prepend(entry);
                if(log.childNodes.length > 50) log.lastChild.remove();
            },

            telemetry: () => {
                const update = (id, factor) => {
                    document.getElementById(id).style.width = (Math.random() * factor + 10) + '%';
                };
                update('bar-cpu', 40);
                update('bar-mem', 20);
                update('bar-net', 60);
                update('bar-ent', 30);
                if(Math.random() > 0.8) Kernel.log("IPC", "Telemetry handshake successful.");
            }
        };

        const Chronos = {
            mode: 12,
            setMode: (m) => { 
                Chronos.mode = m; 
                Kernel.log("CLK", `Format re-mapped to ${m}-bit.`);
                Kernel.togglePanel();
            },
            tick: () => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                if (Chronos.mode === 12) h = h % 12 || 12;
                document.getElementById('main-timer').innerText = `${String(h).padStart(2, '0')}:${m}`;
                document.getElementById('sec-node').innerText = s;
                const month = now.toLocaleString('en-us', { month: 'short' }).toUpperCase();
                document.getElementById('date-node').innerText = `${month}_${now.getDate()}`;
            }
        };

        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/shh.html',

            updateUI: (isConnected, data = null) => {
                const container = document.getElementById('media-uplink');
                if (!isConnected) {
                    container.innerHTML = `<button class="os-btn !text-green-500 !border-green-500/10 !p-2 !text-[7px]" onclick="Spotify.auth()">LINK_MEDIA_STREAM</button>`;
                    return;
                }
                if (data && data.item) {
                    const prog = (data.progress_ms / data.item.duration_ms) * 100;
                    container.innerHTML = `
                        <div class="media-card animate-[fadeIn_0.5s]">
                            <img class="media-art" src="${data.item.album.images[0].url}">
                            <div class="media-info">
                                <div class="media-track">${data.item.name}</div>
                                <div class="media-artist">${data.item.artists[0].name}</div>
                                <div class="media-progress-bg"><div class="media-progress-fill" style="width: ${prog}%"></div></div>
                            </div>
                        </div>`;
                }
            },

            auth: async () => {
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(hashed))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                localStorage.setItem('code_verifier', verifier);
                const params = new URLSearchParams({ response_type: 'code', client_id: Spotify.clientId, scope: 'user-read-currently-playing', redirect_uri: Spotify.redirectUri, code_challenge_method: 'S256', code_challenge: challenge });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            },

            sync: async () => {
                const token = localStorage.getItem('sp_access_token');
                if (!token) return Spotify.updateUI(false);
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (res.status === 200) Spotify.updateUI(true, await res.json());
                    else if (res.status === 401) Spotify.updateUI(false);
                } catch (e) { Kernel.log("ERR", "Media signal dropped."); }
            }
        };

        const Nebula = {
            canvas: null, ctx: null, points: [],
            init: () => {
                Nebula.canvas = document.getElementById('nebula-canvas');
                Nebula.ctx = Nebula.canvas.getContext('2d');
                Nebula.resize();
                window.addEventListener('resize', Nebula.resize);
                for (let i = 0; i < 100; i++) Nebula.points.push({
                    x: Math.random() * Nebula.canvas.width,
                    y: Math.random() * Nebula.canvas.height,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    r: Math.random() * 1.5
                });
                Nebula.animate();
            },
            resize: () => { Nebula.canvas.width = window.innerWidth; Nebula.canvas.height = window.innerHeight; },
            animate: () => {
                Nebula.ctx.clearRect(0, 0, Nebula.canvas.width, Nebula.canvas.height);
                Nebula.points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > Nebula.canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > Nebula.canvas.height) p.vy *= -1;
                    Nebula.ctx.fillStyle = "rgba(168, 85, 247, 0.3)";
                    Nebula.ctx.beginPath(); Nebula.ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); Nebula.ctx.fill();
                });
                Nebula.connections();
                requestAnimationFrame(Nebula.animate);
            },
            connections: () => {
                for (let i = 0; i < Nebula.points.length; i++) {
                    for (let j = i; j < Nebula.points.length; j++) {
                        let dx = Nebula.points[i].x - Nebula.points[j].x;
                        let dy = Nebula.points[i].y - Nebula.points[j].y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 150) {
                            Nebula.ctx.strokeStyle = `rgba(168, 85, 247, ${0.1 - dist/1500})`;
                            Nebula.ctx.lineWidth = 0.5;
                            Nebula.ctx.beginPath(); Nebula.ctx.moveTo(Nebula.points[i].x, Nebula.points[i].y);
                            Nebula.ctx.lineTo(Nebula.points[j].x, Nebula.points[j].y);
                            Nebula.ctx.stroke();
                        }
                    }
                }
            }
        };

        const Matrix = {
            canvas: null, ctx: null, columns: 0, drops: [],
            init: () => {
                Matrix.canvas = document.getElementById('matrix-canvas');
                Matrix.ctx = Matrix.canvas.getContext('2d');
                Matrix.resize();
                window.addEventListener('resize', Matrix.resize);
                setInterval(Matrix.draw, 50);
            },
            resize: () => {
                Matrix.canvas.width = window.innerWidth;
                Matrix.canvas.height = window.innerHeight;
                Matrix.columns = Math.floor(Matrix.canvas.width / 20);
                Matrix.drops = Array(Matrix.columns).fill(1);
            },
            draw: () => {
                Matrix.ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                Matrix.ctx.fillRect(0, 0, Matrix.canvas.width, Matrix.canvas.height);
                Matrix.ctx.fillStyle = "rgba(168, 85, 247, 0.2)";
                Matrix.ctx.font = "10px monospace";
                for (let i = 0; i < Matrix.drops.length; i++) {
                    const text = Math.random() > 0.5 ? "1" : "0";
                    Matrix.ctx.fillText(text, i * 20, Matrix.drops[i] * 20);
                    if (Matrix.drops[i] * 20 > Matrix.canvas.height && Math.random() > 0.975) Matrix.drops[i] = 0;
                    Matrix.drops[i]++;
                }
            }
        };

        /* --- BOOT LOADER --- */
        window.onload = () => {
            Nebula.init();
            Matrix.init();
            setInterval(Chronos.tick, 1000);
            setInterval(Spotify.sync, 4000);
            setInterval(Kernel.telemetry, 2000);
            Spotify.sync();
            Kernel.log("SYS", "All systems nominal. Environment v7.5 initialized.");
        };

        document.onmousemove = (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 100;
            const y = (window.innerHeight / 2 - e.pageY) / 100;
            document.getElementById('clock-node').style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotateY(${x}deg) rotateX(${-y}deg)`;
        };
    </script>
</body>
</html>
