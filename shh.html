<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_ULTIMATE_v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.4);
            --spotify: #1DB954;
            --bg-dark: #030303;
            --panel-bg: rgba(7, 7, 7, 0.96);
            --border-ui: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6;
            --terminal-text: #a855f7;
        }

        /* --- CORE RESET & SCROLLBAR --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- BACKGROUND ENGINE --- */
        #entropy-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.15; pointer-events: none; }
        .os-grid { 
            position: fixed; inset: 0; z-index: 1; 
            background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px); 
            background-size: 60px 60px; pointer-events: none; 
        }
        .vignette {
            position: fixed; inset: 0; z-index: 2;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* --- CLOCK ARCHITECTURE --- */
        .clock-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 10;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .clock-plate {
            background: rgba(255,255,255,0.02);
            padding: 40px 100px; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        #main-time { 
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(8rem, 20vw, 22rem); 
            font-weight: 900; line-height: 0.75;
            letter-spacing: -0.05em; color: #fff;
            filter: drop-shadow(0 0 50px rgba(168, 85, 247, 0.2));
        }
        .clock-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 30px; font-family: 'JetBrains Mono'; 
            font-size: 14px; text-transform: uppercase;
            letter-spacing: 0.5em; color: var(--primary);
        }

        /* --- SPOTIFY DYNAMIC NODE --- */
        #spotify-node {
            position: fixed; bottom: 50px; left: 50px;
            z-index: 100; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .sp-glass {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--border-ui);
            padding: 24px; border-radius: 2px;
            backdrop-filter: blur(30px);
            display: flex; align-items: center; gap: 24px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            border-bottom: 3px solid var(--spotify);
        }
        .sp-art-container { position: relative; width: 70px; height: 70px; overflow: hidden; }
        .sp-art-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .sp-info { width: 280px; }
        .sp-track { font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: #fff; truncate: true; }
        .sp-artist { font-size: 10px; font-weight: 400; color: var(--primary); text-transform: uppercase; margin-top: 4px; }
        
        .progress-rail { height: 2px; width: 100%; background: rgba(255,255,255,0.05); margin-top: 15px; position: relative; }
        .progress-fill { height: 100%; background: var(--spotify); transition: width 1s linear; box-shadow: 0 0 10px var(--spotify); }

        /* --- REACTIVE ANIMATIONS --- */
        .track-enter { animation: slideUpFade 0.7s forwards; }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- SIDEBAR SYSTEM --- */
        .side-panel {
            position: fixed; top: 0; right: -500px;
            width: 500px; height: 100%;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-ui);
            z-index: 1000; transition: right 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 100px 60px;
        }
        .side-panel.active { right: 0; }
        
        .module-header { font-size: 10px; font-weight: 900; letter-spacing: 0.5em; color: rgba(255,255,255,0.2); margin-bottom: 40px; text-transform: uppercase; border-bottom: 1px solid var(--border-ui); padding-bottom: 10px; }
        .os-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border-ui); padding: 18px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: #fff; transition: 0.3s; text-align: center; display: block; width: 100%; margin-bottom: 10px; }
        .os-btn:hover { background: #fff; color: #000; border-color: #fff; }
        
        /* --- TERMINAL --- */
        .terminal-box {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-ui);
            height: 250px; padding: 20px; overflow-y: auto;
            font-family: 'JetBrains Mono'; font-size: 9px; line-height: 1.6;
            color: var(--terminal-text);
        }

        /* --- TELEMETRY --- */
        .telemetry { position: fixed; top: 50px; left: 50px; z-index: 100; font-family: 'JetBrains Mono'; font-size: 10px; color: rgba(255,255,255,0.3); }
        .tel-item { margin-bottom: 8px; border-left: 2px solid var(--primary); padding-left: 12px; }
    </style>
</head>
<body>

    <canvas id="entropy-canvas"></canvas>
    <div class="os-grid"></div>
    <div class="vignette"></div>

    <div class="telemetry">
        <div class="tel-item">SYS_STAT: <span class="text-white">OPTIMIZED</span></div>
        <div class="tel-item">UPLINK: <span id="tel-uplink" class="text-purple-500">STABLE</span></div>
        <div class="tel-item">LATENCY: <span id="tel-ping" class="text-white">24ms</span></div>
        <div class="tel-item">MEM_USAGE: <span id="tel-mem" class="text-white">14%</span></div>
    </div>

    <header class="fixed top-12 right-12 z-[100]">
        <button class="os-btn !px-12" onclick="OS.togglePanel()">Terminal</button>
    </header>

    <aside id="osPanel" class="side-panel">
        <div class="module-header">Core_Settings</div>
        
        <div class="space-y-12">
            <section>
                <div class="grid grid-cols-2 gap-4">
                    <button class="os-btn" onclick="Clock.setMode(12)">12_HR</button>
                    <button class="os-btn" onclick="Clock.setMode(24)">24_HR</button>
                </div>
            </section>

            <section>
                <div class="module-header">Audio_Interface</div>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <button class="os-btn !p-4" onclick="Spotify.command('previous')">PREV</button>
                    <button class="os-btn !p-4" onclick="Spotify.command('play')">PLAY</button>
                    <button class="os-btn !p-4" onclick="Spotify.command('next')">NEXT</button>
                </div>
                <button class="os-btn !border-dashed !text-purple-500" onclick="Spotify.auth()">Secure_Authentication</button>
            </section>

            <section>
                <div class="module-header">Live_Kernel_Output</div>
                <div class="terminal-box" id="sys-log">
                    <div class="opacity-40">> [BOOT] Architect.OS initialized...</div>
                </div>
            </section>
        </div>
    </aside>

    <main class="clock-center">
        <div class="clock-plate">
            <div id="main-time">00:00</div>
            <div class="clock-meta">
                <span>LOCAL_CHRONOS</span>
                <span id="sec-hex" class="text-purple-500">00</span>
                <span id="tel-date">APR_11</span>
            </div>
        </div>
    </main>

    <div id="spotify-node"></div>

    <script>
        /**
         * Architect.OS Core Logic
         * High-Performance Handshake & UI Synchronization
         */
        
        let lastTrackId = null;

        const OS = {
            togglePanel: () => document.getElementById('osPanel').classList.toggle('active'),
            log: (tag, msg) => {
                const log = document.getElementById('sys-log');
                const div = document.createElement('div');
                div.innerHTML = `<span class="opacity-30">${new Date().toLocaleTimeString()}</span> <span class="text-white">[${tag}]</span> ${msg}`;
                log.prepend(div);
            },
            updateTelemetry: () => {
                document.getElementById('tel-ping').innerText = Math.floor(Math.random() * 20 + 10) + 'ms';
                document.getElementById('tel-mem').innerText = Math.floor(Math.random() * 5 + 10) + '%';
            }
        };

        const Clock = {
            mode: 12,
            setMode: (m) => {
                Clock.mode = m;
                OS.log("SYS", `Clock mode set to ${m}H`);
            },
            tick: () => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                
                if (Clock.mode === 12) h = h % 12 || 12;
                
                document.getElementById('main-time').innerText = `${String(h).padStart(2, '0')}:${m}`;
                document.getElementById('sec-hex').innerText = s;
                
                const day = now.getDate();
                const month = now.toLocaleString('en-us', { month: 'short' }).toUpperCase();
                document.getElementById('tel-date').innerText = `${month}_${day}`;
            }
        };

        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/shh.html',

            updateUI: (isConnected, data = null) => {
                const node = document.getElementById('spotify-node');
                const uplink = document.getElementById('tel-uplink');

                if (!isConnected) {
                    node.innerHTML = `
                        <div class="sp-glass cursor-pointer" onclick="Spotify.auth()">
                            <div class="text-[10px] font-black tracking-widest text-green-500">INITIATE_UPLINK</div>
                        </div>`;
                    uplink.innerText = "STANDBY";
                    uplink.style.color = "#555";
                    return;
                }

                if (data && data.item) {
                    const isNew = data.item.id !== lastTrackId;
                    const prog = (data.progress_ms / data.item.duration_ms) * 100;
                    
                    node.innerHTML = `
                        <div class="sp-glass ${isNew ? 'track-enter' : ''}">
                            <div class="sp-art-container">
                                <img class="sp-art-img" src="${data.item.album.images[0].url}">
                            </div>
                            <div class="sp-info">
                                <div class="sp-track truncate">${data.item.name}</div>
                                <div class="sp-artist">${data.item.artists[0].name}</div>
                                <div class="progress-rail">
                                    <div class="progress-fill" style="width: ${prog}%"></div>
                                </div>
                            </div>
                        </div>`;

                    if (isNew) {
                        lastTrackId = data.item.id;
                        OS.log("AUDIO", `Streaming: ${data.item.name}`);
                    }
                    uplink.innerText = "CONNECTED";
                    uplink.style.color = "#a855f7";
                } else {
                    node.innerHTML = `
                        <div class="sp-glass opacity-40">
                            <div class="text-[10px] font-black tracking-widest">IDLE_SIGNAL</div>
                        </div>`;
                    uplink.innerText = "STABLE";
                }
            },

            auth: async () => {
                OS.log("AUTH", "Generating PKCE Challenge...");
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64)))
                    .map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
                
                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(hashed)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                
                localStorage.setItem('code_verifier', verifier);
                
                const params = new URLSearchParams({
                    response_type: 'code',
                    client_id: Spotify.clientId,
                    scope: 'user-read-currently-playing user-modify-playback-state user-read-playback-state',
                    redirect_uri: Spotify.redirectUri,
                    code_challenge_method: 'S256',
                    code_challenge: challenge
                });

                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            },

            getToken: async (code) => {
                OS.log("AUTH", "Exchanging Auth Code...");
                const verifier = localStorage.getItem('code_verifier');
                
                try {
                    const response = await fetch('https://accounts.spotify.com/api/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: Spotify.redirectUri,
                            client_id: Spotify.clientId,
                            code_verifier: verifier
                        })
                    });

                    const data = await response.json();
                    if (data.access_token) {
                        localStorage.setItem('sp_access_token', data.access_token);
                        OS.log("AUTH", "Uplink Secure.");
                        window.history.replaceState({}, document.title, window.location.pathname);
                        Spotify.sync();
                    }
                } catch (e) {
                    OS.log("ERR", "Handshake Failed.");
                }
            },

            sync: async () => {
                const token = localStorage.getItem('sp_access_token');
                if (!token) return Spotify.updateUI(false);

                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (res.status === 200) {
                        Spotify.updateUI(true, await res.json());
                    } else if (res.status === 401) {
                        OS.log("AUTH", "Session Expired.");
                        Spotify.updateUI(false);
                    } else {
                        Spotify.updateUI(true, null);
                    }
                } catch (e) {
                    console.error(e);
                }
            },

            command: async (type) => {
                const token = localStorage.getItem('sp_access_token');
                if (!token) return;
                
                OS.log("MEDIA", `CMD: ${type.toUpperCase()}`);
                const method = (type === 'next' || type === 'previous') ? 'POST' : 'PUT';
                const endpoint = type === 'play' ? 'play' : (type === 'pause' ? 'pause' : type);
                
                try {
                    await fetch(`https://api.spotify.com/v1/me/player/${endpoint}`, {
                        method: method,
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    setTimeout(Spotify.sync, 400);
                } catch(e) {
                    OS.log("ERR", "Cmd Failed.");
                }
            }
        };

        /* --- VISUALIZER ENGINE --- */
        const Visualizer = {
            init: () => {
                const c = document.getElementById('entropy-canvas'), ctx = c.getContext('2d');
                c.width = window.innerWidth; c.height = window.innerHeight;
                
                const symbols = "0123456789ABCDEF<>[]{}+-*";
                const fontSize = 14;
                const columns = c.width / fontSize;
                const drops = Array(Math.floor(columns)).fill(1);

                const draw = () => {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.fillRect(0, 0, c.width, c.height);
                    ctx.fillStyle = "#a855f7";
                    ctx.font = fontSize + "px 'JetBrains Mono'";

                    for (let i = 0; i < drops.length; i++) {
                        const text = symbols.charAt(Math.floor(Math.random() * symbols.length));
                        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                        if (drops[i] * fontSize > c.height && Math.random() > 0.975) {
                            drops[i] = 0;
                        }
                        drops[i]++;
                    }
                };
                setInterval(draw, 50);
            }
        };

        /* --- BOOT SEQUENCE --- */
        window.onload = () => {
            Visualizer.init();
            
            // Core Loops
            setInterval(Clock.tick, 1000);
            setInterval(Spotify.sync, 3000);
            setInterval(OS.updateTelemetry, 2000);

            // Auth Callback Check
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                Spotify.getToken(code);
            } else {
                Spotify.sync();
            }

            // Keyboard Shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 't') OS.togglePanel();
            });

            OS.log("SYS", "Kernel Stable.");
        };

        // Reactive Mouse Parallax
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            document.querySelector('.clock-center').style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotateY(${x/2}deg) rotateX(${-y/2}deg)`;
        });

    </script>
</body>
</html>
