<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_NEURAL_v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.5);
            --spotify: #1DB954;
            --bg-dark: #020202;
            --panel-bg: rgba(6, 6, 6, 0.94);
            --border-ui: rgba(255, 255, 255, 0.07);
        }

        /* --- SYSTEM CORE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- NEURAL NEBULA BACKGROUND --- */
        #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .vignette {
            position: fixed; inset: 0; z-index: 2;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.95) 100%);
            pointer-events: none;
        }
        .scanlines {
            position: fixed; inset: 0; z-index: 3;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* --- GHOST CLOCK ARCHITECTURE --- */
        .clock-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 10;
            transition: transform 0.1s ease-out;
            width: 100%;
        }
        
        .clock-glass {
            background: rgba(255, 255, 255, 0.005); 
            backdrop-filter: blur(15px) saturate(150%);
            padding: 80px 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: inline-block;
            min-width: 100%;
        }

        #main-time { 
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(12rem, 28vw, 34rem); 
            font-weight: 900; line-height: 0.75;
            letter-spacing: -0.07em; color: #fff;
            text-shadow: 4px 4px 0px rgba(168, 85, 247, 0.15);
        }

        .clock-sub {
            display: flex; justify-content: center; align-items: center; gap: 60px;
            margin-top: 40px; font-family: 'JetBrains Mono'; 
            font-size: 12px; text-transform: uppercase;
            letter-spacing: 1em; color: var(--primary);
        }

        /* --- SPOTIFY UPLINK MODULE --- */
        #spotify-node {
            position: fixed; bottom: 50px; left: 50px;
            z-index: 100; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sp-module {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-ui);
            padding: 24px 30px;
            backdrop-filter: blur(30px);
            display: flex; align-items: center; gap: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border-left: 3px solid var(--spotify);
        }
        .sp-art { width: 64px; height: 64px; border-radius: 1px; filter: grayscale(0.2); transition: 0.5s; }
        .sp-art:hover { filter: grayscale(0); transform: scale(1.05); }
        .sp-meta { width: 280px; }
        .sp-track { font-weight: 900; font-size: 14px; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-artist { font-size: 9px; color: var(--primary); text-transform: uppercase; margin-top: 5px; letter-spacing: 0.3em; }
        
        .progress-bar { height: 1px; width: 100%; background: rgba(255,255,255,0.06); margin-top: 20px; overflow: visible; }
        .progress-fill { height: 100%; background: var(--spotify); transition: width 1s linear; box-shadow: 0 0 10px var(--spotify); position: relative; }
        .progress-fill::after { content: ''; position: absolute; right: 0; top: -2px; width: 5px; height: 5px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; }

        /* --- SIDEBAR SYSTEM --- */
        .side-panel {
            position: fixed; top: 0; right: -600px;
            width: 600px; height: 100%;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-ui);
            z-index: 1000; transition: right 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 120px 80px;
        }
        .side-panel.active { right: 0; }
        .os-btn { 
            background: rgba(255,255,255,0.01); border: 1px solid var(--border-ui); 
            padding: 22px; font-size: 10px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.4em; color: #fff; transition: 0.3s; width: 100%; text-align: center;
        }
        .os-btn:hover { background: #fff; color: #000; border-color: #fff; transform: translateY(-2px); }

        /* --- TELEMETRY --- */
        .telemetry { position: fixed; top: 50px; left: 50px; z-index: 100; font-family: 'JetBrains Mono'; font-size: 9px; color: rgba(255,255,255,0.2); }
        .tel-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .tel-bar { width: 100px; height: 2px; background: rgba(255,255,255,0.05); }
        .tel-fill { height: 100%; background: var(--primary); transition: width 0.5s; }

        .terminal {
            height: 350px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-ui);
            padding: 25px; font-family: 'JetBrains Mono'; font-size: 9px; overflow-y: auto; color: var(--primary); line-height: 1.8;
        }

        /* --- ANIMATIONS --- */
        @keyframes trackSwitch {
            0% { opacity: 0; transform: translateX(-20px) skewX(-10deg); }
            100% { opacity: 1; transform: translateX(0) skewX(0deg); }
        }
        .new-track { animation: trackSwitch 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>
    <div class="scanlines"></div>

    <div class="telemetry">
        <div class="tel-row">CPU_THREAD_A <div class="tel-bar"><div id="cpu-a" class="tel-fill" style="width: 45%"></div></div></div>
        <div class="tel-row">CPU_THREAD_B <div class="tel-bar"><div id="cpu-b" class="tel-fill" style="width: 22%"></div></div></div>
        <div class="tel-row">UPLINK_STRENGTH <div class="tel-bar"><div class="tel-fill" style="width: 98%"></div></div></div>
        <div class="tel-row mt-6 opacity-50">NODE_ID: ARCH-77-X</div>
    </div>

    <header class="fixed top-12 right-12 z-[500]">
        <button class="os-btn !px-16" onclick="OS.togglePanel()">System_Menu</button>
    </header>

    <aside id="osPanel" class="side-panel">
        <div class="text-[10px] opacity-20 font-black tracking-[1em] mb-12 uppercase">Kernel_Core</div>
        
        <div class="space-y-16">
            <section>
                <div class="grid grid-cols-2 gap-4">
                    <button class="os-btn" onclick="Clock.setMode(12)">12_HOUR</button>
                    <button class="os-btn" onclick="Clock.setMode(24)">24_HOUR</button>
                </div>
            </section>

            <section>
                <div class="text-[9px] opacity-20 font-black tracking-[0.5em] mb-6 uppercase">Audio_Stream</div>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <button class="os-btn !p-4" onclick="Spotify.command('previous')">PREV</button>
                    <button class="os-btn !p-4" onclick="Spotify.command('play')">PLAY</button>
                    <button class="os-btn !p-4" onclick="Spotify.command('next')">NEXT</button>
                </div>
                <button class="os-btn !border-dashed !text-purple-500" onclick="Spotify.auth()">RE-LINK_UPLINK</button>
            </section>

            <section>
                <div class="terminal" id="sys-log">
                    <div>> [READY] Architect Virtual Environment v6.0.2</div>
                </div>
            </section>
        </div>
    </aside>

    <main class="clock-center" id="parallax-wrap">
        <div class="clock-glass">
            <div id="main-time">00:00</div>
            <div class="clock-sub">
                <span>SYSTEM_TIME</span>
                <span id="sec-hex" class="font-black">00</span>
                <span id="tel-date">APR_11</span>
            </div>
        </div>
    </main>

    <div id="spotify-node"></div>

    <script>
        /**
         * ARCHITECT_OS // KERNEL LOGIC
         * Optimized for aesthetic responsiveness and PKCE security
         */

        let lastTrackId = null;

        const OS = {
            togglePanel: () => document.getElementById('osPanel').classList.toggle('active'),
            log: (tag, msg) => {
                const log = document.getElementById('sys-log');
                const div = document.createElement('div');
                div.innerHTML = `<span class="opacity-20">${new Date().toLocaleTimeString()}</span> [${tag}] ${msg}`;
                log.prepend(div);
            },
            updateCPU: () => {
                document.getElementById('cpu-a').style.width = Math.floor(Math.random() * 30 + 20) + '%';
                document.getElementById('cpu-b').style.width = Math.floor(Math.random() * 40 + 10) + '%';
            }
        };

        const Clock = {
            mode: 12,
            setMode: (m) => Clock.mode = m,
            tick: () => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                if (Clock.mode === 12) h = h % 12 || 12;
                document.getElementById('main-time').innerText = `${String(h).padStart(2, '0')}:${m}`;
                document.getElementById('sec-hex').innerText = s;
                const month = now.toLocaleString('en-us', { month: 'short' }).toUpperCase();
                document.getElementById('tel-date').innerText = `${month}_${now.getDate()}`;
            }
        };

        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/shh.html',

            updateUI: (isConnected, data = null) => {
                const node = document.getElementById('spotify-node');
                if (!isConnected) {
                    node.innerHTML = `<button class="os-btn !text-green-500 !border-green-500/20" onclick="Spotify.auth()">ESTABLISH_UPLINK</button>`;
                    return;
                }
                if (data && data.item) {
                    const isNew = data.item.id !== lastTrackId;
                    const prog = (data.progress_ms / data.item.duration_ms) * 100;
                    node.innerHTML = `
                        <div class="sp-module ${isNew ? 'new-track' : ''}">
                            <img class="sp-art" src="${data.item.album.images[0].url}">
                            <div class="sp-meta">
                                <div class="sp-track">${data.item.name}</div>
                                <div class="sp-artist">${data.item.artists[0].name}</div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${prog}%"></div></div>
                            </div>
                        </div>`;
                    if (isNew) { lastTrackId = data.item.id; OS.log("SYNC", `Uplink: ${data.item.name}`); }
                } else {
                    node.innerHTML = `<div class="sp-module opacity-30"><div class="text-[10px] font-black uppercase tracking-widest">Awaiting_Stream</div></div>`;
                }
            },

            auth: async () => {
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(hashed))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                localStorage.setItem('code_verifier', verifier);
                const params = new URLSearchParams({ response_type: 'code', client_id: Spotify.clientId, scope: 'user-read-currently-playing user-modify-playback-state user-read-playback-state', redirect_uri: Spotify.redirectUri, code_challenge_method: 'S256', code_challenge: challenge });
                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            },

            getToken: async (code) => {
                const verifier = localStorage.getItem('code_verifier');
                const response = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ grant_type: 'authorization_code', code, redirect_uri: Spotify.redirectUri, client_id: Spotify.clientId, code_verifier: verifier }) });
                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('sp_access_token', data.access_token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    Spotify.sync();
                }
            },

            sync: async () => {
                const token = localStorage.getItem('sp_access_token');
                if (!token) return Spotify.updateUI(false);
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (res.status === 200) Spotify.updateUI(true, await res.json());
                    else if (res.status === 401) Spotify.updateUI(false);
                    else Spotify.updateUI(true, null);
                } catch (e) { console.error("Signal Lost"); }
            },

            command: async (type) => {
                const token = localStorage.getItem('sp_access_token');
                if (!token) return;
                const method = (type === 'next' || type === 'previous') ? 'POST' : 'PUT';
                await fetch(`https://api.spotify.com/v1/me/player/${type === 'play' ? 'play' : (type === 'pause' ? 'pause' : type)}`, { method: method, headers: { 'Authorization': `Bearer ${token}` } });
                setTimeout(Spotify.sync, 500);
            }
        };

        /**
         * NEURAL NEBULA VISUALIZER
         * Kinetic particle system with mouse-reactive vectors
         */
        const Nebula = {
            canvas: null, ctx: null, particles: [], mouse: { x: 0, y: 0 },
            init: () => {
                Nebula.canvas = document.getElementById('bg-canvas');
                Nebula.ctx = Nebula.canvas.getContext('2d');
                Nebula.resize();
                window.onresize = Nebula.resize;
                for (let i = 0; i < 150; i++) Nebula.particles.push(new Nebula.Particle());
                Nebula.animate();
            },
            resize: () => { Nebula.canvas.width = window.innerWidth; Nebula.canvas.height = window.innerHeight; },
            Particle: function() {
                this.x = Math.random() * Nebula.canvas.width;
                this.y = Math.random() * Nebula.canvas.height;
                this.size = Math.random() * 2;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.update = () => {
                    this.x += this.vx; this.y += this.vy;
                    if (this.x < 0 || this.x > Nebula.canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > Nebula.canvas.height) this.vy *= -1;
                    let dx = Nebula.mouse.x - this.x; let dy = Nebula.mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 200) { this.x -= dx/100; this.y -= dy/100; }
                };
                this.draw = () => {
                    Nebula.ctx.fillStyle = "rgba(168, 85, 247, 0.4)";
                    Nebula.ctx.beginPath(); Nebula.ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); Nebula.ctx.fill();
                };
            },
            animate: () => {
                Nebula.ctx.clearRect(0,0,Nebula.canvas.width, Nebula.canvas.height);
                Nebula.particles.forEach(p => { p.update(); p.draw(); });
                Nebula.animateLines();
                requestAnimationFrame(Nebula.animate);
            },
            animateLines: () => {
                for (let i = 0; i < Nebula.particles.length; i++) {
                    for (let j = i; j < Nebula.particles.length; j++) {
                        let dx = Nebula.particles[i].x - Nebula.particles[j].x;
                        let dy = Nebula.particles[i].y - Nebula.particles[j].y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 100) {
                            Nebula.ctx.strokeStyle = `rgba(168, 85, 247, ${1 - dist/100})`;
                            Nebula.ctx.lineWidth = 0.5;
                            Nebula.ctx.beginPath(); Nebula.ctx.moveTo(Nebula.particles[i].x, Nebula.particles[i].y);
                            Nebula.ctx.lineTo(Nebula.particles[j].x, Nebula.particles[j].y);
                            Nebula.ctx.stroke();
                        }
                    }
                }
            }
        };

        window.onload = () => {
            Nebula.init();
            setInterval(Clock.tick, 1000);
            setInterval(Spotify.sync, 4000);
            setInterval(OS.updateCPU, 2000);
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) Spotify.getToken(code); else Spotify.sync();
        };

        document.onmousemove = (e) => {
            Nebula.mouse.x = e.clientX; Nebula.mouse.y = e.clientY;
            const x = (window.innerWidth / 2 - e.pageX) / 80;
            const y = (window.innerHeight / 2 - e.pageY) / 80;
            document.getElementById('parallax-wrap').style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotateY(${x}deg) rotateX(${-y}deg)`;
        };
    </script>
</body>
</html>
