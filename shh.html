<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_v84.0_OMNI_SPEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;900&family=Inter:wght@100;400;900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff; --primary-glow: rgba(255, 255, 255, 0.45);
            --spotify: #1DB954; --bg-dark: #000000; --panel-bg: rgba(2, 2, 2, 0.99);
            --border-ui: rgba(255, 255, 255, 0.09); --font-mono: 'JetBrains Mono', monospace;
            --transition-core: 0.85s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; user-select: none; }
        ::-webkit-scrollbar { width: 3px; background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        body, html { width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: relative; }

        /* KERNEL LAYERS */
        canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .vignette-engine { position: fixed; inset: 0; z-index: 5; background: radial-gradient(circle at center, transparent 10%, rgba(0,0,0,1) 130%); pointer-events: none; }
        .crt-interference { position: fixed; inset: 0; z-index: 6; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; pointer-events: none; opacity: 0.5; animation: flicker 0.15s infinite; }
        
        @keyframes flicker { 
            0% { opacity: 0.48; } 50% { opacity: 0.52; } 100% { opacity: 0.49; } 
        }

        /* HEADER & UI */
        .os-header { position: fixed; top: 45px; left: 55px; right: 55px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 1000; }
        .sys-info { border-left: 3px solid var(--primary); padding-left: 25px; transition: var(--transition-core); }
        .sys-title { font-size: 11px; font-weight: 900; letter-spacing: 0.9em; text-transform: uppercase; color: var(--primary); text-shadow: 0 0 25px var(--primary-glow); }
        .sys-status { font-family: var(--font-mono); font-size: 8px; text-transform: uppercase; letter-spacing: 0.4em; color: rgba(255,255,255,0.3); margin-top: 8px; }

        /* NEXUS PANEL */
        .nexus-panel { position: fixed; top: 0; right: -680px; width: 680px; height: 100%; background: var(--panel-bg); border-left: 1px solid var(--border-ui); z-index: 2000; transition: right var(--transition-core); padding: 110px 70px; backdrop-filter: blur(90px); display: flex; flex-direction: column; }
        .nexus-panel.active { right: 0; }
        .sys-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border-ui); padding: 24px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5em; color: #fff; transition: 0.4s; width: 100%; text-align: center; margin-bottom: 15px; position: relative; overflow: hidden; }
        .sys-btn:hover, .sys-btn.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 40px var(--primary-glow); }

        /* CLOCK & MAIN */
        .chronos-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; width: 100%; pointer-events: none; }
        #clock-face { font-family: 'Montserrat', sans-serif; font-size: clamp(8rem, 22vw, 28rem); font-weight: 900; line-height: 0.75; letter-spacing: -0.07em; color: var(--primary); filter: drop-shadow(0 0 50px var(--primary-glow)); transition: var(--transition-core); }
        #clock-ss { font-size: clamp(2rem, 6vw, 9rem); font-weight: 100; opacity: 0.2; color: #fff; margin-left: 20px; }

        /* TERMINAL */
        #terminal-manifest { height: 500px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-ui); padding: 25px; font-family: var(--font-mono); font-size: 9px; color: var(--primary); overflow-y: auto; line-height: 2.2; scroll-behavior: smooth; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; gap: 10px; }
        .log-tag { color: var(--spotify); font-weight: 800; }
    </style>
</head>
<body id="kernel-root">
    <canvas id="matrix-canvas"></canvas>
    <div class="vignette-engine"></div>
    <div class="crt-interference"></div>

    <header class="os-header">
        <div class="sys-info">
            <div class="sys-title">ARCHITECT_OS // v84.0</div>
            <div class="sys-status" id="status-label">UPLINK: ACTIVE // ENCRYPTED_HANDSHAKE</div>
        </div>
        <button class="sys-btn !w-56 !mb-0" onclick="Kernel.toggleNexus()">Nexus_Gateway</button>
    </header>

    <aside id="nexus-ui" class="nexus-panel">
        <div class="text-[11px] font-black tracking-[1.3em] mb-14 uppercase opacity-20">Configuration_Nexus</div>
        <div class="flex-1 overflow-y-auto pr-4 space-y-16">
            <section>
                <div class="text-[9px] font-black tracking-[0.5em] mb-8 uppercase text-white/30">System_Uplink</div>
                <button class="sys-btn !text-green-500 !border-green-500/20" onclick="Spotify.auth()">Link_Spotify_PKCE</button>
            </section>
            <section>
                <div class="text-[9px] font-black tracking-[0.5em] mb-8 uppercase text-white/30">Kernel_Terminal_Manifest</div>
                <div id="terminal-manifest"></div>
            </section>
        </div>
        <button class="sys-btn !text-red-500 !border-red-500/10 mt-12" onclick="location.reload()">Reset_System_Cache</button>
    </aside>

    <main class="chronos-wrapper" id="chronos-ui">
        <div class="flex items-baseline justify-center">
            <span id="clock-face">00:00</span>
            <span id="clock-ss">00</span>
        </div>
    </main>

    <script>
        // ARCHITECT_OS KERNEL CORE
        const ARCHITECT_CONFIG = {
            version: "84.0.2",
            build: "OMNI_SPEC_2026",
            sectors: Array.from({length: 50}, (_, i) => `0x${Math.floor(Math.random()*16777215).toString(16)}`),
            protocols: ["X_LINK", "PKCE_HANDSHAKE", "KERNEL_VOID", "CHROMA_SYNC", "NEURAL_GATE"],
            statusCodes: [200, 101, 404, 500, 202, 303]
        };

        const Kernel = {
            toggleNexus: () => document.getElementById('nexus-ui').classList.toggle('active'),
            
            log: (tag, msg) => {
                const manifest = document.getElementById('terminal-manifest');
                const entry = document.createElement('div');
                entry.className = "log-entry";
                entry.innerHTML = `
                    <span class="opacity-20">${new Date().toLocaleTimeString('en-GB')}</span>
                    <span class="log-tag">[${tag}]</span>
                    <span class="opacity-80">${msg}</span>
                `;
                manifest.prepend(entry);
                if(manifest.childNodes.length > 800) manifest.lastChild.remove();
            },

            // THE 400-LINE ENGINE: Generating dense system data
            bootSequence: () => {
                Kernel.log("SYS", "Initializing Architect_OS Bootloader...");
                
                // Map the 50 virtual sectors
                ARCHITECT_CONFIG.sectors.forEach((sec, index) => {
                    setTimeout(() => {
                        Kernel.log("MAP", `Allocating Sector ${index} at address ${sec}... OK`);
                        if(index === 49) Kernel.log("MAP", "All memory sectors mapped successfully.");
                    }, index * 15);
                });

                // Heavy Dump to fill line count and aesthetic
                for (let i = 0; i < 350; i++) {
                    setTimeout(() => {
                        const proto = ARCHITECT_CONFIG.protocols[Math.floor(Math.random()*5)];
                        const code = ARCHITECT_CONFIG.statusCodes[Math.floor(Math.random()*6)];
                        const bits = Math.random().toString(36).substring(7).toUpperCase();
                        Kernel.log(proto, `Stream_Bit_${i} // Code: ${code} // HASH: ${bits}`);
                        
                        if(i === 349) {
                            Kernel.log("AUTH", "System Ready. Waiting for PKCE handshake.");
                            document.getElementById('status-label').innerText = "UPLINK: READY // ENCRYPTED";
                        }
                    }, 800 + (i * 5));
                }
            }
        };

        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirectUri: 'https://xclipsestudio.xclipsenetworks.com.au/callback.html',
            
            auth: async () => {
                Kernel.log("PKCE", "Starting handshake via secure gateway...");
                const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64)))
                    .map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[x % 66]).join('');
                localStorage.setItem('sp_verifier', verifier);

                const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
                const challenge = btoa(String.fromCharCode(...new Uint8Array(hashed)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

                const params = new URLSearchParams({
                    response_type: 'code', client_id: Spotify.clientId,
                    scope: 'user-read-currently-playing user-read-playback-state',
                    redirect_uri: Spotify.redirectUri, code_challenge_method: 'S256', code_challenge: challenge
                });

                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            }
        };

        const VFX = {
            matrix: {
                canvas: null, ctx: null, drops: [],
                init: () => {
                    VFX.matrix.canvas = document.getElementById('matrix-canvas');
                    VFX.matrix.ctx = VFX.matrix.canvas.getContext('2d');
                    VFX.matrix.resize();
                    setInterval(VFX.matrix.draw, 45);
                },
                resize: () => {
                    VFX.matrix.canvas.width = window.innerWidth;
                    VFX.matrix.canvas.height = window.innerHeight;
                    VFX.matrix.drops = Array(Math.floor(window.innerWidth / 22)).fill(1);
                },
                draw: () => {
                    VFX.matrix.ctx.fillStyle = "rgba(0,0,0,0.15)";
                    VFX.matrix.ctx.fillRect(0,0,VFX.matrix.canvas.width,VFX.matrix.canvas.height);
                    VFX.matrix.ctx.fillStyle = "#ffffff";
                    VFX.matrix.ctx.font = "15px monospace";
                    VFX.matrix.drops.forEach((y, i) => {
                        VFX.matrix.ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 22, y * 22);
                        if(y * 22 > VFX.matrix.canvas.height && Math.random() > 0.98) VFX.matrix.drops[i] = 0;
                        VFX.matrix.drops[i]++;
                    });
                }
            }
        };

        window.onload = () => {
            VFX.matrix.init();
            Kernel.bootSequence();
            
            // Primary Clock Interval
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock-face').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('clock-ss').innerText = String(now.getSeconds()).padStart(2, '0');
            }, 1000);

            // Parallax UI
            document.onmousemove = (e) => {
                const x = (window.innerWidth/2 - e.pageX)/150;
                const y = (window.innerHeight/2 - e.pageY)/150;
                document.getElementById('chronos-ui').style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            };
        };

        window.onresize = () => VFX.matrix.resize();
    </script>
</body>
</html>
