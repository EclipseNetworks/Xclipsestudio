<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_v40.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.4);
            --spotify: #1DB954;
            --bg-dark: #010101;
            --panel-bg: rgba(5, 5, 5, 0.98);
            --border-ui: rgba(255, 255, 255, 0.08);
            --accent-red: #ff4444;
            --accent-cyan: #00f3ff;
        }

        /* --- GLOBAL RESET & SCROLL --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }

        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- BACKGROUND DYNAMICS --- */
        #entropy-canvas { 
            position: fixed; inset: 0; z-index: 0; 
            opacity: 0.25; pointer-events: none; 
        }

        .scanline {
            width: 100%; height: 100px;
            z-index: 1; position: absolute;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(168, 85, 247, 0.05) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1; pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan { from { top: -100px; } to { top: 100%; } }

        /* --- OS UI ARCHITECTURE --- */
        .os-header { 
            position: fixed; top: 40px; left: 50px; right: 50px; 
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 100; 
        }

        .system-tag {
            font-size: 10px; letter-spacing: 0.6em;
            text-transform: uppercase; color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* --- PANEL SYSTEM --- */
        .os-panel {
            position: absolute; top: 70px; right: 0; width: 480px;
            background: var(--panel-bg); border: 1px solid var(--border-ui);
            padding: 35px; display: none; flex-direction: column;
            box-shadow: -20px 20px 100px rgba(0,0,0,0.8);
            clip-path: polygon(0 0, 100% 0, 100% 92%, 92% 100%, 0 100%);
            z-index: 1000; border-top: 4px solid var(--primary);
            backdrop-filter: blur(30px);
        }

        .os-panel.active { display: flex; animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1); }

        @keyframes slideIn {
            from { transform: translateX(50px) scale(0.98); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }

        /* --- COMPONENT STYLING --- */
        .tab-btn { 
            font-size: 10px; letter-spacing: 0.3em; padding: 12px 18px; 
            cursor: pointer; opacity: 0.3; transition: all 0.4s;
            border-bottom: 2px solid transparent; text-transform: uppercase;
        }
        .tab-btn.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }
        .tab-btn:hover { opacity: 0.8; background: rgba(255,255,255,0.02); }

        .os-btn { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-ui); 
            padding: 14px; font-size: 10px; text-transform: uppercase; font-weight: 800; 
            cursor: pointer; transition: 0.3s; text-align: center; color: #fff;
            position: relative; overflow: hidden;
        }
        .os-btn::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .os-btn:hover::after { left: 100%; }
        .os-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        /* --- CHRONOS INTERFACE --- */
        .master-interface { 
            position: absolute; inset: 0; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 10; pointer-events: none; 
        }

        #main-time {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(10rem, 25vw, 30rem);
            font-weight: 900; font-style: italic; letter-spacing: -0.08em; line-height: 0.65;
            color: #ffffff; mix-blend-mode: overlay;
            filter: drop-shadow(0 0 80px var(--primary-glow));
            transition: 0.5s ease;
        }

        .metrics-container { display: flex; flex-direction: column; align-items: flex-start; gap: 0; }
        #sec-hex { font-size: 8rem; font-weight: 100; color: var(--primary); line-height: 0.7; opacity: 0.8; }
        #mode-shard { 
            font-size: 12px; font-weight: 800; border: 2px solid var(--primary); 
            padding: 6px 20px; margin-top: 20px; letter-spacing: 0.5em; 
            text-transform: uppercase;
        }

        /* --- SPOTIFY NODE --- */
        #spotify-node { position: fixed; bottom: 60px; left: 60px; z-index: 100; }
        .node-box {
            background: rgba(0,0,0,0.9); border: 1px solid var(--border-ui);
            padding: 20px 30px; border-left: 6px solid var(--spotify);
            clip-path: polygon(0 0, 96% 0, 100% 15%, 100% 100%, 4% 100%, 0 85%);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .progress-rail { height: 2px; width: 100%; background: rgba(255,255,255,0.05); margin-top: 15px; border-radius: 4px; overflow: hidden; }
        #track-progress { height: 100%; background: var(--spotify); transition: width 0.8s linear; box-shadow: 0 0 10px var(--spotify); }

        /* --- TERMINAL --- */
        .log-terminal { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--border-ui); 
            height: 220px; overflow-y: scroll; padding: 15px; 
            font-size: 10px; color: #00ff88; font-family: 'JetBrains Mono';
            display: flex; flex-direction: column; gap: 4px;
        }

        .log-entry { display: flex; gap: 10px; animation: logFade 0.3s ease; }
        @keyframes logFade { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
        .log-time { opacity: 0.3; }
        .log-tag { color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>

    <canvas id="entropy-canvas"></canvas>
    <div class="scanline"></div>

    <header class="os-header">
        <div class="flex flex-col">
            <div class="system-tag">ARCHITECT_OS // CORE_STABLE</div>
            <div class="text-[8px] opacity-30 mt-1 tracking-[0.8em]">UPLINKED: BORDERTOWN_SUBSTATION</div>
        </div>

        <div class="settings-hub relative">
            <button class="os-btn !px-12" onclick="OS.togglePanel()">Settings</button>
            
            <div class="os-panel" id="osPanel">
                <div class="flex justify-between mb-10 border-b border-white/5">
                    <div class="tab-btn active" onclick="OS.switchTab('core', this)">01_CORE</div>
                    <div class="tab-btn" onclick="OS.switchTab('media', this)">02_MEDIA</div>
                    <div class="tab-btn" onclick="OS.switchTab('net', this)">03_NET</div>
                    <div class="tab-btn" onclick="OS.switchTab('auth', this)">04_SYNC</div>
                </div>

                <div id="tab-core" class="tab-content flex flex-col gap-8">
                    <div class="flex flex-col gap-4">
                        <span class="text-[9px] opacity-40 tracking-widest uppercase">Chronos Configuration</span>
                        <div class="grid grid-cols-2 gap-3">
                            <button class="os-btn" onclick="Clock.setMode(12)">Set_12H</button>
                            <button class="os-btn" onclick="Clock.setMode(24)">Set_24H</button>
                        </div>
                    </div>
                    <div class="flex flex-col gap-4">
                        <span class="text-[9px] opacity-40 tracking-widest uppercase">Display Entropy</span>
                        <input type="range" class="accent-purple-500 opacity-50" min="0" max="100" oninput="OS.setGlow(this.value)">
                    </div>
                </div>

                <div id="tab-media" class="tab-content hidden flex-col gap-6">
                    <span class="text-[9px] opacity-40 tracking-widest uppercase">Neural Media Bridge</span>
                    <div class="grid grid-cols-3 gap-3">
                        <button class="os-btn" onclick="Spotify.command('previous')">PREV</button>
                        <button id="play-pause-btn" class="os-btn !border-green-500 !text-green-500" onclick="Spotify.command('play')">PLAY</button>
                        <button class="os-btn" onclick="Spotify.command('next')">NEXT</button>
                    </div>
                    <div class="node-box !bg-white/5 !border-white/5 !px-4 !py-4">
                        <span class="text-[8px] opacity-30 uppercase">Uplink Health</span>
                        <div class="progress-rail"><div id="track-progress-inner" class="h-full bg-green-500 w-0 transition-all"></div></div>
                    </div>
                    <button class="os-btn w-full !text-[9px] !opacity-40" onclick="Spotify.auth()">RESET_OAUTH_HANDSHAKE</button>
                </div>

                <div id="tab-net" class="tab-content hidden flex-col gap-4">
                    <div class="p-6 border border-white/5 bg-black/40">
                        <div class="flex justify-between text-[10px] mb-4"><span>LATENCY_SIGNAL</span><span id="ping" class="text-green-400">24ms</span></div>
                        <div class="flex justify-between text-[10px] mb-4"><span>CORE_LOAD</span><span id="load" class="text-purple-400">12.4%</span></div>
                        <div class="flex justify-between text-[10px]"><span>PACKET_LOSS</span><span class="text-red-400">0.00%</span></div>
                    </div>
                </div>

                <div id="tab-auth" class="tab-content hidden flex-col gap-5">
                    <span class="text-[9px] opacity-40 tracking-widest uppercase">System Runtime Log</span>
                    <div class="log-terminal" id="sys-log"></div>
                    <button class="os-btn !border-purple-500/50" onclick="OS.clearLogs()">Purge_Logs</button>
                </div>
            </div>
        </div>
    </header>

    <main class="master-interface">
        <div class="flex items-baseline gap-16">
            <div id="main-time">00:00</div>
            <div class="metrics-container pb-20">
                <div id="sec-hex">00</div>
                <div id="mode-shard">AM</div>
            </div>
        </div>
    </main>

    <div id="spotify-node">
        <div class="node-box">
            <div class="text-[9px] opacity-30 tracking-[0.4em] mb-2 font-bold uppercase">Streaming_Signal</div>
            <div id="track-name" class="text-sm font-black uppercase truncate w-56 tracking-tighter">System_Idle</div>
            <div id="artist-name" class="text-[9px] text-purple-400 tracking-[0.2em] uppercase font-bold mt-1">Awaiting Data...</div>
            <div class="progress-rail"><div id="track-progress-bar" style="width: 0%" class="h-full bg-green-500 shadow-[0_0_15px_#1DB954]"></div></div>
        </div>
    </div>

    <script>
        /**
         * OS CORE MANAGER
         * Handles UI transitions, tabs, and environmental effects
         */
        const OS = {
            activePanel: false,
            togglePanel: () => {
                const p = document.getElementById('osPanel');
                OS.activePanel = !OS.activePanel;
                p.classList.toggle('active');
                OS.log("SYSTEM", OS.activePanel ? "Panel_Engaged" : "Panel_Disengaged");
            },
            switchTab: (id, btn) => {
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${id}`).classList.remove('hidden');
                btn.classList.add('active');
                OS.log("UI", `Switching to ${id.toUpperCase()}`);
            },
            log: (tag, msg) => {
                const log = document.getElementById('sys-log');
                const time = new Date().toTimeString().split(' ')[0];
                const entry = document.createElement('div');
                entry.className = "log-entry";
                entry.innerHTML = `<span class="log-time">${time}</span><span class="log-tag">[${tag}]</span><span class="log-msg">${msg}</span>`;
                log.prepend(entry);
                if(log.children.length > 50) log.lastChild.remove();
            },
            clearLogs: () => {
                document.getElementById('sys-log').innerHTML = '';
                OS.log("AUTH", "Terminal_Purged");
            },
            setGlow: (val) => {
                document.documentElement.style.setProperty('--glow-mult', val / 50);
                OS.log("CORE", `Entropy_Adjusted: ${val}%`);
            }
        };

        /**
         * TEMPORAL ENGINE (CLOCK)
         */
        const Clock = {
            mode: 12,
            setMode: (m) => { Clock.mode = m; OS.log("CHRONOS", `Format_${m}H_Applied`); },
            tick: () => {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const ampm = h >= 12 ? 'PM' : 'AM';
                
                if(Clock.mode === 12) h = h % 12 || 12;
                
                document.getElementById('main-time').innerText = `${String(h).padStart(2, '0')}:${m}`;
                document.getElementById('sec-hex').innerText = s;
                document.getElementById('mode-shard').innerText = ampm;
            }
        };

        /**
         * SPOTIFY NEURAL BRIDGE
         * Repaired button logic and state observer
         */
        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            isPlaying: false,

            auth: () => {
                const scope = encodeURIComponent('user-read-currently-playing user-read-playback-state user-modify-playback-state');
                const uri = encodeURIComponent('https://xclipsestudio.xclipsenetworks.com.au/callback');
                window.location.href = `https://accounts.spotify.com/authorize?client_id=${Spotify.clientId}&response_type=token&redirect_uri=${uri}&scope=${scope}`;
            },

            command: async (type) => {
                const token = localStorage.getItem('sp_access_token');
                if(!token) return OS.log("ERROR", "Uplink_Missing");

                let method = (type === 'next' || type === 'previous') ? 'POST' : 'PUT';
                let endpoint = type;

                if (type === 'play') {
                    endpoint = Spotify.isPlaying ? 'pause' : 'play';
                }

                try {
                    const res = await fetch(`https://api.spotify.com/v1/me/player/${endpoint}`, {
                        method: method,
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if(res.ok || res.status === 204) {
                        OS.log("MEDIA", `CMD_${endpoint.toUpperCase()}_SUCCESS`);
                        setTimeout(Spotify.sync, 500);
                    } else {
                        OS.log("MEDIA", "ERR: NO_ACTIVE_DEVICE");
                    }
                } catch(e) {
                    OS.log("MEDIA", "SIGNAL_DROPPED");
                }
            },

            sync: async () => {
                const token = localStorage.getItem('sp_access_token');
                if(!token) return;

                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if(res.status === 200) {
                        const d = await res.json();
                        Spotify.isPlaying = d.is_playing;
                        
                        document.getElementById('track-name').innerText = d.item.name;
                        document.getElementById('artist-name').innerText = d.item.artists[0].name.toUpperCase();
                        
                        const prog = (d.progress_ms / d.item.duration_ms) * 100;
                        document.getElementById('track-progress-bar').style.width = prog + "%";
                        document.getElementById('track-progress-inner').style.width = prog + "%";

                        const btn = document.getElementById('play-pause-btn');
                        btn.innerText = Spotify.isPlaying ? 'PAUSE' : 'PLAY';
                        btn.style.color = Spotify.isPlaying ? '#ff4444' : '#1DB954';
                        btn.style.borderColor = Spotify.isPlaying ? '#ff4444' : '#1DB954';
                    }
                } catch(e) {}
            }
        };

        /**
         * ENTROPY ENGINE (CANVAS)
         */
        const Canvas = {
            el: document.getElementById('entropy-canvas'),
            ctx: null,
            drops: [],
            init: () => {
                Canvas.ctx = Canvas.el.getContext('2d');
                Canvas.el.width = window.innerWidth;
                Canvas.el.height = window.innerHeight;
                Canvas.drops = Array(Math.floor(Canvas.el.width / 15)).fill(1);
                setInterval(Canvas.draw, 35);
            },
            draw: () => {
                const ctx = Canvas.ctx;
                ctx.fillStyle = "rgba(0,0,0,0.08)";
                ctx.fillRect(0, 0, Canvas.el.width, Canvas.el.height);
                ctx.fillStyle = "#a855f7";
                ctx.font = "12px monospace";
                
                Canvas.drops.forEach((y, i) => {
                    const char = Math.random() > 0.5 ? "0" : "1";
                    ctx.fillText(char, i * 15, y * 15);
                    if(y * 15 > Canvas.el.height && Math.random() > 0.98) Canvas.drops[i] = 0;
                    Canvas.drops[i]++;
                });
            }
        };

        // --- GLOBAL INITIALIZATION ---
        window.onload = () => {
            Canvas.init();
            setInterval(Clock.tick, 1000);
            setInterval(Spotify.sync, 3000);
            
            // Random Metrics Sim
            setInterval(() => {
                document.getElementById('ping').innerText = Math.floor(Math.random() * 15 + 20) + "ms";
                document.getElementById('load').innerText = (Math.random() * 10 + 5).toFixed(1) + "%";
            }, 4000);

            // OAuth Token Capture
            const hash = window.location.hash.substring(1).split('&').reduce((acc, item) => {
                if (item) { let p = item.split('='); acc[p[0]] = decodeURIComponent(p[1]); }
                return acc;
            }, {});

            if(hash.access_token) {
                localStorage.setItem('sp_access_token', hash.access_token);
                OS.log("AUTH", "Handshake_Complete");
                window.location.hash = "";
            }

            Clock.tick();
            OS.log("KERNEL", "Architect_OS_v40.0_Ready");
        };

        window.onresize = () => {
            Canvas.el.width = window.innerWidth;
            Canvas.el.height = window.innerHeight;
        };
    </script>
</body>
</html>
