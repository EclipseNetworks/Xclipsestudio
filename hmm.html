<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ARCHITECT_OS_v22.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.4);
            --spotify: #1DB954;
            --bg-dark: #010101;
            --panel-bg: rgba(5, 5, 5, 0.98);
            --glow-mult: 1;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); color: #fff; 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; 
        }

        /* Background Entropy Layer */
        #entropy-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.15; pointer-events: none; }

        /* OS UI Elements */
        .os-header { position: fixed; top: 30px; left: 40px; right: 40px; display: flex; justify-content: space-between; z-index: 100; }
        
        /* Settings Panel */
        .os-panel {
            position: absolute; top: 60px; right: 0; width: 420px;
            background: var(--panel-bg); border: 1px solid rgba(168, 85, 247, 0.3);
            padding: 30px; display: none; flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
            z-index: 1000; border-top: 4px solid var(--primary);
            backdrop-filter: blur(20px);
        }
        .os-panel.active { display: flex; animation: panelSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes panelSlide {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Tab Navigation */
        .tab-btn { 
            font-size: 9px; letter-spacing: 0.2em; padding: 8px 12px; 
            cursor: pointer; opacity: 0.4; transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }

        .os-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            padding: 10px; font-size: 9px; text-transform: uppercase; font-weight: 800; 
            cursor: pointer; transition: 0.2s; text-align: center; color: #fff; 
        }
        .os-btn:hover { background: var(--primary); color: #000; }

        /* Main Temporal Interface */
        .master-interface { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        #main-time {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(8rem, 22vw, 26rem);
            font-weight: 900; font-style: italic; letter-spacing: -0.06em; line-height: 0.7;
            color: #ffffff; mix-blend-mode: overlay;
            filter: drop-shadow(0 0 calc(50px * var(--glow-mult)) var(--primary-glow));
        }

        #sec-hex { font-size: 7rem; font-weight: 100; color: var(--primary); line-height: 0.8; }
        #mode-shard { font-size: 10px; font-weight: 800; border: 1px solid var(--primary); padding: 4px 15px; margin-top: 15px; letter-spacing: 0.4em; }

        /* Spotify Node */
        #spotify-node { position: fixed; bottom: 50px; left: 50px; z-index: 100; }
        .node-box {
            background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px 25px; border-left: 4px solid var(--spotify);
            clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%);
            backdrop-filter: blur(15px);
        }

        .log-terminal { 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); 
            height: 180px; overflow-y: auto; padding: 12px; font-size: 9px; color: #00ff88; 
        }
    </style>
</head>
<body>

    <canvas id="entropy-canvas"></canvas>

    <header class="os-header">
        <div class="system-status text-[8px] tracking-[0.5em] text-purple-400">UPLINK_STABLE // <span id="admin-tag">GUEST_LINK</span></div>
        <div class="settings-hub">
            <button class="os-btn !px-8" onclick="UI.togglePanel()">SYSTEM_MANIFEST</button>
            
            <div class="os-panel" id="osPanel">
                <div class="flex justify-between mb-8 border-b border-white/10">
                    <div class="tab-btn active" onclick="UI.switchTab('core', this)">CORE</div>
                    <div class="tab-btn" onclick="UI.switchTab('media', this)">MEDIA</div>
                    <div class="tab-btn" onclick="UI.switchTab('net', this)">NET</div>
                    <div class="tab-btn" onclick="UI.switchTab('auth', this)">AUTH</div>
                </div>

                <div id="tab-core" class="tab-content flex flex-col gap-6">
                    <div class="flex flex-col gap-2">
                        <span class="text-[8px] opacity-40 tracking-widest">CHRONOS_MODE</span>
                        <div class="grid grid-cols-2 gap-2">
                            <button class="os-btn" onclick="Clock.setMode(12)">12_HOUR</button>
                            <button class="os-btn" onclick="Clock.setMode(24)">24_HOUR</button>
                        </div>
                    </div>
                </div>

                <div id="tab-media" class="tab-content hidden flex-col gap-4">
                    <span class="text-[8px] opacity-40 tracking-widest">NEURAL_CONTROL_UNIT</span>
                    <div class="grid grid-cols-3 gap-2">
                        <button class="os-btn !text-[10px]" onclick="Spotify.control('previous')">PREV</button>
                        <button id="play-pause-btn" class="os-btn !text-[10px] !border-green-500 !text-green-500" onclick="Spotify.control('play')">PLAY</button>
                        <button class="os-btn !text-[10px]" onclick="Spotify.control('next')">NEXT</button>
                    </div>
                    <div class="node-box !bg-white/5 !border-white/10 mt-2">
                        <span class="text-[7px] opacity-40">SIGNAL_STRENGTH</span>
                        <div class="h-1 w-full bg-white/10 mt-2">
                            <div id="track-progress" class="h-full bg-green-500 shadow-[0_0_10px_#1DB954] transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                    <button class="os-btn w-full mt-2 !opacity-30 !text-[8px]" onclick="Spotify.auth()">RE-AUTHORIZE_UPLINK</button>
                </div>

                <div id="tab-net" class="tab-content hidden flex-col gap-4">
                    <span class="text-[8px] opacity-40 tracking-widest">NETWORK_METRICS</span>
                    <div class="text-[10px] flex justify-between"><span>LATENCY</span><span id="ping-val">--ms</span></div>
                    <div class="text-[10px] flex justify-between"><span>LOAD</span><span id="load-val">--%</span></div>
                </div>

                <div id="tab-auth" class="tab-content hidden flex-col gap-4">
                    <span class="text-[8px] opacity-40 tracking-widest">ADMIN_TERMINAL</span>
                    <div class="log-terminal" id="sys-log"></div>
                    <button id="fb-login" class="os-btn w-full !border-purple-500">INITIALIZE_CLOUD_SYNC</button>
                </div>
            </div>
        </div>
    </header>

    <main class="master-interface">
        <div class="flex items-baseline gap-12">
            <div id="main-time">00:00</div>
            <div class="sidebar-metrics pb-16">
                <div id="sec-hex">00</div>
                <div id="mode-shard">AM</div>
            </div>
        </div>
    </main>

    <div id="spotify-node">
        <div class="node-box">
            <div class="text-[8px] opacity-40 tracking-widest mb-1">CURRENT_SIGNAL</div>
            <div id="track-name" class="text-xs font-bold uppercase truncate w-48">CORE_IDLE</div>
            <div id="artist-name" class="text-[8px] text-green-500 tracking-widest uppercase">Waiting for input...</div>
        </div>
    </div>

    <script>
        // UI ENGINE
        const UI = {
            togglePanel: () => document.getElementById('osPanel').classList.toggle('active'),
            switchTab: (id, btn) => {
                document.querySelectorAll('.tab-content').forEach(c => {
                    c.classList.add('hidden');
                    c.classList.remove('flex');
                });
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                
                const target = document.getElementById(`tab-${id}`);
                target.classList.remove('hidden');
                target.classList.add('flex');
                btn.classList.add('active');
                System.log("NAV", `Switching to ${id.toUpperCase()}`);
            },
            initEntropy: () => {
                const canvas = document.getElementById('entropy-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                const chars = "01X"; const drops = Array(Math.floor(canvas.width/10)).fill(1);
                function draw() {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#a855f7"; ctx.font = "10px monospace";
                    drops.forEach((y, i) => {
                        const text = chars[Math.floor(Math.random()*chars.length)];
                        ctx.fillText(text, i*10, y*10);
                        if(y*10 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    });
                }
                setInterval(draw, 33);
            }
        };

        // SYSTEM LOGS
        const System = {
            log: (tag, msg) => {
                const term = document.getElementById('sys-log');
                const div = document.createElement('div');
                div.innerHTML = `<span class="opacity-40">[${tag}]</span> ${msg}`;
                term.prepend(div);
            }
        };

        // CHRONOS
        const Clock = {
            format12: true,
            setMode: (m) => { Clock.format12 = (m === 12); System.log("CHRONOS", `Mode ${m}H set.`); },
            update: () => {
                const now = new Date(); let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const ampm = h >= 12 ? 'PM' : 'AM';
                if(Clock.format12) h = h % 12 || 12;
                document.getElementById('main-time').innerText = `${String(h).padStart(2, '0')}:${m}`;
                document.getElementById('sec-hex').innerText = s;
                document.getElementById('mode-shard').innerText = ampm;
            }
        };

        // SPOTIFY MODULE v22.5
        const Spotify = {
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            auth: () => {
                const scope = encodeURIComponent('user-read-currently-playing user-read-playback-state user-modify-playback-state');
                const uri = encodeURIComponent('https://xclipsestudio.xclipsenetworks.com.au/callback');
                window.location.href = `https://accounts.spotify.com/authorize?client_id=${Spotify.clientId}&response_type=code&redirect_uri=${uri}&scope=${scope}`;
            },
            control: async (command) => {
                const token = localStorage.getItem('spotify_token');
                if(!token) return System.log("ERROR", "No Active Spotify Uplink.");
                let method = 'POST';
                let endpoint = command;
                if(command === 'play') {
                    const isPlaying = document.getElementById('play-pause-btn').innerText === 'PAUSE';
                    endpoint = isPlaying ? 'pause' : 'play';
                    method = 'PUT';
                }
                try {
                    await fetch(`https://api.spotify.com/v1/me/player/${endpoint}`, {
                        method: method,
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    System.log("MEDIA", `${endpoint.toUpperCase()} Signal Sent`);
                    setTimeout(Spotify.sync, 500);
                } catch(e) { System.log("MEDIA_ERR", "Uplink Failed."); }
            },
            sync: async () => {
                const token = localStorage.getItem('spotify_token');
                if(!token) return;
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player', { headers: { 'Authorization': `Bearer ${token}` }});
                    if(res.status === 200) {
                        const d = await res.json();
                        document.getElementById('track-name').innerText = d.item.name;
                        document.getElementById('artist-name').innerText = d.item.artists[0].name.toUpperCase();
                        const percent = (d.progress_ms / d.item.duration_ms) * 100;
                        document.getElementById('track-progress').style.width = `${percent}%`;
                        document.getElementById('play-pause-btn').innerText = d.is_playing ? 'PAUSE' : 'PLAY';
                    }
                } catch(e) {}
            }
        };

        // INIT
        window.onload = () => {
            UI.initEntropy();
            setInterval(Clock.update, 1000);
            setInterval(Spotify.sync, 5000);
            setInterval(() => {
                document.getElementById('ping-val').innerText = Math.floor(Math.random()*20+20) + "ms";
                document.getElementById('load-val').innerText = Math.floor(Math.random()*15+30) + "%";
            }, 3000);
            Clock.update();
            System.log("KERNEL", "Architect OS v22.5 Online.");
        };
    </script>
</body>
</html>
