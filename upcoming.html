    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      // Your verified Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945",
        databaseURL: "https://xclipse-security-default-rtdb.firebaseio.com" 
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      async function runSecurityGate() {
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          const cleanIP = data.ip.replaceAll('.', '_');

          // 1. Instant Blacklist Check
          db.ref('blacklisted_ips/' + cleanIP).once('value', (snapshot) => {
            if (snapshot.exists()) {
              window.location.href = "/404.html";
            }
          });

          // 2. Report to Live Traffic
          const userRef = db.ref('live_traffic/' + cleanIP);
          userRef.set({
            ip: data.ip,
            page: window.location.pathname,
            last_seen: Date.now(),
            platform: navigator.platform
          });

          // Remove presence when they close the tab
          userRef.onDisconnect().remove();

        } catch (e) { console.warn("Security Link: Offline Mode"); }
      }

      runSecurityGate();
    </script>
    <script>
      tailwind.config = {

      .blob { position: absolute; width: 400px; height: 400px; background: rgba(236, 72, 153, 0.08); filter: blur(80px); border-radius: 50%; animation: move 20s infinite alternate; }
      @keyframes move { from { transform: translate(-5%, -5%); } to { transform: translate(15%, 15%); } }

      @keyframes floatHero { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(1deg); } }

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 1000, once: true });
      
      const cursor = document.getElementById('cursor');
      const cursorBlur = document.getElementById('cursor-blur');
      document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate3d(${e.clientX - 6}px, ${e.clientY - 6}px, 0)`;
        cursorBlur.style.transform = `translate3d(${e.clientX - 75}px, ${e.clientY - 75}px, 0)`;
      });
      
      document.querySelectorAll('a, button').forEach(link => {
        link.addEventListener('mouseenter', () => cursor.style.transform += ' scale(2.5)');
        link.addEventListener('mouseleave', () => cursor.style.transform = cursor.style.transform.replace(' scale(2.5)', ''));
      });
    </script>
