    <script>
      // Your verified Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945",
        databaseURL: "https://xclipse-security-default-rtdb.firebaseio.com" 
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      async function runSecurityGate() {
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          const cleanIP = data.ip.replaceAll('.', '_');

          // 1. Instant Blacklist Check
          db.ref('blacklisted_ips/' + cleanIP).once('value', (snapshot) => {
            if (snapshot.exists()) {
              window.location.href = "/404.html";
            }
          });

          // 2. Report to Live Traffic
          const userRef = db.ref('live_traffic/' + cleanIP);
          userRef.set({
            ip: data.ip,
            page: window.location.pathname,
            last_seen: Date.now(),
            platform: navigator.platform
          });

          // Remove presence when they close the tab
          userRef.onDisconnect().remove();

        } catch (e) { console.warn("Security Link: Offline Mode"); }
      }

      runSecurityGate();
    </script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
          AOS.init({ duration: 1200, once: true });
          initCursor();
          initSecurityUI(); // Replaced with logic that supports Firebase
      });

      function initCursor() {
          const c = document.getElementById('cursor'), cb = document.getElementById('cursor-blur');
          document.addEventListener('mousemove', (e) => {
              window.requestAnimationFrame(() => {
                  c.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
                  cb.style.transform = `translate3d(${e.clientX - 70}px, ${e.clientY - 70}px, 0)`;
              });
          });
      }

      function initSecurityUI() {
          const R = '/404.html';
          document.addEventListener('keydown', (e) => {
              if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
                  e.preventDefault(); window.location.href = R;
              }
          });
          document.addEventListener('contextmenu', (e) => e.preventDefault());
      }
    </script>
