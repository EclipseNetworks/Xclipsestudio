<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CLIPSE | ARCHITECT_OS_v99</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://connect.soundcloud.com/sdk/sdk-3.3.2.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --bg: #030303;
            --panel: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --error: #ff3333;
        }

        * { cursor: none !important; margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: white; font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; height: 100vh;
        }

        .glass { background: var(--panel); backdrop-filter: blur(40px); border: 1px solid var(--border); }
        .terminal { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; }
        
        #cursor {
            width: 8px; height: 8px; background: white; position: fixed;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            box-shadow: 0 0 15px white;
        }

        .btn-hw {
            @apply p-6 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/20 transition-all active:scale-90;
        }

        /* Error state for invalid token */
        .token-invalid { border-color: var(--error) !important; box-shadow: 0 0 20px rgba(255, 51, 51, 0.2); }
    </style>
</head>
<body onload="bootSequence()">
    <div id="cursor"></div>

    <header class="fixed top-0 w-full p-12 flex justify-between items-center z-50">
        <h1 class="text-2xl font-black tracking-tighter italic">ARCHITECT_OS</h1>
        <div id="auth-indicator" class="glass px-6 py-2 rounded-full terminal text-[9px] flex items-center gap-3">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500"></span>
            <span id="status-text">INITIALIZING_UPLINK</span>
        </div>
    </header>

    <main class="h-screen flex items-center justify-center px-12">
        <section id="player-ui" class="w-full max-w-5xl grid grid-cols-12 gap-16 items-center">
            
            <!-- ARTWORK -->
            <div class="col-span-5">
                <div id="art-card" class="glass aspect-square rounded-[50px] bg-white/5 bg-cover bg-center shadow-2xl relative overflow-hidden">
                    <div id="viz" class="absolute bottom-0 left-0 w-full h-32 flex items-end justify-around p-8 gap-1 opacity-30"></div>
                </div>
            </div>

            <!-- CONTROLS -->
            <div class="col-span-7 space-y-10">
                <div class="space-y-2">
                    <h2 id="track-title" class="text-7xl font-bold tracking-tighter leading-none">OFFLINE</h2>
                    <p id="track-artist" class="text-2xl font-light opacity-30 uppercase tracking-widest">Awaiting Command</p>
                </div>

                <div class="glass p-10 rounded-[40px] space-y-10">
                    <!-- Progress -->
                    <div class="space-y-4">
                        <div class="w-full h-[2px] bg-white/10 relative">
                            <div id="progress-bar" class="absolute h-full bg-white w-0 shadow-[0_0_10px_white]"></div>
                        </div>
                        <div class="flex justify-between terminal opacity-40 text-[8px]">
                            <span id="time-cur">0:00</span>
                            <span id="time-total">0:00</span>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="flex items-center justify-between">
                        <button class="btn-hw" onclick="handleCmd('previous')"><i data-lucide="skip-back"></i></button>
                        <button id="play-btn" class="w-24 h-24 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 active:scale-95 transition-all" onclick="handleCmd('toggle')">
                            <i data-lucide="play" class="fill-current w-8 h-8"></i>
                        </button>
                        <button class="btn-hw" onclick="handleCmd('next')"><i data-lucide="skip-forward"></i></button>
                    </div>
                </div>
                
                <div id="log-feed" class="terminal text-[9px] text-white/20 italic">>> sys_ready</div>
            </div>
        </section>
    </main>

    <script>
        const CONFIG = {
            // Updated Scope to include private playback control
            scope: 'user-modify-playback-state user-read-playback-state user-read-currently-playing',
            clientId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirect: window.location.origin + window.location.pathname
        };

        let state = { isPlaying: false, token: localStorage.getItem('sp_token') };

        function bootSequence() {
            // Fix for Lucide Icon name issue: Ensure names match library precisely
            lucide.createIcons();
            
            // Your callback logic integration
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            
            if (token) {
                localStorage.setItem('sp_token', token);
                state.token = token;
                window.location.hash = '';
                log("token_synced_successfully");
            }

            checkAuthStatus();
            initViz();
            setInterval(syncPlayback, 1500);
        }

        async function checkAuthStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const ui = document.getElementById('player-ui');

            if (!state.token) {
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                text.innerText = "NO_TOKEN_FOUND";
                log("err: unauthorized_access");
                return;
            }

            // Verify token with a test call
            const res = await fetch('https://api.spotify.com/v1/me', {
                headers: { 'Authorization': `Bearer ${state.token}` }
            });

            if (res.status === 401) {
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                text.innerText = "TOKEN_EXPIRED_REAUTH";
                ui.classList.add('token-invalid');
                log("err: 401_unauthorized");
            } else {
                dot.className = "w-2 h-2 rounded-full bg-green-500";
                text.innerText = "UPLINK_STABLE";
                log("handshake_verified");
            }
        }

        async function handleCmd(action) {
            if (!state.token) { login(); return; }
            log(`executing_${action}`);

            const headers = { 
                'Authorization': `Bearer ${state.token}`,
                'Content-Type': 'application/json' 
            };

            try {
                let url = 'https://api.spotify.com/v1/me/player/';
                let method = 'POST';

                if (action === 'toggle') {
                    method = 'PUT';
                    url += state.isPlaying ? 'pause' : 'play';
                } else {
                    url += action;
                }

                const res = await fetch(url, { method, headers });
                
                if (res.status === 404) {
                    log("err: no_active_device_found");
                    alert("Open Spotify on your device first!");
                } else if (res.status === 401) {
                    login(); // Token dead, refresh
                }
                
                setTimeout(syncPlayback, 300);
            } catch (e) {
                log("api_collision_detected");
            }
        }

        async function syncPlayback() {
            if (!state.token) return;

            const res = await fetch('https://api.spotify.com/v1/me/player', {
                headers: { 'Authorization': `Bearer ${state.token}` }
            });

            if (res.status === 200) {
                const data = await res.json();
                document.getElementById('track-title').innerText = data.item.name.toUpperCase();
                document.getElementById('track-artist').innerText = data.item.artists[0].name.toUpperCase();
                document.getElementById('art-card').style.backgroundImage = `url(${data.item.album.images[0].url})`;
                
                const progress = (data.progress_ms / data.item.duration_ms) * 100;
                document.getElementById('progress-bar').style.width = progress + '%';
                
                state.isPlaying = data.is_playing;
                updateIcon(data.is_playing);
            }
        }

        function updateIcon(playing) {
            const btn = document.getElementById('play-btn');
            btn.innerHTML = playing ? '<i data-lucide="pause" class="fill-current w-8 h-8"></i>' : '<i data-lucide="play" class="fill-current w-8 h-8"></i>';
            lucide.createIcons();
        }

        function login() {
            const url = `https://accounts.spotify.com/authorize?client_id=${CONFIG.clientId}&response_type=token&redirect_uri=${encodeURIComponent(CONFIG.redirect)}&scope=${encodeURIComponent(CONFIG.scope)}`;
            window.location.href = url;
        }

        function log(msg) {
            document.getElementById('log-feed').innerText = `>> ${msg}`;
        }

        function initViz() {
            const v = document.getElementById('viz');
            for(let i=0; i<30; i++) {
                const b = document.createElement('div');
                b.className = "w-1 bg-white rounded-full transition-all duration-300";
                b.style.height = "4px";
                v.appendChild(b);
            }
            setInterval(() => {
                if(state.isPlaying) {
                    document.querySelectorAll('#viz div').forEach(b => {
                        b.style.height = Math.random() * 80 + 5 + 'px';
                    });
                }
            }, 150);
        }

        document.addEventListener('mousemove', e => {
            gsap.to("#cursor", { x: e.clientX - 4, y: e.clientY - 4, duration: 0.1 });
        });
    </script>
</body>
</html>
