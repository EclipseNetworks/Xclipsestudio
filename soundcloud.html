<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CLIPSE | SYSTEM_ENTRY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { background: #020202; color: white; font-family: sans-serif; overflow: hidden; }
        .hero-text { font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; letter-spacing: -0.05em; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="text-center space-y-8">
        <h1 class="hero-text italic uppercase">XCLIPSE</h1>
        <button onclick="initiateAuth()" class="px-12 py-6 rounded-full border border-white/20 hover:bg-white hover:text-black transition-all font-mono text-xs tracking-widest">
            INITIALIZE_SYSTEM
        </button>
    </div>

    <script>
        function initiateAuth() {
            const client_id = 'ee9cf7fe920d4280804730690b3fb4e8';
            const redirect_uri = 'https://xclipsestudio.xclipsenetworks.com.au/soundcloud';
            const scope = 'user-modify-playback-state user-read-playback-state user-read-currently-playing';
            
            // Building URL manually to ensure no hidden character encoding issues
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${client_id}&response_type=code&redirect_uri=${encodeURIComponent(redirect_uri)}&scope=${encodeURIComponent(scope)}&show_dialog=true`;

            gsap.to("body", { opacity: 0, duration: 0.5, onComplete: () => {
                window.location.href = authUrl;
            }});
        }
    </script>
</body>
</html>
