<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CLIPSE | ARCHITECT_OS_v98_ULTRA</title>
    
    <!-- SYSTEM DEPENDENCIES -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://connect.soundcloud.com/sdk/sdk-3.3.2.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --bg: #030303;
            --accent: #ffffff;
            --panel: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --neon: #ffffff;
        }

        /* --- GLOBAL RESET & CURSOR --- */
        * { cursor: none !important; margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: white; font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; height: 100vh; perspective: 1000px;
        }

        #cursor {
            width: 8px; height: 8px; background: var(--accent); position: fixed;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        #cursor-trail {
            width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.1);
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;
        }

        /* --- ARCHITECT UI COMPONENTS --- */
        .glass-panel { 
            background: var(--panel); backdrop-filter: blur(40px); 
            border: 1px solid var(--border);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .terminal-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; }

        .btn-hw {
            @apply p-6 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/20 transition-all active:scale-90 flex items-center justify-center;
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* --- VISUALIZER --- */
        .v-bar { transition: height 0.2s ease; width: 3px; border-radius: 2px; }
        
        canvas#neural-net {
            position: fixed; inset: 0; z-index: -1; opacity: 0.2;
        }
    </style>
</head>
<body onload="initSystem()">
    <div id="cursor"></div>
    <div id="cursor-trail"></div>
    <canvas id="neural-net"></canvas>

    <!-- HEADER / HUD -->
    <header class="fixed top-0 w-full p-12 flex justify-between items-start z-[100]">
        <div class="flex flex-col gap-2">
            <div class="flex items-center gap-3">
                <span class="w-8 h-[1px] bg-white/30"></span>
                <span class="terminal-text text-white/40 uppercase">Architect_v98_Kernel</span>
            </div>
            <h1 class="text-3xl font-black tracking-tighter">X-CLIPSE<span class="font-extralight opacity-30">STUDIO</span></h1>
        </div>
        
        <div class="glass-panel p-6 rounded-3xl flex items-center gap-8">
            <div class="text-right">
                <p id="clock" class="text-xl font-bold tracking-tighter">00:00:00</p>
                <p class="terminal-text text-[8px] opacity-30">BORDERTOWN_OS_RELAY</p>
            </div>
            <div class="h-8 w-[1px] bg-white/10"></div>
            <div id="sync-status" class="flex flex-col gap-1">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] animate-pulse"></span>
                    <span class="terminal-text text-[8px] opacity-50">SYNC_ACTIVE</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                    <span class="terminal-text text-[8px] opacity-50">ENCRYPT_AES</span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN INTERFACE -->
    <main class="h-screen w-full flex items-center justify-center px-12 relative overflow-hidden">
        
        <!-- INITIAL GATEWAY (HIDDEN IF LOGGED IN) -->
        <section id="gateway" class="w-full max-w-4xl space-y-12 transition-all duration-1000">
            <div class="text-center space-y-4">
                <h2 class="text-6xl font-bold tracking-tighter">ESTABLISH_UPLINK</h2>
                <p class="terminal-text text-white/30 tracking-[1em]">CHOOSE_PROTOCOL</p>
            </div>
            <div class="grid grid-cols-2 gap-8">
                <div onclick="login('sp')" class="glass-panel p-16 rounded-[40px] group cursor-pointer hover:border-white/40">
                    <i data-lucide="layers" class="w-12 h-12 mb-12 group-hover:text-green-500 transition-colors"></i>
                    <h3 class="text-2xl font-bold mb-2">SPOTIFY</h3>
                    <p class="terminal-text text-white/40">API_GATEWAY_v2</p>
                </div>
                <div onclick="login('sc')" class="glass-panel p-16 rounded-[40px] group cursor-pointer hover:border-white/40">
                    <i data-lucide="cloud" class="w-12 h-12 mb-12 group-hover:text-orange-500 transition-colors"></i>
                    <h3 class="text-2xl font-bold mb-2">SOUNDCLOUD</h3>
                    <p class="terminal-text text-white/40">WIDGET_RELAY_v3</p>
                </div>
            </div>
        </section>

        <!-- PLAYER CONSOLE (HIDDEN BY DEFAULT) -->
        <section id="player" class="w-full max-w-6xl opacity-0 translate-y-20 hidden grid grid-cols-12 gap-16 items-center transition-all duration-1000">
            
            <!-- LEFT: VISUAL CORE -->
            <div class="col-span-5 relative group">
                <div class="glass-panel p-2 rounded-[50px] relative z-10 overflow-hidden">
                    <div id="art" class="w-full aspect-square rounded-[45px] bg-white/5 bg-cover bg-center transition-all duration-700"></div>
                    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex items-end gap-1 h-12" id="viz-container">
                        <!-- Bars generated in JS -->
                    </div>
                </div>
                <div class="absolute -inset-10 bg-white/5 blur-3xl rounded-full group-hover:bg-white/10 transition-all"></div>
            </div>

            <!-- RIGHT: COMMAND DECK -->
            <div class="col-span-7 space-y-10">
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <span id="source-tag" class="terminal-text px-3 py-1 border border-white/20 rounded-full text-[8px]">DISCONNECTED</span>
                        <div class="h-[1px] flex-grow bg-white/10"></div>
                    </div>
                    <h2 id="track-name" class="text-7xl font-black tracking-tighter leading-none italic uppercase">no_signal</h2>
                    <h3 id="track-artist" class="text-2xl font-light opacity-30 tracking-[0.3em] uppercase">awaiting_packet</h3>
                </div>

                <!-- SCRUBBER -->
                <div class="space-y-4 glass-panel p-8 rounded-[30px] shimmer">
                    <div class="w-full h-[2px] bg-white/5 relative overflow-hidden">
                        <div id="progress" class="absolute h-full bg-white w-0 shadow-[0_0_15px_white] transition-all"></div>
                    </div>
                    <div class="flex justify-between terminal-text text-[9px] opacity-40">
                        <span id="time-now">00:00</span>
                        <span id="time-end">00:00</span>
                    </div>
                </div>

                <!-- HARDWARE CONTROLS -->
                <div class="flex items-center justify-between">
                    <div class="flex gap-4">
                        <button class="btn-hw" onclick="cmd('shuffle')"><i data-lucide="shuffle" class="w-4 h-4"></i></button>
                        <button class="btn-hw" onclick="cmd('repeat')"><i data-lucide="repeat" class="w-4 h-4"></i></button>
                    </div>

                    <div class="flex items-center gap-6">
                        <button class="btn-hw p-8" onclick="cmd('previous')"><i data-lucide="skip-back" class="w-6 h-6"></i></button>
                        <button id="master-btn" class="w-24 h-24 rounded-full bg-white text-black flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-[0_0_50px_rgba(255,255,255,0.2)]" onclick="cmd('toggle')">
                            <i id="play-icon" data-lucide="play" class="w-10 h-10 fill-current"></i>
                        </button>
                        <button class="btn-hw p-8" onclick="cmd('next')"><i data-lucide="skip-forward" class="w-6 h-6"></i></button>
                    </div>

                    <div class="flex gap-4">
                        <button class="btn-hw" onclick="logout()"><i data-lucide="power" class="w-4 h-4 text-red-500/50"></i></button>
                    </div>
                </div>

                <div id="console-logs" class="terminal-text text-[9px] text-white/20 italic pt-6 border-t border-white/5">
                    >> system_ready...
                </div>
            </div>
        </section>
    </main>

    <!-- HIDDEN UTILITIES -->
    <div class="hidden"><iframe id="sc-relay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293"></iframe></div>

    <script>
        /**
         * ARCHITECT_OS CORE LOGIC
         * Handling: Auth Redirection, Spotify API, SoundCloud Widget, & Visuals
         */

        const CONFIG = {
            spId: 'ee9cf7fe920d4280804730690b3fb4e8',
            redirect: window.location.origin + window.location.pathname,
            scopes: 'user-read-playback-state user-modify-playback-state user-read-currently-playing'
        };

        let state = {
            isPlaying: false,
            source: localStorage.getItem('active_source'),
            token: localStorage.getItem('sp_token'),
            sc: null
        };

        // --- 1. BOOT SEQUENCE (Your Requested Logic Integration) ---
        function initSystem() {
            lucide.createIcons();
            initNeuralNet();
            
            // Integrate your Hash Handler logic
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            
            if (token) {
                localStorage.setItem('sp_token', token);
                localStorage.setItem('active_source', 'sp');
                window.location.hash = ''; // Clean URL
                location.reload();
            } else if (window.opener && window.opener.SC) {
                window.opener.SC.connectCallback();
            }

            // Route view based on token existence
            if (localStorage.getItem('sp_token')) {
                showPlayer();
            }

            // Start UI Heartbeat
            setInterval(updateClock, 1000);
            if(localStorage.getItem('sp_token')) setInterval(pollSpotify, 1000);
            
            // Build visualizer bars
            const viz = document.getElementById('viz-container');
            for(let i=0; i<40; i++) {
                const b = document.createElement('div');
                b.className = 'v-bar bg-white/20';
                b.style.height = '4px';
                viz.appendChild(b);
            }
        }

        // --- 2. AUTHENTICATION ---
        function login(type) {
            log(`initiating_${type}_handshake`);
            if (type === 'sp') {
                const url = `https://accounts.spotify.com/authorize?client_id=${CONFIG.spId}&response_type=token&redirect_uri=${encodeURIComponent(CONFIG.redirect)}&scope=${encodeURIComponent(CONFIG.scopes)}`;
                window.location.href = url;
            } else {
                SC.initialize({ client_id: 'YOUR_SC_CLIENT_ID', redirect_uri: CONFIG.redirect });
                SC.connect().then(() => {
                    localStorage.setItem('active_source', 'sc');
                    location.reload();
                });
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // --- 3. UI ENGINE ---
        function showPlayer() {
            gsap.to("#gateway", { opacity: 0, y: -50, duration: 1, onComplete: () => {
                document.getElementById('gateway').classList.add('hidden');
                const p = document.getElementById('player');
                p.classList.remove('hidden');
                gsap.to(p, { opacity: 1, y: 0, duration: 1.5, ease: "expo.out" });
            }});
        }

        function log(msg) {
            const l = document.getElementById('console-logs');
            l.innerText = `>> ${msg.toLowerCase()}`;
            gsap.from(l, { opacity: 0, x: -10, duration: 0.3 });
        }

        // --- 4. PLAYBACK COMMANDS ---
        async function cmd(action) {
            log(`exec_hardware_command: ${action}`);
            const token = localStorage.getItem('sp_token');
            if(!token) return;

            const headers = { 'Authorization': `Bearer ${token}` };
            let endpoint = 'https://api.spotify.com/v1/me/player/';

            try {
                if(action === 'toggle') {
                    const method = state.isPlaying ? 'pause' : 'play';
                    await fetch(endpoint + method, { method: 'PUT', headers });
                } else if(action === 'next' || action === 'previous') {
                    await fetch(endpoint + action, { method: 'POST', headers });
                }
                
                // Haptic feedback
                gsap.from("#master-btn", { scale: 0.8, duration: 0.2 });
                setTimeout(pollSpotify, 300);
            } catch(e) { log('api_relay_failure'); }
        }

        // --- 5. DATA POLLING ---
        async function pollSpotify() {
            const token = localStorage.getItem('sp_token');
            try {
                const res = await fetch('https://api.spotify.com/v1/me/player', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if(res.status === 200) {
                    const data = await res.json();
                    updateUI({
                        title: data.item.name,
                        artist: data.item.artists[0].name,
                        art: data.item.album.images[0].url,
                        progress: (data.progress_ms / data.item.duration_ms) * 100,
                        playing: data.is_playing,
                        cur: data.progress_ms,
                        tot: data.item.duration_ms
                    });
                }
            } catch(e) { console.error("Poll fail", e); }
        }

        function updateUI(d) {
            document.getElementById('track-name').innerText = d.title;
            document.getElementById('track-artist').innerText = d.artist;
            document.getElementById('art').style.backgroundImage = `url(${d.art})`;
            document.getElementById('progress').style.width = d.progress + '%';
            document.getElementById('source-tag').innerText = 'SPOTIFY_UPLINK_STABLE';
            
            document.getElementById('time-now').innerText = formatMs(d.cur);
            document.getElementById('time-end').innerText = formatMs(d.tot);
            
            state.isPlaying = d.playing;
            const icon = document.getElementById('play-icon');
            icon.setAttribute('data-lucide', d.playing ? 'pause' : 'play');
            lucide.createIcons();

            // Animate Viz
            const bars = document.querySelectorAll('.v-bar');
            bars.forEach(b => {
                const h = d.playing ? Math.random() * 50 + 5 : 4;
                b.style.height = h + 'px';
                b.style.opacity = d.playing ? '1' : '0.2';
            });
        }

        // --- 6. PHYSICS & UTILS ---
        function initNeuralNet() {
            const canvas = document.getElementById('neural-net');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let points = [];
            for(let i=0; i<60; i++) points.push({
                x: Math.random() * canvas.width, 
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5
            });

            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.beginPath();
                points.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    points.forEach((p2, j) => {
                        if(i === j) return;
                        const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                        if(dist < 150) {
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                        }
                    });
                });
                ctx.stroke();
                requestAnimationFrame(draw);
            }
            draw();
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false });
        }

        function formatMs(ms) {
            const m = Math.floor(ms / 60000);
            const s = ((ms % 60000) / 1000).toFixed(0);
            return m + ":" + (s < 10 ? '0' : '') + s;
        }

        // Cursor Physics
        document.addEventListener('mousemove', e => {
            gsap.to("#cursor", { x: e.clientX, y: e.clientY, duration: 0 });
            gsap.to("#cursor-trail", { x: e.clientX - 11, y: e.clientY - 11, duration: 0.15 });
        });
    </script>
</body>
</html>
