<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CLIPSE STUDIO | DUAL_SYNC_v86</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://connect.soundcloud.com/sdk/sdk-3.3.2.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&family=Space+Grotesk:wght@700&display=swap');
        :root { --sc: #ff5500; --sp: #1DB954; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .sc-btn { background: var(--sc); transition: all 0.3s; }
        .sp-btn { background: var(--sp); transition: all 0.3s; }
        .btn-hover:hover { transform: scale(1.05); filter: brightness(1.2); box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.2; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header class="p-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 bg-white rounded flex items-center justify-center">
                <i data-lucide="shield" class="text-black w-4 h-4"></i>
            </div>
            <span class="font-bold text-xs tracking-[0.5em] uppercase">X-Clipse Studio</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto pt-32 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-bold mb-8 tracking-tighter" style="font-family: 'Space Grotesk';">PROTOCOL_SYNC</h1>
        <p class="text-gray-500 mb-12 text-xs tracking-widest uppercase">Multi-Vendor Authorization Gateway</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-20">
            <!-- SoundCloud Connect -->
            <button id="sc-connect" class="sc-btn btn-hover p-8 rounded-2xl flex flex-col items-center gap-4 text-black">
                <i data-lucide="music" class="w-8 h-8"></i>
                <span class="font-bold uppercase tracking-widest">Connect SoundCloud</span>
            </button>

            <!-- Spotify Connect -->
            <button id="sp-connect" class="sp-btn btn-hover p-8 rounded-2xl flex flex-col items-center gap-4 text-black">
                <i data-lucide="layers" class="w-8 h-8"></i>
                <span class="font-bold uppercase tracking-widest">Connect Spotify</span>
            </button>
        </div>

        <div id="terminal" class="glass p-6 rounded-xl text-left text-[10px] text-green-500/80 h-48 overflow-y-auto font-mono">
            <div>[SYS] Initializing X-Clipse Architect OS...</div>
        </div>
    </main>

    <script>
        const SC_CLIENT_ID = '6v9CMyiHpBnmD6YcJBITXRpFXKDNtPOd';
        const SP_CLIENT_ID = 'ee9cf7fe920d4280804730690b3fb4e8';
        const REDIRECT_URI = 'https://xclipsestudio.xclipsenetworks.com.au/callback.html';

        lucide.createIcons();
        SC.initialize({ client_id: SC_CLIENT_ID, redirect_uri: REDIRECT_URI });

        function log(msg) {
            const t = document.getElementById('terminal');
            const entry = document.createElement('div');
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            t.prepend(entry);
        }

        // --- SOUNDCLOUD LOGIC ---
        document.getElementById('sc-connect').onclick = () => {
            log("Opening SoundCloud Secure Gateway...");
            // SC.connect uses standard token flow to avoid "Oops" errors
            SC.connect().then(() => {
                log("SoundCloud Verified.");
                return SC.get('/me');
            }).then(me => {
                log(`Session active: ${me.username}`);
            }).catch(e => log(`SC_ERROR: ${e.message}`));
        };

        // --- SPOTIFY LOGIC (PKCE Flow) ---
        document.getElementById('sp-connect').onclick = async () => {
            log("Generating PKCE Cryptographic Chain...");
            const verifier = Array.from(crypto.getRandomValues(new Uint8Array(32)), b => b.toString(16).padStart(2, '0')).join('');
            localStorage.setItem('sp_verifier', verifier);
            
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            const challenge = btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

            const spUrl = `https://accounts.spotify.com/authorize?` + new URLSearchParams({
                client_id: SP_CLIENT_ID,
                response_type: 'code',
                redirect_uri: REDIRECT_URI,
                code_challenge_method: 'S256',
                code_challenge: challenge,
                scope: 'user-read-private user-read-email'
            });
            log("Redirecting to Spotify Peer...");
            window.location.href = spUrl;
        };
    </script>
</body>
</html>
