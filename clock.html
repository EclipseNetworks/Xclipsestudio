<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclipse Studio | Temporal Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ec4899', 
              dark: '#050811'
            },
            fontFamily: { 
                display: ['Syncopate', 'sans-serif'],
                mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --mouse-x: 50%;
        --mouse-y: 50%;
        --transition-fluid: cubic-bezier(0.16, 1, 0.3, 1);
      }

      body { background: #050811; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; color: white; }

      .mesh-gradient {
        position: fixed; inset: 0; z-index: -1;
        background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(236, 72, 153, 0.15) 0%, rgba(5, 8, 17, 1) 50%), 
                    radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%);
      }

      #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

      .glass-card {
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.8s var(--transition-fluid);
      }

      .glass-card:hover {
        border-color: rgba(236, 72, 153, 0.4);
        background: rgba(255, 255, 255, 0.02);
        box-shadow: 0 0 80px rgba(236, 72, 153, 0.05);
      }

      .clock-text {
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 30px rgba(236, 72, 153, 0.2);
      }

      .ampm {
        font-size: 0.25em;
        vertical-align: middle;
        margin-left: 15px;
        opacity: 0.6;
        letter-spacing: 0.15em;
      }

      .no-select { user-select: none; }
    </style>
</head>
<body class="no-select">

    <canvas id="bg-canvas"></canvas>
    <div class="mesh-gradient" id="mesh"></div>

    <div class="w-full max-w-4xl px-6 relative z-10">
        
        <div class="glass-card p-12 md:p-20 rounded-[4rem] text-center relative overflow-hidden group mx-auto">
            <div class="absolute top-8 left-1/2 -translate-x-1/2 flex items-center gap-3">
                <span class="w-2 h-2 rounded-full bg-primary animate-ping"></span>
                <span class="text-[9px] font-black uppercase tracking-[0.5em] text-gray-400">Live ACDT Signal</span>
            </div>
            
            <h3 class="text-primary font-display text-[11px] tracking-[0.7em] uppercase mt-6 mb-12 italic opacity-70">Bordertown HQ</h3>
            
            <div id="bt-container" class="clock-text text-6xl md:text-9xl font-black italic tracking-tighter leading-none flex items-center justify-center">
                <span id="bt-time">00:00:00</span>
                <span id="bt-ampm" class="ampm font-display">--</span>
            </div>
            
            <div class="mt-12 flex justify-center gap-8 opacity-40">
                <div class="h-[1px] w-12 bg-gradient-to-r from-transparent to-primary my-auto"></div>
                <p class="text-[10px] text-gray-500 uppercase font-black tracking-[0.6em]">South Australia</p>
                <div class="h-[1px] w-12 bg-gradient-to-l from-transparent to-primary my-auto"></div>
            </div>
        </div>

        <div class="mt-16 text-center opacity-25">
            <p class="font-display text-[9px] tracking-[1.5em] uppercase italic">Xclipse Studio | Temporal Engine 2.0</p>
        </div>
    </div>

    <script>
        // MOUSE TRACKING
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        // PARTICLE ENGINE
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * -0.4 - 0.1;
                this.opacity = Math.random() * 0.4;
            }
            update() {
                this.y += this.speedY;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(236, 72, 153, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // CLOCK ENGINE
        function updateStudioClock() {
            const now = new Date();
            const options = { 
                hour: 'numeric', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: true,
                timeZone: 'Australia/Adelaide'
            };

            const timeString = now.toLocaleTimeString('en-AU', options);
            const parts = timeString.split(' '); 
            
            document.getElementById('bt-time').innerText = parts[0];
            document.getElementById('bt-ampm').innerText = parts[1].toUpperCase();

            // Glow reaction
            const clock = document.querySelector('.clock-text');
            clock.style.textShadow = `0 0 ${25 + Math.random() * 15}px rgba(236, 72, 153, 0.4)`;
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();
        setInterval(updateStudioClock, 1000);
        updateStudioClock();
    </script>
</body>
</html>
