<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclipse Studio | Time-Sync Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ec4899', 
              secondary: '#a855f7',
              dark: '#050811'
            },
            fontFamily: { 
                display: ['Syncopate', 'sans-serif'],
                mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --mouse-x: 50%;
        --mouse-y: 50%;
        --transition-fluid: cubic-bezier(0.16, 1, 0.3, 1);
      }

      body { background: #050811; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; color: white; }

      .mesh-gradient {
        position: fixed; inset: 0; z-index: -1;
        background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(236, 72, 153, 0.15) 0%, rgba(5, 8, 17, 1) 50%), 
                    radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%);
      }

      #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

      .glass-card {
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.6s var(--transition-fluid);
      }

      .glass-card:hover {
        border-color: rgba(236, 72, 153, 0.4);
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.02);
      }

      .clock-text {
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 30px rgba(236, 72, 153, 0.2);
        transition: text-shadow 0.5s ease;
      }

      .ampm {
        font-size: 0.25em;
        vertical-align: middle;
        margin-left: 10px;
        opacity: 0.6;
        letter-spacing: 0.1em;
      }

      .no-select { user-select: none; }
    </style>
</head>
<body class="no-select">

    <canvas id="bg-canvas"></canvas>
    <div class="mesh-gradient" id="mesh"></div>

    <div class="w-full max-w-6xl px-6 relative z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="glass-card p-10 md:p-14 rounded-[3rem] text-center relative overflow-hidden group">
                <div class="absolute top-6 left-1/2 -translate-x-1/2 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-primary animate-ping"></span>
                    <span class="text-[8px] font-black uppercase tracking-[0.4em] text-gray-500">Live ACDT</span>
                </div>
                
                <h3 class="text-primary font-display text-[10px] tracking-[0.5em] uppercase mt-4 mb-8 italic opacity-80">Bordertown HQ</h3>
                
                <div id="bt-container" class="clock-text text-5xl md:text-7xl lg:text-8xl font-black italic tracking-tighter leading-none flex items-center justify-center">
                    <span id="bt-time">00:00:00</span>
                    <span id="bt-ampm" class="ampm font-display">--</span>
                </div>
                
                <p class="mt-8 text-[9px] text-gray-600 uppercase font-black tracking-[0.4em]">South Australia</p>
            </div>

            <div class="glass-card p-10 md:p-14 rounded-[3rem] text-center relative overflow-hidden group">
                <div class="absolute top-6 left-1/2 -translate-x-1/2 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span>
                    <span class="text-[8px] font-black uppercase tracking-[0.4em] text-gray-500">Live AEST</span>
                </div>

                <h3 class="text-secondary font-display text-[10px] tracking-[0.5em] uppercase mt-4 mb-8 italic opacity-80">Gold Coast Distro</h3>
                
                <div id="gc-container" class="clock-text text-5xl md:text-7xl lg:text-8xl font-black italic tracking-tighter leading-none flex items-center justify-center" style="text-shadow: 0 0 30px rgba(168, 85, 247, 0.2);">
                    <span id="gc-time">00:00:00</span>
                    <span id="gc-ampm" class="ampm font-display text-secondary">--</span>
                </div>
                
                <p class="mt-8 text-[9px] text-gray-600 uppercase font-black tracking-[0.4em]">Queensland</p>
            </div>

        </div>

        <div class="mt-12 text-center opacity-30">
            <p class="font-display text-[8px] tracking-[1.2em] uppercase italic">Xclipse Studio | Temporal Engine 2.0</p>
        </div>
    </div>

    <script>
        // MOUSE TRACKING
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        // PARTICLE ENGINE
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = Math.random() * -0.3 - 0.1;
                this.opacity = Math.random() * 0.4;
            }
            update() {
                this.y += this.speedY;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(236, 72, 153, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // 12-HOUR FORMATTING ENGINE
        function updateStudioClocks() {
            const now = new Date();
            
            // Format options for 12-hour time
            const options = { 
                hour: 'numeric', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: true 
            };

            const btString = now.toLocaleTimeString('en-AU', { ...options, timeZone: 'Australia/Adelaide' });
            const gcString = now.toLocaleTimeString('en-AU', { ...options, timeZone: 'Australia/Brisbane' });

            // Split the time from the AM/PM part
            const formatTime = (str, timeId, ampmId) => {
                const parts = str.split(' '); // ["10:30:05", "pm"]
                document.getElementById(timeId).innerText = parts[0];
                document.getElementById(ampmId).innerText = parts[1].toUpperCase();
            };

            formatTime(btString, 'bt-time', 'bt-ampm');
            formatTime(gcString, 'gc-time', 'gc-ampm');
            
            // Reactive pulse effect on the container every second
            const containers = document.querySelectorAll('.clock-text');
            containers.forEach(el => {
                el.style.textShadow = `0 0 ${20 + Math.random() * 20}px rgba(236, 72, 153, 0.4)`;
            });
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();
        setInterval(updateStudioClocks, 1000);
        updateStudioClocks();
    </script>
</body>
</html>
