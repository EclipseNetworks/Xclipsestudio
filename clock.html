<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclipse Studio | Time-Sync Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ec4899', 
              secondary: '#a855f7',
              dark: '#050811'
            },
            fontFamily: { 
                display: ['Syncopate', 'sans-serif'],
                mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --transition-fluid: cubic-bezier(0.16, 1, 0.3, 1);
        --mouse-x: 50%;
        --mouse-y: 50%;
      }

      body {
        background: #050811;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* REACTIVE MESH BACKGROUND */
      .mesh-gradient {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(
            circle at var(--mouse-x) var(--mouse-y), 
            rgba(236, 72, 153, 0.15) 0%, 
            rgba(5, 8, 17, 1) 50%
        ), radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%);
        transition: background 0.3s ease;
      }

      /* PARTICLE CANVAS */
      #bg-canvas {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      /* GLASSMORPHISM CARD */
      .glass-card {
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.6s var(--transition-fluid);
      }

      .glass-card:hover {
        border-color: rgba(236, 72, 153, 0.4);
        transform: translateY(-8px) scale(1.01);
        background: rgba(255, 255, 255, 0.02);
      }

      .clock-text {
        text-shadow: 0 0 40px rgba(236, 72, 153, 0.3);
      }
      
      /* ALARM INPUT STYLING */
      input[type="time"] {
        color-scheme: dark;
      }
      input[type="time"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
        opacity: 0.5;
        transition: 0.3s;
      }
      input[type="time"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }

      .no-select { user-select: none; }
    </style>
</head>
<body class="no-select">

    <canvas id="bg-canvas"></canvas>
    <div class="mesh-gradient" id="mesh"></div>

    <div class="w-full max-w-5xl px-6 relative z-10 py-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <div class="glass-card p-12 rounded-[3.5rem] text-center relative overflow-hidden group">
                <div class="absolute top-6 right-10 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-primary animate-ping"></span>
                    <span class="text-[9px] font-black uppercase tracking-widest text-gray-500">Live ACDT</span>
                </div>
                <h3 class="text-primary font-display text-[11px] tracking-[0.6em] uppercase mb-6 italic">Bordertown HQ</h3>
                <div id="bordertown-clock" class="clock-text text-6xl md:text-8xl font-black text-white italic tracking-tighter tabular-nums leading-none mb-6">
                    00:00:00
                </div>
                <p class="text-[10px] text-gray-600 uppercase font-black tracking-[0.5em]">South Australia Time</p>
            </div>

            <div class="glass-card p-12 rounded-[3.5rem] text-center relative overflow-hidden group">
                <div class="absolute top-6 right-10 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-secondary animate-pulse"></span>
                    <span class="text-[9px] font-black uppercase tracking-widest text-gray-500">Live AEST</span>
                </div>
                <h3 class="text-secondary font-display text-[11px] tracking-[0.6em] uppercase mb-6 italic">Gold Coast Distro</h3>
                <div id="goldcoast-clock" class="clock-text text-6xl md:text-8xl font-black text-white italic tracking-tighter tabular-nums leading-none mb-6" style="text-shadow: 0 0 40px rgba(168, 85, 247, 0.3);">
                    00:00:00
                </div>
                <p class="text-[10px] text-gray-600 uppercase font-black tracking-[0.5em]">Queensland Time</p>
            </div>

        </div>

        <div id="alarm-card" class="glass-card mt-10 p-8 rounded-[3.5rem] flex flex-col md:flex-row items-center justify-between gap-6 transition-all duration-500">
            
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 rounded-full bg-primary/10 border border-primary/30 flex items-center justify-center text-primary relative">
                    <i class="fas fa-bell"></i>
                    <div id="alarm-ping" class="absolute inset-0 rounded-full border-2 border-primary animate-ping hidden"></div>
                </div>
                <div>
                    <h3 class="font-display text-[11px] tracking-[0.5em] text-white uppercase italic">Session Alarm</h3>
                    <p class="text-[9px] text-gray-500 uppercase tracking-widest font-mono mt-1">Syncs with Bordertown HQ</p>
                </div>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-4">
                <input type="time" id="alarm-input" class="bg-white/5 border border-white/10 text-white font-mono text-xl px-5 py-3 rounded-2xl outline-none focus:border-primary/50 transition shadow-inner">
                <button id="alarm-btn" onclick="toggleAlarm()" class="px-8 py-3.5 rounded-full border border-primary text-primary font-bold text-[10px] uppercase tracking-widest hover:bg-primary hover:text-white transition-all shadow-lg active:scale-95">
                    Set Alarm
                </button>
            </div>
            
            <audio id="alarm-audio" src="Tell me we were'nt just friends - hoodtrap-sped.mp3" preload="auto" loop></audio>
        </div>

        <div class="mt-16 text-center opacity-20 group">
            <p class="text-white font-display text-[9px] tracking-[1.5em] uppercase italic group-hover:opacity-100 transition-opacity">Xclipse Studio | Temporal Synchronization Engine</p>
        </div>
    </div>

    <script>
        /* --- MOUSE TRACKING ENGINE --- */
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        /* --- PARTICLE ENGINE --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * -0.5 - 0.2;
                this.opacity = Math.random() * 0.5;
                this.isAlarming = false;
            }
            update() {
                this.y += this.isAlarming ? this.speedY * 4 : this.speedY; // Speed up when alarm rings
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(236, 72, 153, ${this.isAlarming ? Math.random() : this.opacity})`; // Flicker during alarm
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        /* --- ALARM STATE & LOGIC --- */
        let alarmTime = null;
        let isAlarmActive = false;
        let isRinging = false;

        function toggleAlarm() {
            const btn = document.getElementById('alarm-btn');
            const input = document.getElementById('alarm-input');
            const audio = document.getElementById('alarm-audio');
            const card = document.getElementById('alarm-card');
            const ping = document.getElementById('alarm-ping');

            if (isRinging) {
                // STOP ALARM
                isRinging = false;
                isAlarmActive = false;
                audio.pause();
                audio.currentTime = 0;
                
                // Reset UI
                btn.innerText = "Set Alarm";
                btn.className = "px-8 py-3.5 rounded-full border border-primary text-primary font-bold text-[10px] uppercase tracking-widest hover:bg-primary hover:text-white transition-all shadow-lg active:scale-95";
                card.style.boxShadow = "none";
                card.style.borderColor = "rgba(255, 255, 255, 0.05)";
                ping.classList.add('hidden');
                particles.forEach(p => p.isAlarming = false);
                
            } else if (isAlarmActive) {
                // CANCEL ALARM
                isAlarmActive = false;
                alarmTime = null;
                btn.innerText = "Set Alarm";
                btn.className = "px-8 py-3.5 rounded-full border border-primary text-primary font-bold text-[10px] uppercase tracking-widest hover:bg-primary hover:text-white transition-all shadow-lg active:scale-95";
                
            } else {
                // SET ALARM
                if (!input.value) return alert("Please select an alarm time first.");
                alarmTime = input.value;
                isAlarmActive = true;
                
                // **BROWSER AUTOPLAY FIX:** Unlock audio context silently
                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        audio.pause();
                        audio.currentTime = 0;
                    }).catch(error => {
                        console.log("Audio unlock process intercepted (Expected behavior)", error);
                    });
                }
                
                btn.innerText = "Alarm Active";
                btn.className = "px-8 py-3.5 rounded-full border border-primary bg-primary text-white font-bold text-[10px] uppercase tracking-widest transition-all shadow-[0_0_15px_#ec4899] active:scale-95";
            }
        }

        function triggerAlarm() {
            if (isRinging) return;
            isRinging = true;
            
            // Play Track (Now unlocked)
            const audio = document.getElementById('alarm-audio');
            audio.currentTime = 0;
            audio.volume = 1.0;
            
            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => {
                    console.log("Audio playback blocked:", e);
                    alert("ALARM RINGING! (Your browser blocked the audio. Click anywhere on the page to enable sound.)");
                });
            }

            // Visual Freakout
            const btn = document.getElementById('alarm-btn');
            const card = document.getElementById('alarm-card');
            const ping = document.getElementById('alarm-ping');

            btn.innerText = "STOP ALARM";
            btn.className = "px-8 py-3.5 rounded-full border border-red-500 bg-red-500 text-white font-bold text-[10px] uppercase tracking-widest transition-all shadow-[0_0_25px_red] animate-pulse active:scale-95";
            
            card.style.borderColor = "#ec4899";
            card.style.boxShadow = "0 0 40px rgba(236, 72, 153, 0.4)";
            ping.classList.remove('hidden');
            
            particles.forEach(p => p.isAlarming = true);
        }

        /* --- CLOCK ENGINE --- */
        function updateStudioClocks() {
            const now = new Date();
            
            // Base visual pulse
            if(!isRinging) particles.forEach(p => p.opacity = Math.random() * 0.8);

            // Clock Rendering
            const btOptions = { timeZone: 'Australia/Adelaide', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const gcOptions = { timeZone: 'Australia/Brisbane', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };

            const btTime = new Intl.DateTimeFormat('en-AU', btOptions).format(now);
            const gcTime = new Intl.DateTimeFormat('en-AU', gcOptions).format(now);

            document.getElementById('bordertown-clock').innerText = btTime;
            document.getElementById('goldcoast-clock').innerText = gcTime;

            // Check Alarm condition against Bordertown Time
            if (isAlarmActive && !isRinging && alarmTime) {
                // Extract precise H & M to avoid browser formatting bugs
                const parts = new Intl.DateTimeFormat('en-US', {
                    timeZone: 'Australia/Adelaide',
                    hour: 'numeric',
                    minute: 'numeric',
                    hour12: false
                }).formatToParts(now);

                let h = parts.find(p => p.type === 'hour').value;
                let m = parts.find(p => p.type === 'minute').value;
                
                if (h === '24') h = '00';
                
                // Format to match HTML <input type="time"> value "HH:MM"
                const currentTimeStr = `${h.padStart(2, '0')}:${m.padStart(2, '0')}`;

                // Trigger exactly when the minute matches
                if (currentTimeStr === alarmTime) {
                    triggerAlarm();
                }
            }
        }

        // --- INIT ---
        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();

        setInterval(updateStudioClocks, 1000);
        updateStudioClocks();
    </script>

</body>
</html>
