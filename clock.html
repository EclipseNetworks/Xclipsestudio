<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclipse Studio | Sync Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ec4899', 
              secondary: '#a855f7',
              dark: '#050811'
            },
            fontFamily: { 
                display: ['Syncopate', 'sans-serif'],
                mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --transition-fluid: cubic-bezier(0.16, 1, 0.3, 1);
        --mouse-x: 50%;
        --mouse-y: 50%;
      }

      body {
        background: #050811;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow-x: hidden;
        color: white;
      }

      /* REACTIVE MESH BACKGROUND */
      .mesh-gradient {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(
            circle at var(--mouse-x) var(--mouse-y), 
            rgba(236, 72, 153, 0.12) 0%, 
            rgba(5, 8, 17, 1) 50%
        ), radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%);
        transition: background 0.3s ease;
      }

      #bg-canvas {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      /* GLASSMORPHISM CARD */
      .glass-card {
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.6s var(--transition-fluid);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .glass-card:hover {
        border-color: rgba(236, 72, 153, 0.3);
        transform: translateY(-8px);
      }

      /* SPACED DIGIT ARCHITECTURE */
      .digit-box {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 55px;
        height: 80px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 3rem;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 12px;
        margin: 0 4px;
        transition: all 0.3s var(--transition-fluid);
      }

      @media (min-width: 768px) {
        .digit-box { width: 85px; height: 110px; font-size: 5rem; margin: 0 6px; }
      }

      .separator {
        font-size: 2.5rem;
        opacity: 0.15;
        margin: 0 5px;
        font-weight: 100;
      }

      .ampm-tag {
        font-size: 1.5rem;
        font-family: 'JetBrains Mono', monospace;
        opacity: 0.5;
        margin-left: 12px;
      }

      /* DIGITAL PULSE REACTION */
      .pulse-react {
        animation: digitPulse 0.4s ease-out;
      }
      @keyframes digitPulse {
        0% { transform: scale(1); text-shadow: 0 0 0px transparent; }
        30% { transform: scale(1.08); color: #ec4899; text-shadow: 0 0 35px rgba(236, 72, 153, 0.8); }
        100% { transform: scale(1); text-shadow: 0 0 15px rgba(236, 72, 153, 0.2); }
      }

      .diff-glow {
        animation: pulseText 2s infinite ease-in-out;
      }
      @keyframes pulseText {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; text-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
      }

      .no-select { user-select: none; }
    </style>
</head>
<body class="no-select">

    <canvas id="bg-canvas"></canvas>
    <div class="mesh-gradient" id="mesh"></div>

    <div class="w-full max-w-7xl px-6 py-10 relative z-10 flex flex-col gap-10">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <div class="glass-card p-12 rounded-[3.5rem] relative overflow-hidden group border-primary/20">
                <div class="absolute top-8 left-10 flex items-center gap-3">
                    <span class="w-2.5 h-2.5 rounded-full bg-primary animate-ping"></span>
                    <span class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-500">Live ACDT</span>
                </div>
                <h3 class="text-primary font-display text-[11px] tracking-[0.6em] uppercase mb-12 italic text-center">Bordertown HQ</h3>
                
                <div class="flex justify-center items-center">
                    <div id="bt-h" class="digit-box">12</div>
                    <span class="separator">/</span>
                    <div id="bt-m" class="digit-box">00</div>
                    <span class="separator">/</span>
                    <div id="bt-s" class="digit-box">00</div>
                    <span id="bt-ampm" class="ampm-tag">AM</span>
                </div>
                <p class="text-center mt-12 text-[10px] text-gray-600 uppercase font-black tracking-[0.5em]">South Australia Standard</p>
            </div>

            <div class="glass-card p-12 rounded-[3.5rem] relative overflow-hidden group border-secondary/20">
                <div class="absolute top-8 left-10 flex items-center gap-3">
                    <span class="w-2.5 h-2.5 rounded-full bg-secondary animate-pulse"></span>
                    <span class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-500">Live AEST</span>
                </div>
                <h3 class="text-secondary font-display text-[11px] tracking-[0.6em] uppercase mb-12 italic text-center">Gold Coast Distro</h3>
                
                <div class="flex justify-center items-center">
                    <div id="gc-h" class="digit-box">12</div>
                    <span class="separator">/</span>
                    <div id="gc-m" class="digit-box">00</div>
                    <span class="separator">/</span>
                    <div id="gc-s" class="digit-box">00</div>
                    <span id="gc-ampm" class="ampm-tag">AM</span>
                </div>
                <p class="text-center mt-12 text-[10px] text-gray-600 uppercase font-black tracking-[0.5em]">Queensland Standard</p>
            </div>

        </div>

        <div class="glass-card max-w-2xl mx-auto p-8 rounded-[2rem] border-white/5 flex items-center justify-center gap-8 w-full relative">
            <div class="absolute inset-0 bg-primary/5 blur-2xl"></div>
            <div class="relative z-10 flex flex-col items-center w-full">
                <p class="text-[9px] font-black uppercase tracking-[0.8em] text-primary mb-3 italic opacity-60">Temporal Offset</p>
                <div class="flex items-center gap-6">
                    <i class="fas fa-bolt text-primary animate-pulse text-xs"></i>
                    <span id="calc-diff" class="font-display text-white text-xl md:text-2xl italic tracking-widest diff-glow">
                        SYNCING...
                    </span>
                    <i class="fas fa-bolt text-primary animate-pulse text-xs"></i>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center opacity-20">
            <p class="text-white font-display text-[9px] tracking-[1.5em] uppercase italic">Xclipse Studio | Synchronization Engine</p>
        </div>

    </div>

    <script>
        // --- MOUSE TRACKING ---
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        // --- PARTICLE BACKGROUND ENGINE ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * -0.3 - 0.1;
                this.opacity = Math.random() * 0.4;
            }
            update() {
                this.y += this.speedY;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(236, 72, 153, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- BULLETPROOF CLOCK LOGIC ---
        function extractTimeParts(now, timeZone) {
            // Uses browser's native formatter to get exact values without string splitting bugs
            const parts = new Intl.DateTimeFormat('en-US', { 
                timeZone: timeZone, 
                hour: '2-digit', minute: '2-digit', second: '2-digit', 
                hour12: true 
            }).formatToParts(now);

            let h='00', m='00', s='00', ampm='';
            parts.forEach(p => {
                if(p.type === 'hour') h = p.value;
                if(p.type === 'minute') m = p.value;
                if(p.type === 'second') s = p.value;
                if(p.type === 'dayPeriod') ampm = p.value.toUpperCase();
            });

            return { h, m, s, ampm };
        }

        function updateDigit(id, newValue) {
            const el = document.getElementById(id);
            if (el.innerText !== newValue) {
                el.innerText = newValue;
                el.classList.remove('pulse-react');
                void el.offsetWidth; // Force CSS reflow
                el.classList.add('pulse-react');
            }
        }

        function syncEngine() {
            const now = new Date();
            
            // Extract times
            const bt = extractTimeParts(now, 'Australia/Adelaide');
            const gc = extractTimeParts(now, 'Australia/Brisbane');

            // Update Bordertown
            updateDigit('bt-h', bt.h);
            updateDigit('bt-m', bt.m);
            updateDigit('bt-s', bt.s);
            document.getElementById('bt-ampm').innerText = bt.ampm;

            // Update Gold Coast
            updateDigit('gc-h', gc.h);
            updateDigit('gc-m', gc.m);
            updateDigit('gc-s', gc.s);
            document.getElementById('gc-ampm').innerText = gc.ampm;

            // Pulse particles every second
            particles.forEach(p => p.opacity = Math.random() * 0.7);

            // Calculate Difference (Safe Math)
            const btDateString = new Intl.DateTimeFormat('en-US', { timeZone: 'Australia/Adelaide', dateStyle: 'short', timeStyle: 'medium', hour12: false }).format(now);
            const gcDateString = new Intl.DateTimeFormat('en-US', { timeZone: 'Australia/Brisbane', dateStyle: 'short', timeStyle: 'medium', hour12: false }).format(now);
            
            const diffMs = new Date(gcDateString).getTime() - new Date(btDateString).getTime();
            const diffMinsTotal = Math.round(diffMs / 60000);
            
            const diffEl = document.getElementById('calc-diff');
            
            if (diffMinsTotal === 0) {
                diffEl.innerText = "SYSTEMS ALIGNED";
            } else {
                const diffHrs = Math.floor(Math.abs(diffMinsTotal) / 60);
                const diffMinsRemaining = Math.abs(diffMinsTotal) % 60;
                const relation = diffMinsTotal > 0 ? "AHEAD" : "BEHIND";
                
                diffEl.innerText = `${diffHrs}H ${diffMinsRemaining}M ${relation}`;
            }
        }

        // Initialize and loop
        setInterval(syncEngine, 1000);
        syncEngine();
    </script>
</body>
</html>
