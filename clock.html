<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclipse Studio | Temporal Engine</title>

    
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ec4899', 
              dark: '#050811'
            },
            fontFamily: { 
                display: ['Syncopate', 'sans-serif'],
                mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      }
    </script>

    <style>
      body { background: #050811; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; color: white; }

      /* AUTOMATED MESH BACKGROUND */
      .mesh-gradient {
        position: fixed; inset: 0; z-index: -1;
        background: radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.12) 0%, rgba(5, 8, 17, 1) 60%), 
                    radial-gradient(circle at 20% 30%, #0d1226 0%, #050811 100%);
        animation: meshFlow 20s ease-in-out infinite alternate;
      }

      @keyframes meshFlow {
        0% { transform: scale(1) translate(0, 0); }
        100% { transform: scale(1.1) translate(2%, 2%); }
      }

      #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

      /* FLOATING ANIMATION FOR THE CARD */
      @keyframes floatCard {
        0%, 100% { transform: translateY(0) rotateX(2deg); }
        50% { transform: translateY(-20px) rotateX(-2deg); }
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(50px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        animation: floatCard 8s ease-in-out infinite;
        box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
      }

      .clock-text {
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 40px rgba(236, 72, 153, 0.3);
        transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* AUTOMATED TICK PULSE */
      .tick-pulse {
        transform: scale(1.03);
        text-shadow: 0 0 70px rgba(236, 72, 153, 0.7);
        filter: brightness(1.25);
      }

      .ampm {
        font-size: 0.22em;
        vertical-align: middle;
        margin-left: 15px;
        opacity: 0.5;
        letter-spacing: 0.2em;
      }

      .no-select { user-select: none; }
    </style>
</head>
<body class="no-select">

    <canvas id="bg-canvas"></canvas>
    <div class="mesh-gradient"></div>

    <div class="w-full max-w-4xl px-6 relative z-10">
        
        <div class="glass-card p-12 md:p-24 rounded-[5rem] text-center relative overflow-hidden mx-auto">
            <div class="absolute inset-0 pointer-events-none opacity-[0.03] bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>

            <div class="absolute top-10 left-1/2 -translate-x-1/2 flex items-center gap-3">
                <span class="w-2.5 h-2.5 rounded-full bg-primary animate-ping"></span>
                <span class="text-[10px] font-black uppercase tracking-[0.6em] text-gray-400">Broadcasting Sync</span>
            </div>
            
            <h3 class="text-primary font-display text-[12px] tracking-[0.8em] uppercase mt-4 mb-16 italic opacity-80">Bordertown HQ</h3>
            
            <div id="bt-container" class="clock-text text-7xl md:text-[10rem] font-black italic tracking-tighter leading-none flex items-center justify-center">
                <span id="bt-time">00:00:00</span>
                <span id="bt-ampm" class="ampm font-display">--</span>
            </div>
            
            <div class="mt-16 flex justify-center items-center gap-10 opacity-30">
                <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-primary max-w-[100px]"></div>
                <p class="text-[11px] text-gray-400 uppercase font-black tracking-[0.8em]">Australia / Adelaide</p>
                <div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-primary max-w-[100px]"></div>
            </div>
        </div>

        <div class="mt-20 text-center opacity-20">
            <p class="font-display text-[10px] tracking-[2em] uppercase italic animate-pulse">Temporal Engine 2.0 // Xclipse Studio</p>
        </div>
    </div>

    <script>
        // BACKGROUND PARTICLE ENGINE (AUTOMATED DRIFT)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(236, 72, 153, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // CLOCK & REACTION ENGINE
        function updateStudioClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-AU', { 
                hour: 'numeric', minute: '2-digit', second: '2-digit', 
                hour12: true, timeZone: 'Australia/Adelaide' 
            });

            const parts = timeString.split(' '); 
            const clockEl = document.getElementById('bt-container');
            
            document.getElementById('bt-time').innerText = parts[0];
            document.getElementById('bt-ampm').innerText = parts[1].toUpperCase();

            // Automated reactive pulse every second
            clockEl.classList.add('tick-pulse');
            setTimeout(() => clockEl.classList.remove('tick-pulse'), 150);
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();
        setInterval(updateStudioClock, 1000);
        updateStudioClock();

        // --- GITHUB AUTO-REFRESH ENGINE ---
let currentVersion = null;

async function syncWithGitHub() {
    try {
        // Fetch the headers of the current page
        const response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' });
        
        // The ETag or Last-Modified header changes every time you push to GitHub
        const newVersion = response.headers.get('ETag') || response.headers.get('Last-Modified');

        if (currentVersion && newVersion !== currentVersion) {
            console.log("Xclipse Studio: Update detected. Syncing...");
            
            // Subtle fade out before refresh for a cleaner "studio" look
            document.body.style.transition = "opacity 1s ease";
            document.body.style.opacity = "0";
            
            setTimeout(() => {
                window.location.reload(true); // Force reload from server, not cache
            }, 1000);
        }
        
        currentVersion = newVersion;
    } catch (err) {
        // Silently fail if there's a connection blip
    }
}

// Check for new GitHub pushes every 30 seconds
setInterval(syncWithGitHub, 30000);

// Initial check on load
syncWithGitHub();
    </script>
</body>
</html>
