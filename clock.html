<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclipse Studio | Time-Sync Engine</title>    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', secondary: '#a855f7', dark: '#050811' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>
    <style>
      :root {
        --transition-fluid: cubic-bezier(0.16, 1, 0.3, 1);
        --mouse-x: 50%; --mouse-y: 50%;
      }
      body {
        background: #050811; margin: 0; display: flex; align-items: center;
        justify-content: center; min-height: 100vh; overflow: hidden;
      }

      /* REACTIVE BACKGROUND LAYER */
      .mesh-gradient {
        position: fixed; inset: 0; z-index: -1;
        background: 
            radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(236, 72, 153, 0.12) 0%, transparent 40%),
            radial-gradient(circle at 50% 50%, #0d1226 0%, #050811 100%);
      }

      /* ANIMATIONS */
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
      @keyframes pulse-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
      @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

      .animate-float { animation: float 6s ease-in-out infinite; }
      .animate-slide-up { animation: slide-up 0.8s var(--transition-fluid) forwards; }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.015);
        backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.5s var(--transition-fluid);
      }
      .glass-card:hover {
        background: rgba(255, 255, 255, 0.03);
        border-color: rgba(236, 72, 153, 0.3);
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      }

      /* TABULAR NUMS FOR STEADY CLOCK */
      .clock-text {
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.05em;
        transition: all 0.3s ease;
      }

      #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
      
      input[type="time"] { color-scheme: dark; }
    </style>
</head>
<body class="select-none">
    <canvas id="bg-canvas"></canvas>
    <div class="mesh-gradient" id="mesh"></div>

    <div class="w-full max-w-3xl px-6 relative z-10 py-10 animate-slide-up">
        
        <div class="glass-card p-12 rounded-[4rem] text-center relative overflow-hidden group animate-float">
            <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none" 
                 style="background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(236, 72, 153, 0.05) 0%, transparent 50%);"></div>

            <div class="absolute top-8 right-12 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                <span class="text-[8px] font-black uppercase tracking-[0.3em] text-gray-500">Node: Bordertown</span>
            </div>

            <h3 class="text-primary font-display text-[10px] tracking-[0.8em] uppercase mb-10 opacity-60 group-hover:tracking-[1em] transition-all duration-700">Studio Sync</h3>
            
            <div id="clock" class="clock-text text-7xl md:text-[10rem] font-black text-white italic leading-none mb-4 group-hover:scale-105 transition-transform duration-700">
                00:00:00
            </div>

            <div class="flex justify-center items-center gap-4 text-[9px] text-gray-600 uppercase font-black tracking-[0.4em]">
                <span>ACDT</span>
                <span class="w-1 h-1 bg-gray-800 rounded-full"></span>
                <span>South Australia</span>
            </div>
        </div>

        <div id="alarm-card" class="glass-card mt-8 p-8 rounded-[3rem] flex flex-col md:flex-row items-center justify-between gap-6 overflow-hidden relative">
            <div class="flex items-center gap-6 relative z-10">
                <div id="alarm-icon-container" class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-xl text-primary transition-all duration-500">
                    <i class="fas fa-bolt" id="alarm-icon"></i>
                </div>
                <div>
                    <h3 class="font-display text-[10px] tracking-[0.4em] text-white uppercase italic">Temporal Trigger</h3>
                    <p id="alarm-status-text" class="text-[8px] text-gray-500 uppercase tracking-widest font-mono mt-1">Standby Mode</p>
                </div>
            </div>

            <div class="flex items-center gap-4 relative z-10">
                <input type="time" id="alarm-input" 
                       class="bg-black/40 border border-white/5 text-white font-mono text-xl px-6 py-4 rounded-2xl outline-none focus:border-primary/40 transition-all hover:bg-black/60">
                
                <button id="alarm-btn" onclick="toggleAlarm()" 
                        class="h-14 px-10 rounded-2xl border border-primary/50 text-primary font-bold text-[10px] uppercase tracking-widest hover:bg-primary hover:text-white transition-all active:scale-95 shadow-[0_0_20px_rgba(236,72,153,0)] hover:shadow-[0_0_30px_rgba(236,72,153,0.3)]">
                    Engage
                </button>
            </div>

            <audio id="alarm-audio" src="Tell me we were'nt just friends - hoodtrap-sped.mp3" preload="auto" loop></audio>
        </div>

        <div class="mt-12 text-center">
            <p class="text-white/10 font-display text-[8px] tracking-[2em] uppercase italic hover:text-white/40 transition-colors duration-1000">Xclipse Studio Engine v3.7</p>
        </div>
    </div>

    <script>
        /* MOUSE REACTIVE SYSTEM */
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        /* PARTICLE CANVAS SYSTEM */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.life = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(236, 72, 153, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        /* CLOCK & ALARM ENGINE */
        let alarmTime = null;
        let isAlarmActive = false;
        let isRinging = false;

        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Australia/Adelaide', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const timeStr = new Intl.DateTimeFormat('en-AU', options).format(now);
            
            document.getElementById('clock').innerText = timeStr;

            // Check Alarm
            if (isAlarmActive && !isRinging) {
                const currentHM = timeStr.substring(0, 5);
                if (currentHM === alarmTime) triggerAlarm();
            }
        }

        function toggleAlarm() {
            const btn = document.getElementById('alarm-btn');
            const input = document.getElementById('alarm-input');
            const status = document.getElementById('alarm-status-text');
            const icon = document.getElementById('alarm-icon');
            const audio = document.getElementById('alarm-audio');

            if (isRinging) {
                // Reset
                isRinging = false;
                isAlarmActive = false;
                audio.pause();
                audio.currentTime = 0;
                btn.innerText = "Engage";
                status.innerText = "Standby Mode";
                icon.className = "fas fa-bolt";
                document.getElementById('alarm-card').classList.remove('border-primary');
            } else if (isAlarmActive) {
                isAlarmActive = false;
                btn.innerText = "Engage";
                status.innerText = "Standby Mode";
            } else {
                if (!input.value) return;
                alarmTime = input.value;
                isAlarmActive = true;
                btn.innerText = "Disarm";
                status.innerText = `Armed: ${alarmTime}`;
                // Audio unlock
                audio.play().then(() => { audio.pause(); audio.currentTime = 0; });
            }
        }

        function triggerAlarm() {
            isRinging = true;
            const audio = document.getElementById('alarm-audio');
            audio.play();
            
            const btn = document.getElementById('alarm-btn');
            const status = document.getElementById('alarm-status-text');
            const icon = document.getElementById('alarm-icon');
            
            btn.innerText = "Terminate";
            status.innerText = "CRITICAL: SYNC BREACH";
            icon.className = "fas fa-exclamation-triangle animate-bounce text-red-500";
            document.getElementById('alarm-card').classList.add('border-primary');
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
