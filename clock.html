<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclipse Studio | Temporal Engine v2.4</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', secondary: '#0ea5e9', dark: '#050811' },
            fontFamily: { display: ['Syncopate', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>

    <style>
      :root { --glitch-intensity: 0px; }
      body { background: #050811; margin: 0; min-height: 100vh; overflow: hidden; color: white; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'JetBrains Mono', monospace; }
      
      /* SOPHISTICATED MESH & GRID */
      .viewport-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; }
      
      .mesh-gradient {
        position: fixed; inset: 0; z-index: -2;
        background: radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.08) 0%, rgba(5, 8, 17, 1) 70%),
                    radial-gradient(circle at 80% 20%, rgba(14, 165, 233, 0.05) 0%, transparent 50%);
      }

      .grid-overlay {
        position: fixed; inset: 0; z-index: -1;
        background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
      }

      /* CORE CARD ANIMATION */
      @keyframes engineFloat {
        0%, 100% { transform: translateY(0) rotateX(1deg) rotateY(-1deg); filter: drop-shadow(0 0 0px rgba(236,72,153,0)); }
        50% { transform: translateY(-15px) rotateX(-1deg) rotateY(1deg); filter: drop-shadow(0 20px 40px rgba(236,72,153,0.15)); }
      }

      .glass-engine {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        animation: engineFloat 10s ease-in-out infinite;
        position: relative;
        overflow: hidden;
      }

      /* SCANLINE EFFECT */
      .glass-engine::after {
        content: ""; position: absolute; inset: 0;
        background: linear-gradient(to bottom, transparent 50%, rgba(236,72,153,0.02) 50%);
        background-size: 100% 4px; pointer-events: none;
      }

      .clock-text {
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.05em;
        transition: text-shadow 0.3s ease;
      }

      .sync-status { font-size: 8px; letter-spacing: 0.5em; color: rgba(255,255,255,0.3); }

      /* DATA LOG STYLING */
      .terminal-log { position: fixed; bottom: 40px; left: 40px; font-size: 9px; color: #4ade80; opacity: 0.5; }

      .no-select { user-select: none; }
    </style>
</head>
<body class="no-select">

    <canvas id="bg-canvas"></canvas>
    <div class="mesh-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="terminal-log font-mono hidden md:block">
        <div id="log-line-1">>> INITIALIZING TEMPORAL_RECV</div>
        <div id="log-line-2">>> ADELAIDE_NODE: CONNECTED</div>
        <div id="log-line-3">>> PACKET_LOSS: 0.0001%</div>
    </div>

    <div class="viewport-container">
        <div class="glass-engine p-10 md:p-20 rounded-[3rem] w-[90vw] max-w-5xl">
            
            <div class="flex justify-between items-start mb-12">
                <div class="flex flex-col gap-1">
                    <span class="text-[9px] font-bold text-primary tracking-[0.4em] uppercase">System Live</span>
                    <span class="text-[8px] text-white/20 uppercase tracking-[0.2em]">Stability Protocol 4.0.1</span>
                </div>
                <div class="text-right">
                    <span id="hex-id" class="text-[9px] text-white/40 font-mono italic">0x4F92...B3</span>
                </div>
            </div>

            <div class="text-center py-10">
                <div id="bt-container" class="clock-text text-6xl md:text-[10rem] font-black flex items-center justify-center relative">
                    <span id="bt-time" class="relative z-10">00:00:00</span>
                    <span id="bt-ampm" class="text-xl md:text-3xl ml-6 text-white/20 font-display italic">--</span>
                </div>
                <div class="mt-4 sync-status uppercase">Xclipse Studio // Temporal Anchor</div>
            </div>

            <div class="mt-12 flex justify-between items-end border-t border-white/5 pt-8">
                <div class="flex gap-8">
                    <div>
                        <p class="text-[8px] text-white/30 uppercase mb-1">Location</p>
                        <p class="text-[10px] tracking-widest uppercase">AU / ADE</p>
                    </div>
                    <div>
                        <p class="text-[8px] text-white/30 uppercase mb-1">Offset</p>
                        <p class="text-[10px] tracking-widest uppercase">+10:30</p>
                    </div>
                </div>
                <div class="w-32 h-[1px] bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 text-center">
        <div class="flex items-center gap-4 mb-2">
            <span class="h-[1px] w-8 bg-white/10"></span>
            <p class="font-mono text-[9px] tracking-[0.5em] uppercase text-white/40">Next Pulse: <span id="sync-timer" class="text-primary font-bold">60</span>s</p>
            <span class="h-[1px] w-8 bg-white/10"></span>
        </div>
        <div class="w-64 h-[2px] bg-white/5 rounded-full overflow-hidden mx-auto">
            <div id="progress-fill" class="h-full bg-primary transition-all duration-1000 ease-linear" style="width: 100%"></div>
        </div>
    </div>

    <script>
        // BACKGROUND PARTICLE ENGINE
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        
        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5; this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.3;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.init();
            }
            draw() {
                ctx.fillStyle = `rgba(236, 72, 153, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        const initParticles = () => { for (let i = 0; i < 80; i++) particles.push(new Particle()); };
        const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        };

        // --- CORE TEMPORAL ENGINE ---
        const syncTimer = document.getElementById('sync-timer');
        const progressFill = document.getElementById('progress-fill');
        const hexId = document.getElementById('hex-id');
        let isCritical = false;

        function updateEngine() {
            const now = new Date();
            const sec = now.getSeconds();
            const ms = now.getMilliseconds();
            const remaining = 60 - sec;

            // Update Time
            const timeStr = now.toLocaleTimeString('en-AU', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', 
                hour12: true, timeZone: 'Australia/Adelaide' 
            });
            const parts = timeStr.split(' ');
            document.getElementById('bt-time').innerText = parts[0];
            document.getElementById('bt-ampm').innerText = parts[1].toUpperCase();

            // Progress Bar & Timer
            syncTimer.innerText = remaining.toString().padStart(2, '0');
            const progress = (remaining / 60) * 100;
            progressFill.style.width = `${progress}%`;

            // Visual Effects logic
            if (remaining <= 5) {
                if (!isCritical) {
                    isCritical = true;
                    progressFill.style.backgroundColor = "#ff0000";
                    document.getElementById('bt-container').style.textShadow = "0 0 50px rgba(236, 72, 153, 0.8)";
                }
            }

            // Refresh Sequence
            if (sec === 59 && ms > 100) {
                document.body.style.opacity = "0";
            }
            if (sec === 0) {
                window.location.reload();
            }

            // Randomize Hex ID for "sophistication"
            if (sec % 5 === 0) {
                hexId.innerText = `0x${Math.random().toString(16).substr(2, 6).toUpperCase()}...${Math.random().toString(16).substr(2, 2).toUpperCase()}`;
            }

            // Simulated Logs
            if (sec % 10 === 0) {
                document.getElementById('log-line-1').innerText = `>> SYNC_CYCLE_${sec}_INIT`;
                document.getElementById('log-line-2').innerText = `>> BUFFER_LATENCY: ${(Math.random() * 5).toFixed(4)}ms`;
            }
        }

        window.addEventListener('resize', resize);
        resize(); initParticles(); animate();
        setInterval(updateEngine, 100); // 10hz update for smoother UI
    </script>
</body>
</html>
